<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEG新自強3000列車 - 進度管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- 加入灑花特效與 Markdown 渲染所需的函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background-color: #f0f4f8; }

        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-150%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }
        @keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes float-cloud { 0% { transform: translateX(100vw); } 100% { transform: translateX(-20vw); } }
        @keyframes slide-train { 0% { transform: translateX(120vw); } 100% { transform: translateX(-50vw); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: none; } }
        @keyframes aiPulse { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-bounce-soft { animation: bounce-soft 2s infinite ease-in-out; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-modal-pop { animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-ai-bg { background-size: 200% 200%; animation: aiPulse 3s ease infinite; }

        .rich-content { font-size: 1.125rem; line-height: 1.75; }
        .rich-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content a { color: #4f46e5; text-decoration: underline; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .rich-content a:hover { color: #ec4899; }
        .rich-content p { margin-bottom: 0.5rem; min-height: 1rem; }
        .rich-content b, .rich-content strong { font-weight: 900; color: #1e1b4b; }
        .rich-content i, .rich-content em { font-style: italic; }
        .rich-content u { text-decoration: underline; text-decoration-color: #818cf8; text-decoration-thickness: 3px;}
        .rich-content strike { text-decoration: line-through; color: #9ca3af; }

        /* AI 聊天區專用 Markdown 樣式 */
        .ai-markdown { font-size: 0.95rem; line-height: 1.6; }
        .ai-markdown p { margin-bottom: 0.75rem; }
        .ai-markdown p:last-child { margin-bottom: 0; }
        .ai-markdown ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .ai-markdown ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .ai-markdown li { margin-bottom: 0.25rem; }
        .ai-markdown strong { font-weight: 900; color: inherit; }
        .ai-markdown h3, .ai-markdown h4 { font-weight: 900; margin-top: 1rem; margin-bottom: 0.5rem; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }
        
        .thin-scrollbar::-webkit-scrollbar { height: 6px; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 6px; border: none; }
        .thin-scrollbar::-webkit-scrollbar-thumb:hover { background: #818cf8; }

        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 1.5s ease-in-out; }
        
        .cloud { position: absolute; font-size: 4rem; opacity: 0.4; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
        .cloud-1 { top: 10%; animation: float-cloud 40s linear infinite; }
        .cloud-2 { top: 30%; font-size: 5rem; animation: float-cloud 55s linear infinite 15s; }
        .cloud-3 { top: 60%; font-size: 3rem; animation: float-cloud 45s linear infinite 5s; }
        .bg-train { position: absolute; bottom: 5%; font-size: 5rem; opacity: 0.15; animation: slide-train 30s linear infinite; }
    </style>
</head>
<body class="text-gray-800 relative">
    <div id="main-bg" class="bg-shapes"></div>
    
    <script>
        const bgImages = [
            'https://i.ibb.co/DP0f0sJH/Gemini-Generated-Image-glqg2kglqg2kglqg-1.png', 
            'https://i.ibb.co/ZRxN3Y3D/Gemini-Generated-Image-21aq1o21aq1o21aq.png',    
            'https://i.ibb.co/93ryGND0/Gemini-Generated-Image-m3tar8m3tar8m3ta.png'     
        ];
        
        window.changeBackground = function() {
            const randomBg = bgImages[Math.floor(Math.random() * bgImages.length)];
            document.getElementById('main-bg').style.backgroundImage = `url('${randomBg}')`;
        };
        window.changeBackground();
    </script>
    
    <div id="bg-overlay" class="fixed top-0 left-0 w-full h-full z-[-1] bg-transparent backdrop-blur-none transition-all duration-1000"></div>
    
    <div class="fixed top-0 left-0 w-full h-full z-[-1] overflow-hidden pointer-events-none">
        <div class="cloud cloud-1">☁️</div><div class="cloud cloud-2">⛅</div><div class="cloud cloud-3">☁️</div>
        <div class="bg-train">🚂🚋🚋🚋🚋🚋</div>
    </div>

    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ModalPortal = ({ children }) => {
            const [mounted, setMounted] = useState(false);
            useEffect(() => { setMounted(true); }, []);
            return mounted ? ReactDOM.createPortal(children, document.body) : null;
        };

        const STATUSES = [
          "💭 概念發想未經報告", "✅ 報告後老師確認", "🛠️ 研究與遊戲發展中", 
          "🎯 PILOT完成", "📤 研討會已投稿", "🎊 研討會已被接受", "📋 期刊施測準備中", 
          "✍️ 期刊寫作中", "🎉 期刊已投稿", "🏅 期刊已被接受", "📊 學位論文施測中", 
          "📜 學位論文撰寫中", "📌 其他"
        ];

        // ⚠️ 請替換為您自己最新部署的 API URL
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwvFe7geACFOL5yRauhX8WiBqafBLJiOj7CSPB6PNgoWkVqHeIVUS-wxGQWPGuC5aFG/exec";

        const formatDate = (dateVal) => {
            if (!dateVal) return '';
            try {
                if (typeof dateVal === 'string') {
                    const cleanStr = dateVal.split('T')[0].split(' ')[0];
                    if (cleanStr.includes('-') || cleanStr.includes('/')) return cleanStr;
                }
                const d = new Date(dateVal);
                if (isNaN(d.getTime())) return String(dateVal); 
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            } catch(e) {
                return String(dateVal);
            }
        };

        const extractText = (html) => {
            if(!html) return "";
            const tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        };

        const copyToClipboard = (text) => {
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-999999px"; textArea.style.top = "-999999px";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); alert('✨ 登登！已成功複製到剪貼簿！'); } catch (err) { alert('🥺 哎呀，複製失敗，請手動選取複製。'); }
            textArea.remove();
        };

        const syncToBackend = (action, data) => {
          const toastId = 'toast-' + Date.now();
          const toast = document.createElement('div');
          toast.id = toastId;
          toast.className = 'fixed bottom-6 right-6 bg-indigo-900/90 backdrop-blur-md text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-indigo-400 animate-modal-pop';
          toast.innerHTML = '<i class="fa-solid fa-train-subway fa-bounce mr-3 text-2xl text-yellow-300"></i> 列車行駛中，正在同步資料...';
          document.body.appendChild(toast);

          fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action, data }) })
          .then(res => res.json())
          .then(result => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            if (!result.success) {
              alert(`❌ 資料庫寫入失敗！\n\n動作：${action}\n錯誤原因：\n${result.error}`);
            } else {
              const successToast = document.createElement('div');
              successToast.className = 'fixed bottom-6 right-6 bg-gradient-to-r from-emerald-400 to-teal-500 text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-white animate-modal-pop';
              successToast.innerHTML = '<i class="fa-solid fa-star fa-spin mr-3 text-2xl text-yellow-200"></i> 同步成功！棒棒的！';
              document.body.appendChild(successToast);
              setTimeout(() => {
                successToast.style.opacity = '0'; successToast.style.transform = 'translateY(20px)'; successToast.style.transition = 'all 0.5s ease-out';
                setTimeout(() => successToast.remove(), 500);
              }, 2500);
            }
          })
          .catch(err => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            alert(`🔌 哎呀，網路斷線了或伺服器無回應！請檢查網路後再試。\n\n詳細資訊: ${err.message}`);
          });
        };

        // 🌟 更新：改良的 Fetch 工具，遇到 403 會提早結束不浪費時間重試
        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    if (!res.ok) {
                        const errData = await res.json().catch(() => ({}));
                        const errMsg = `HTTP error! status: ${res.status}, msg: ${errData.error?.message || 'Unknown'}`;
                        if (res.status === 403 || res.status === 400) {
                            throw new Error(errMsg); 
                        }
                        throw new Error(errMsg);
                    }
                    return await res.json();
                } catch (err) {
                    if (i === retries - 1 || err.message.includes('403') || err.message.includes('400')) throw err;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const calculateDaysLeft = (targetDate) => {
            if (!targetDate) return null;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            if (isNaN(target.getTime())) return null; 
            target.setHours(0,0,0,0);
            return Math.round((target - today) / (1000 * 60 * 60 * 24));
        };

        const getDaysSince = (dateString) => {
            if(!dateString) return 0;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateString);
            if(isNaN(target.getTime())) return 0;
            target.setHours(0,0,0,0);
            return Math.round((today - target) / (1000 * 60 * 60 * 24));
        };

        const isStatusPending = (val) => {
            return val !== undefined && val !== null && String(val).trim() !== "" && String(val).toLowerCase() !== "null";
        };

        const StatusBadge = ({ status }) => {
          let colors = "bg-gray-100 text-gray-600 border-gray-200";
          if (status.includes("發想")) colors = "bg-orange-100 text-orange-700 border-orange-300 shadow-orange-100";
          if (status.includes("發展中") || status.includes("準備中")) colors = "bg-yellow-100 text-yellow-700 border-yellow-400 shadow-yellow-100";
          if (status.includes("施測") || status.includes("確認")) colors = "bg-sky-100 text-sky-700 border-sky-300 shadow-sky-100";
          if (status.includes("寫作中")) colors = "bg-fuchsia-100 text-fuchsia-700 border-fuchsia-300 shadow-fuchsia-100";
          if (status.includes("投稿") || status.includes("完成") || status.includes("接受")) colors = "bg-emerald-100 text-emerald-700 border-emerald-300 shadow-emerald-100";
          if (status.includes("終止")) colors = "bg-slate-200 text-slate-700 border-slate-400 shadow-slate-200 line-through opacity-70";

          return <span className={`px-3 py-1.5 rounded-2xl text-xs font-black shadow-sm border-2 ${colors} flex items-center w-fit`}>{status}</span>;
        };

        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white/80 backdrop-blur-lg rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 ${className}`}>
            {children}
          </div>
        );

        // 🌟 更新：優化 API Key 攔截與模型選單
        const AIAssistantModal = ({ isOpen, onClose, projects, students, geminiApiKey, setGeminiApiKey, geminiModel, setGeminiModel }) => {
            const [query, setQuery] = useState('');
            const [chatHistory, setChatHistory] = useState([
                { role: 'ai', text: '嗨！我是 **MEG 列車長智能助理** 🤖✨\n\n我已經讀取了系統中所有的專案資料、更新日期以及備忘錄內容。您可以問我任何問題，例如：\n* 「幫我整理有哪些專案目前進度落後？」\n* 「備忘錄裡面提到轉投或退稿的專案有哪幾個？」\n* 「請列出下個禮拜死線即將到期的專案。」\n\n請問有什麼我可以幫忙的嗎？' }
            ]);
            const [isLoading, setIsLoading] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [tempKey, setTempKey] = useState(geminiApiKey || '');
            const [tempModel, setTempModel] = useState(geminiModel || 'gemini-1.5-flash');
            const [testResult, setTestResult] = useState(null);
            const chatEndRef = useRef(null);

            useEffect(() => {
                setTempKey(geminiApiKey || '');
                setTempModel(geminiModel || 'gemini-1.5-flash');
            }, [geminiApiKey, geminiModel]);

            useEffect(() => {
                setTempKey(geminiApiKey || '');
            }, [geminiApiKey]);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [chatHistory, isLoading, isOpen, showSettings]);

            const handleTestKey = async () => {
                let clean = tempKey.replace(/[^a-zA-Z0-9_-]/g, '');
                if (!clean) {
                    setTestResult({ success: false, msg: `❌ 請先輸入 API Key。` });
                    return;
                }
                if (clean.length !== 39) {
                    setTestResult({ success: false, msg: `❌ 格式異常：標準 Key 長度應為 39 字元，目前您輸入的是 ${clean.length} 字元。請檢查是否沒複製完整，或多複製了其他文字！` });
                    return;
                }
                setTestResult({ success: null, msg: "⏳ 測試連線中，請稍候..." });
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${clean}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: 'hi' }] }] })
                    });
                    const data = await res.json();
                    if (!res.ok || data.error) {
                        throw new Error(data.error?.message || `HTTP ${res.status}`);
                    }
                    setTestResult({ success: true, msg: "✅ 連線成功！您的 Key 是正確的！請記得點擊下方【儲存】按鈕。" });
                } catch (err) {
                    let errorMsg = `❌ 連線失敗：${err.message}`;
                    if (err.message.includes('403') || err.message.includes('unregistered')) {
                        errorMsg = `❌ 連線失敗 (403 未註冊)：\n金鑰格式完全正確，但該專案尚未開通 Gemini API 權限。\n\n👉 【必殺解法】：\n請回到 Google AI Studio，點擊「Create API key」時，下拉選單務必選擇第一項「Create API key in NEW project」(建立於新專案)，【絕對不要選現有的舊專案】！這樣 Google 才會自動幫您開啟 API 權限！拿新專案的鑰匙來測就一定會過！`;
                    }
                    setTestResult({ success: false, msg: errorMsg });
                }
            };

            const handleAsk = async () => {
                if (!query.trim() || isLoading) return;

                const userText = query.trim();
                setQuery('');
                setChatHistory(prev => [...prev, { role: 'user', text: userText }]);
                setIsLoading(true);

                // 🌟 極度嚴格清洗 API Key：只保留英數字、底線、破折號，殺掉所有隱形字元
                let rawKey = geminiApiKey || '';
                if (typeof rawKey !== 'string') rawKey = String(rawKey);
                const cleanKey = rawKey.replace(/[^a-zA-Z0-9_-]/g, '');

                if (!cleanKey || cleanKey.length < 30) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: `⚠️ **缺少或無效的 API Key！**\n\n系統擷取到的長度異常 (${cleanKey.length} 字元)。請點擊右上角「⚙️ 齒輪」，清空輸入框後重新貼上您的 Key，並使用【測試】功能檢查。` }]);
                    setIsLoading(false);
                    return;
                }

                try {
                    // 🌟 修正傳遞給 AI 的專案屬性對應，讓 AI 能正確讀取資料
                    const cleanProjects = projects.map(p => ({
                        專案名稱: p.title || '無名稱',
                        狀態: p.status || '未知',
                        負責學生: p.studentName || '未知',
                        預估下階段時間: p.nextStageDate || '未設定',
                        備忘錄: p.notes ? extractText(p.notes) : '無'
                    }));

                    const systemPrompt = `你是一個 MEG 研究室進度管理系統的專業 AI 助理「MEG 列車長副手」。
你擁有目前系統內活躍專案的完整資料庫（以 JSON 格式提供）。
請根據這些資料，以友善、專業、鼓勵的語氣回答使用者的問題。
回答請盡量有條理，並使用 Markdown 語法（例如列點、粗體）。如果需要列出多個專案，請排版整齊。
若資料中找不到答案，請誠實告知，不要捏造。

【目前活躍專案資料庫】：
${JSON.stringify(cleanProjects)}`;

                    const payload = {
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    };

                    const targetModel = geminiModel || 'gemini-1.5-flash';
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${cleanKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // 🌟 處理 API 錯誤回傳
                    if (data.error) {
                         throw new Error(`(${data.error.code}) ${data.error.message}`);
                    }

                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，我目前無法產生回答。";
                    setChatHistory(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (err) {
                    console.error("Gemini API Error:", err);
                    let errorMsg = `⚠️ 發生錯誤，無法連接到 Gemini AI。\n\n詳細錯誤：${err.message}`;
                    if (err.message.includes('403') || err.message.includes('unregistered')) {
                        errorMsg = `⚠️ **API Key 無效或未成功傳遞 (403 錯誤)**\n\n系統擷取的長度為 ${cleanKey.length} 字元。\n👉 強烈建議點擊「⚙️ 齒輪」打開設定，使用裡面的**【測試】**按鈕來偵錯！`;
                    }
                    setChatHistory(prev => [...prev, { role: 'ai', text: errorMsg }]);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleAsk();
                }
            };

            if (!isOpen) return null;

            return (
                <ModalPortal>
                    <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm flex items-center justify-end z-[100] sm:p-4 animate-fade-in">
                        <div className="bg-white sm:rounded-[2rem] w-full h-full sm:h-[90vh] sm:max-w-md flex flex-col shadow-[0_20px_50px_rgb(0,0,0,0.3)] overflow-hidden border-4 border-white animate-modal-pop">
                            
                            {/* Header */}

                        <button type="button" onClick={() => execCmd('insertUnorderedList')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition"><i className="fa-solid fa-list-ul"></i></button>

                    </div>
                    <div 
                        ref={editorRef}
                        className="flex-grow p-5 outline-none overflow-y-auto rich-content leading-relaxed"

                        onInput={(e) => onChange(e.currentTarget.innerHTML)}

                  const timeB = Math.max(0, ...activeProjects.filter(p => p.studentId === b.id).map(p => new Date(p.lastUpdate || 0).getTime()));
                  return timeB - timeA;
              } else if (studentSortBy === 'degree') {
                  return (a.degree || '').localeCompare(b.degree || '');
              }
              return 0; 
          });

          let finalAllProjectsList = [...activeProjects];
          if (allProjectsFilter !== "all") {
              finalAllProjectsList = finalAllProjectsList.filter(p => p.status && p.status.includes(allProjectsFilter));
          }
          if (allProjectsSearch) {

                  (p.title && String(p.title).toLowerCase().includes(q)) || 
                  (p.studentName && String(p.studentName).toLowerCase().includes(q)) ||
                  (p.mentors && String(p.mentors).toLowerCase().includes(q))
              );
          }
          finalAllProjectsList.sort((a, b) => {
              if (allProjectsSort === 'lastUpdate_desc') {
                  const tA = a.lastUpdate ? new Date(a.lastUpdate).getTime() : 0;
                  const tB = b.lastUpdate ? new Date(b.lastUpdate).getTime() : 0;
                  if (isNaN(tA) && isNaN(tB)) return 0;
                  if (isNaN(tA)) return 1;
                  if (isNaN(tB)) return -1;
                  return tB - tA;
              }

                  if (isNaN(tA) && isNaN(tB)) return 0;

                  const studentB = students.find(s => s.id === b.studentId)?.name || b.studentName || '';
                  return String(studentA).localeCompare(String(studentB));
              }

                  notes: initialNote,
                  hasConfAccepted: isConfAccepted,

            setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
            syncToBackend('updateProject', updatedProject);
            
            setDraftStatuses(prev => { const n={...prev}; delete n[projectId]; return n; });
            setDraftDescriptions(prev => { const n={...prev}; delete n[projectId]; return n; });
            setDraftNextDates(prev => { const n={...prev}; delete n[projectId]; return n; });

          const handleMarkMemoAsRead = (projectId) => {
             const project = projects.find(p => p.id === projectId);

          return (
            <div className="space-y-8 animate-fade-in pb-20">

                 <ConferencesBoard conferences={conferences} />

              </div>

              <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white/80 backdrop-blur-md p-6 rounded-[2rem] border-2 border-white shadow-sm mb-8 gap-4">
                <div>
                  <h2 className="text-3xl font-black text-indigo-900 tracking-tight flex items-center"><i className="fa-solid fa-ticket text-indigo-400 mr-3 text-2xl -rotate-12"></i> Hi, {student.name}</h2>
                </div>
                <div className="flex flex-wrap gap-3">
                  <button onClick={() => setIsAIOpen(true)} className="px-5 py-2.5 bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white font-black rounded-xl hover:shadow-lg active:scale-95 transition flex items-center shadow-sm">
                      <i className="fa-solid fa-sparkles mr-2 animate-pulse"></i> 問問 Gemini AI

                  {student.contactLink && (

                          <i className="fa-brands fa-facebook-messenger mr-2 text-lg"></i> 私訊指導教授

              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch">
                {myActiveProjects.map(project => {
                   const isUnread = project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true';
                   const daysToNext = calculateDaysLeft(project.nextStageDate);

                      <div className="absolute -top-4 -right-4 bg-orange-500 text-white text-sm font-black px-4 py-2 rounded-2xl shadow-lg flex items-center animate-bounce border-4 border-white z-50">
                        <i className="fa-solid fa-hourglass-half mr-2 fa-spin-pulse"></i> 老師審核中
                      </div>

                    <div className="p-6 md:p-8 flex-grow flex flex-col bg-white rounded-3xl relative z-10">
                      <h3 className="font-black text-2xl text-slate-800 leading-tight mb-3">{project.title}</h3>
                      
                      {project.mentors && (
                          <div className="text-sm font-black text-indigo-600 mb-4 flex items-center bg-indigo-50 w-fit px-3 py-1.5 rounded-lg border border-indigo-100">

                      <button onClick={() => setEditingProjectNotes(project)} className={`w-full mb-6 py-3 font-black rounded-2xl border-[3px] transition-all shadow-sm flex justify-center items-center group active:scale-95 ${isUnread ? 'bg-rose-50 text-rose-600 border-rose-300 animate-pulse' : 'bg-white text-indigo-600 border-indigo-100 hover:bg-indigo-50'}`}>
                         <i className={`fa-solid fa-book-open mr-2 text-lg ${isUnread ? 'text-rose-500' : 'group-hover:text-indigo-500'}`}></i> 開啟專案備忘錄 
                         {isUnread && <span className="ml-3 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full shadow tracking-widest">NEW 指示!</span>}
                      </button>

                      <div className="bg-slate-50 p-5 rounded-3xl border-2 border-slate-200 mt-auto shadow-inner">
                        <label className="text-base font-black text-slate-700 block mb-3 flex items-center"><i className="fa-solid fa-bolt mr-2 text-yellow-500"></i> 更新進度狀態：</label>
                        <div className="flex flex-col gap-4">
                          {(() => {
                              const isPending = isStatusPending(project.pendingStatus);
                              const displayStatus = isPending ? project.pendingStatus : (draftStatuses[project.id] || project.status);
                              return (
                                  <>
                                      <select 
                                        className={`w-full p-3 border-2 rounded-xl font-bold transition-colors outline-none focus:border-indigo-400 ${isPending ? 'border-orange-300 bg-orange-50 text-orange-700' : 'border-slate-200 bg-white text-slate-700'}`} 
                                        value={displayStatus}

                                      >
                                        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                      </select>
                                      
                                      {!draftStatuses[project.id] && !isPending && project.nextStageDate && (
                                          <div className={`p-3 rounded-xl border-2 font-black text-sm flex items-center ${daysToNext !== null && daysToNext < 0 ? 'bg-rose-100 text-rose-700 border-rose-300 animate-pulse' : daysToNext !== null && daysToNext <= 14 ? 'bg-orange-100 text-orange-700 border-orange-300' : 'bg-teal-50 text-teal-700 border-teal-200'}`}>

                                            </button>
                                          </div>
                                        </div>
                                      )}
                                  </>
                              );
                          })()}
                        </div>
                      </div>
                    </div>
                  </Card>
                )})}
                
                <Card className="border-dashed border-4 border-indigo-300 bg-indigo-50/50 flex flex-col items-center justify-center p-8 text-indigo-500 hover:bg-indigo-100 hover:border-indigo-500 hover:text-indigo-700 transition cursor-pointer group min-h-[350px] mt-6 shadow-sm" onClick={() => setIsAddProjectModalOpen(true)}>

              {isAddProjectModalOpen && (

                      <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden flex flex-col animate-modal-pop border-4 border-white">
                              <div className="bg-gradient-to-r from-indigo-500 to-blue-600 p-5 text-white flex justify-between items-center">
                                  <h3 className="font-black text-xl"><i className="fa-solid fa-lightbulb mr-3"></i> 發想新專案</h3>
                                  <button onClick={() => setIsAddProjectModalOpen(false)} className="hover:rotate-90 transition-all"><i className="fa-solid fa-xmark text-2xl"></i></button>
                              </div>
                              <div className="p-6 bg-slate-50 space-y-4">
                                  <div>
                                      <label className="text-sm font-bold text-slate-600 block mb-1">專案名稱 *</label>
                                      <input type="text" className="w-full p-3 border-2 border-slate-200 rounded-xl bg-white font-bold" value={newProject.title} onChange={(e) => setNewProject({...newProject, title: e.target.value})} placeholder="輸入新點子或專案名稱" />
                                  </div>
                                  <div>
                                      <label className="text-sm font-bold text-slate-600 block mb-1">初始狀態</label>
                                      <select className="w-full p-3 border-2 border-slate-200 rounded-xl bg-white font-bold" value={newProject.status} onChange={(e) => setNewProject({...newProject, status: e.target.value})}>
                                          {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                      </select>
                                  </div>
                                  <div>
                                      <label className="text-sm font-bold text-slate-600 block mb-1">初步說明 (至少10字) *</label>
                                      <textarea className="w-full p-3 border-2 border-slate-200 rounded-xl bg-white font-medium resize-none focus:border-indigo-400" rows="3" value={newProject.initialDescription} onChange={(e) => setNewProject({...newProject, initialDescription: e.target.value})} placeholder="請輸入至少10個字的初步說明，這將作為最初始的備忘錄資料..."></textarea>
                                  </div>
                                  <div className="flex justify-end gap-3 mt-6">
                                      <button onClick={() => setIsAddProjectModalOpen(false)} className="px-5 py-2.5 bg-slate-200 text-slate-700 font-bold rounded-xl active:scale-95">取消</button>
                                      <button onClick={handleAddProjectSubmit} className="px-5 py-2.5 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 shadow-md active:scale-95">建立專案</button>
                                  </div>
                              </div>
                          </div>
                      </div>
                  </ModalPortal>
              )}

              <AIAssistantModal 
                  isOpen={isAIOpen} 
                  onClose={() => setIsAIOpen(false)} 
                  projects={projects} 
                  students={students} 
                  geminiApiKey={geminiApiKey}
                  setGeminiApiKey={setGeminiApiKey}
                  geminiModel={geminiModel}
                  setGeminiModel={setGeminiModel}
              />

              <ProjectNotesModal isOpen={!!editingProjectNotes} project={editingProjectNotes} onClose={() => setEditingProjectNotes(null)} isTeacher={false} markAsRead={handleMarkMemoAsRead} />
            </div>
          );
        };

        const App = () => {
          const [currentUser, setCurrentUser] = useState(null); 
          const TEACHER_EMAIL = "composerho@gmail.com"; 
          
          const [students, setStudents] = useState([]); const [projects, setProjects] = useState([]);
          const [conferences, setConferences] = useState([]); const [announcements, setAnnouncements] = useState([]); const [usefulLinks, setUsefulLinks] = useState([]);
          const [marqueeText, setMarqueeText] = useState("歡迎搭乘 MEG 新自強3000 列車！");
          const [isLoading, setIsLoading] = useState(true);

          // 🌟 全域狀態：儲存 Gemini API Key 與 模型 (預設改為純淨名稱)
          const [geminiApiKey, setGeminiApiKey] = useState("");
          const [geminiModel, setGeminiModel] = useState("gemini-1.5-flash");

          const [isMarqueeModalOpen, setIsMarqueeModalOpen] = useState(false);
          const [tempMarquee, setTempMarquee] = useState("");
          
          const [showCelebration, setShowCelebration] = useState(false);
          const [hasCelebrated, setHasCelebrated] = useState(false);

          const openMarqueeManager = () => {
              setTempMarquee(marqueeText);
              setIsMarqueeModalOpen(true);
          };

          useEffect(() => {
              const overlay = document.getElementById('bg-overlay');
              if (overlay) {
                  if (currentUser && currentUser.role !== 'unauthorized') {
                      overlay.className = "fixed top-0 left-0 w-full h-full z-[-1] transition-all duration-1000 bg-white/40 backdrop-blur-[4px]";
                  } else {
                      overlay.className = "fixed top-0 left-0 w-full h-full z-[-1] transition-all duration-1000 bg-transparent backdrop-blur-none";
                  }
              }
          }, [currentUser]);

          useEffect(() => {
              if (currentUser && currentUser.role !== 'unauthorized' && projects.length > 0 && !hasCelebrated) {
                  const relevantProjects = currentUser.role === 'teacher' ? projects : projects.filter(p => p.studentId === currentUser.studentData.id);
                  
                  const hasRecentAcceptance = relevantProjects.some(p => {
                      if (!p.acceptedDate) return false;
                      if (!p.status.includes('已被接受')) return false; 
                      
                      const diffDays = (new Date() - new Date(p.acceptedDate)) / (1000 * 60 * 60 * 24);
                      return diffDays >= 0 && diffDays <= 3; 
                  });

                  if (hasRecentAcceptance) {
                      setHasCelebrated(true); 
                      setShowCelebration(true);
                      
                      const duration = 4000;
                      const end = Date.now() + duration;

                      const frame = () => {
                          if (window.confetti) {
                              window.confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#6366f1', '#ec4899', '#14b8a6', '#f59e0b', '#fbbf24'] });
                              window.confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#6366f1', '#ec4899', '#14b8a6', '#f59e0b', '#fbbf24'] });
                          }
                          if (Date.now() < end) {
                              requestAnimationFrame(frame);
                          }
                      };
                      frame();

                      setTimeout(() => {
                          setShowCelebration(false);
                      }, 5000);
                  }
              }
          }, [currentUser, projects, hasCelebrated]);

          useEffect(() => {
            let isMounted = true;
            
            const timer = setTimeout(() => {
                if(isMounted) setIsLoading(false);
            }, 3000);

            fetch(GAS_API_URL).then(res => res.json()).then(data => {
                if (!isMounted) return;
                if(data.students) setStudents(data.students); 
                if(data.projects) setProjects(data.projects.filter(p => p.isDeleted !== true && p.isDeleted !== 'true'));
                if(data.config && data.config.length > 0) {
                  const marqueeConf = data.config.find(c => c.key === 'marqueeText'); if (marqueeConf) setMarqueeText(marqueeConf.value);
                  const confConfig = data.config.find(c => c.key === 'conferencesList'); if (confConfig && confConfig.value) try { setConferences(JSON.parse(confConfig.value)); } catch(e) {}
                  const annConfig = data.config.find(c => c.key === 'announcementsList'); if (annConfig && annConfig.value) try { setAnnouncements(JSON.parse(annConfig.value)); } catch(e) {}
                  const linkConfig = data.config.find(c => c.key === 'usefulLinksList'); if (linkConfig && linkConfig.value) try { setUsefulLinks(JSON.parse(linkConfig.value)); } catch(e) {}
                  
                  // 🌟 讀取 Gemini API Key 與 模型
                  const geminiConf = data.config.find(c => c.key === 'geminiApiKey'); if (geminiConf) setGeminiApiKey(geminiConf.value);
                  const geminiModelConf = data.config.find(c => c.key === 'geminiModel'); if (geminiModelConf) setGeminiModel(geminiModelConf.value);
                }
                clearTimeout(timer);
                setIsLoading(false);
              }).catch(err => {
                console.error("載入失敗：", err);
                if(isMounted) setIsLoading(false);
              });

              return () => { isMounted = false; };
          }, []);

          if (isLoading) return <div className="min-h-screen flex items-center justify-center flex-col z-10"><img src="https://i.ibb.co/LWGmHR7/unnamed-6.png" alt="MEG Logo" className="w-32 h-32 animate-bounce-soft mb-6 object-contain drop-shadow-2xl" /><h2 className="text-2xl font-black text-indigo-900 bg-white/80 px-6 py-2 rounded-full shadow-sm">列車啟動中...</h2></div>;

          const handleLogin = (email, name, picture) => {
            const userEmail = email.toLowerCase().trim();
            if (userEmail === TEACHER_EMAIL.toLowerCase().trim()) return setCurrentUser({ email: userEmail, name, picture, role: 'teacher', studentData: null });
            const foundStudent = students.find(s => s.email && s.email.toLowerCase().trim() === userEmail);
            if (foundStudent) return setCurrentUser({ email: userEmail, name: foundStudent.name, picture, role: 'student', studentData: foundStudent });
            setCurrentUser({ email: userEmail, name, picture, role: 'unauthorized', studentData: null });
          };

          if (!currentUser) return <LoginScreen onLoginSuccess={handleLogin} />;
          if (currentUser.role === 'unauthorized') return <div className="min-h-screen flex items-center justify-center text-xl font-black text-rose-500 bg-white/80 z-20 absolute inset-0">未授權的乘客，無法進入車廂。</div>;

          return (
            <div className="min-h-screen flex flex-col z-10 relative">
              {showCelebration && (
                  <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-[100] animate-fade-in transition-opacity duration-1000">
                      <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 drop-shadow-[0_10px_20px_rgba(236,72,153,0.5)] animate-bounce-soft tracking-widest text-center px-4 leading-tight">
                          🎉 恭喜新論文被接受~ 🎊
                      </h1>
                  </div>
              )}

              <header className="bg-white/90 backdrop-blur-xl shadow-sm sticky top-0 z-40 p-4 flex justify-between items-center">
                  <h1 className="text-2xl font-black text-indigo-900 flex items-center">
                      <img src="https://i.ibb.co/LWGmHR7/unnamed-6.png" alt="MEG Logo" className="w-10 h-10 mr-3 object-contain" /> MEG-RMS
                      <span className="hidden lg:inline-block ml-4 text-[10px] bg-rose-50 text-rose-600 px-3 py-1 rounded-lg font-black tracking-widest border border-rose-100">(C)Copyright NTUSTMEG 2026，內部系統具機密性請勿外流</span>
                  </h1>
                  
                  <div className="flex items-center gap-4">
                      <div className="hidden sm:flex items-center bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100">
                          {currentUser.picture ? (
                              <img src={currentUser.picture} className="w-8 h-8 rounded-full mr-2 shadow-sm border-2 border-white" alt="avatar" />
                          ) : (
                              <div className="w-8 h-8 rounded-full bg-indigo-500 text-white flex items-center justify-center font-bold mr-2 border-2 border-white">{currentUser.name.charAt(0)}</div>
                          )}
                          <span className="font-bold text-indigo-900 text-sm">{currentUser.name}</span>
                          <span className="text-xs text-indigo-500 ml-2 font-black bg-indigo-100 px-2 py-0.5 rounded-md">{currentUser.role === 'teacher' ? '列車長' : '乘客'}</span>
                      </div>
                      <button onClick={() => { setCurrentUser(null); if(window.changeBackground) window.changeBackground(); }} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-rose-100 hover:text-rose-600 transition shadow-sm">
                          <i className="fa-solid fa-right-from-bracket mr-1"></i> 登出
                      </button>
                  </div>
              </header>

              {marqueeText && (
                  <div className="bg-indigo-600 text-white text-lg font-black py-3 overflow-hidden shadow-inner flex relative z-30">
                       <div className="px-5 bg-rose-500 z-10 flex items-center shadow-[5px_0_15px_rgba(0,0,0,0.2)] whitespace-nowrap tracking-wide">
                           <i className="fa-solid fa-tower-broadcast fa-fade mr-3 text-xl"></i> 列車廣播
                       </div>
                       <div className="whitespace-nowrap animate-marquee flex-1 flex items-center tracking-wide">{marqueeText}</div>
                  </div>
              )}

              <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full z-10 relative">
                {currentUser.role === 'teacher' ? 
                  <TeacherDashboard 
                      projects={projects} setProjects={setProjects} 
                      students={students} setStudents={setStudents} 
                      conferences={conferences} setConferences={setConferences} 
                      announcements={announcements} setAnnouncements={setAnnouncements} 
                      usefulLinks={usefulLinks} setUsefulLinks={setUsefulLinks} 
                      openMarqueeManager={openMarqueeManager}
                      geminiApiKey={geminiApiKey} setGeminiApiKey={setGeminiApiKey}
                      geminiModel={geminiModel} setGeminiModel={setGeminiModel}
                  /> 
                  : 
                  <StudentWorkspace 
                      student={currentUser.studentData} 
                      students={students} setStudents={setStudents} 
                      projects={projects} setProjects={setProjects} 
                      conferences={conferences} 
                      announcements={announcements} 
                      usefulLinks={usefulLinks} 
                      geminiApiKey={geminiApiKey} setGeminiApiKey={setGeminiApiKey}
                      geminiModel={geminiModel} setGeminiModel={setGeminiModel}
                  />
                }
              </main>
              
              <footer className="text-center py-6 text-sm font-black text-slate-500/70 z-10 relative mt-auto">
                 <p>(C)Copyright NTUSTMEG 2026，內部系統具機密性請勿外流</p>
              </footer>

              {isMarqueeModalOpen && (
                  <ModalPortal>
                      <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col animate-modal-pop border-4 border-white">
                              <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-5 text-white flex justify-between items-center">
                                  <h3 className="font-black text-xl"><i className="fa-solid fa-tower-broadcast mr-3"></i> 設定全站跑馬燈廣播</h3>
                                  <button onClick={() => setIsMarqueeModalOpen(false)} className="hover:rotate-90 transition-all"><i className="fa-solid fa-xmark text-2xl"></i></button>
                              </div>
                              <div className="p-6 bg-slate-50">
                                  <textarea className="w-full p-4 border-2 border-slate-200 rounded-xl bg-white font-bold resize-none focus:border-indigo-400" rows="3" placeholder="請輸入廣播訊息..." value={tempMarquee} onChange={(e) => setTempMarquee(e.target.value)}></textarea>
                                  <div className="flex justify-end gap-3 mt-4">
                                      <button onClick={() => setIsMarqueeModalOpen(false)} className="px-5 py-2.5 bg-slate-200 text-slate-700 font-bold rounded-xl active:scale-95">取消</button>
                                      <button onClick={() => {
                                          setMarqueeText(tempMarquee);
                                          syncToBackend('updateConfig', { key: 'marqueeText', value: tempMarquee });
                                          setIsMarqueeModalOpen(false);
                                      }} className="px-5 py-2.5 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 shadow-md active:scale-95">更新廣播</button>
                                  </div>
                              </div>
                          </div>
                      </div>
                  </ModalPortal>
              )}
            </div>
          );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
