                                  <button onClick={() => setDeletingProjectId(project.id)} className="w-12 h-12 flex justify-center items-center bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-2xl font-bold border-2 border-red-100 transition-all">
                                    <i className="fa-solid fa-trash-can text-lg"></i>
                                  </button>
                                )}
                              </div>
                              
                              {deletingProjectId === project.id && (
                                <div className="mt-5 bg-rose-50 border-2 border-rose-200 p-5 rounded-2xl animate-fade-in">
                                  <label className="block text-sm font-black text-rose-800 mb-2"><i className="fa-solid fa-triangle-exclamation mr-1"></i> 請輸入刪除原因 (將同步至學生紀錄)：</label>
                                  <textarea className="w-full p-3 border-2 border-rose-200 rounded-xl focus:border-rose-400 bg-white font-bold text-slate-700 outline-none" rows="2" value={deleteReason} onChange={(e) => setDeleteReason(e.target.value)}></textarea>
                                  <div className="flex justify-end gap-3 mt-4">
                                    <button onClick={() => setDeletingProjectId(null)} className="px-5 py-2.5 bg-white text-slate-600 font-black border-2 border-slate-200 rounded-xl hover:bg-slate-50">取消</button>
                                    <button onClick={handleDeleteProjectSubmit} className="px-5 py-2.5 bg-rose-600 text-white font-black rounded-xl shadow-md hover:bg-rose-700">確定刪除</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* Modal: 幫學生新增專案 */}
              {isAddProjectModalOpen && (
                <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                  <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-modal-pop border-4 border-white">
                    <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-5 text-white flex justify-between items-center">
                      <h3 className="font-black text-lg flex items-center"><i className="fa-solid fa-folder-plus mr-3 animate-bounce-soft"></i> 交付新任務</h3>
                      <button onClick={() => setIsAddProjectModalOpen(false)} className="hover:rotate-90 transition-all"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="p-6 bg-slate-50">
                      <label className="block text-sm font-black text-slate-700 mb-2">專案名稱 *</label>
                      <input type="text" className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-400 mb-5 font-bold outline-none" placeholder="例如：消防逃生VR..." value={newProjectForStudent.title} onChange={(e) => setNewProjectForStudent({...newProjectForStudent, title: e.target.value})} autoFocus />
                      
                      <label className="block text-sm font-black text-slate-700 mb-2">指導學長姐/專家 (可選填)</label>
                      <input type="text" className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-400 mb-5 font-bold outline-none text-indigo-700" placeholder="例如：張博班..." value={newProjectForStudent.mentors} onChange={(e) => setNewProjectForStudent({...newProjectForStudent, mentors: e.target.value})} />

                      <label className="block text-sm font-black text-slate-700 mb-2">初始階段 *</label>
                      <select className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-400 mb-8 font-bold outline-none bg-white" value={newProjectForStudent.status} onChange={(e) => setNewProjectForStudent({...newProjectForStudent, status: e.target.value})}>
                        {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>

                      <div className="flex justify-end gap-3">
                        <button onClick={() => setIsAddProjectModalOpen(false)} className="px-5 py-3 text-slate-600 font-black bg-slate-200 rounded-xl hover:bg-slate-300 active:scale-95">取消</button>
                        <button onClick={handleAddProjectByTeacher} disabled={!newProjectForStudent.title.trim()} className="px-5 py-3 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 disabled:opacity-50 shadow-lg shadow-indigo-200 active:scale-95 flex items-center">確認指派</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // --- 學生工作區 ---
        const StudentWorkspace = ({ student, projects, setProjects, students, setStudents, conferences, announcements, usefulLinks }) => {
          if (!student) {
            return (
              <div className="text-center py-20 flex flex-col items-center justify-center min-h-[50vh]">
                <i className="fa-solid fa-train-subway text-6xl text-indigo-400 mb-6 animate-bounce-soft"></i>
                <h3 className="text-2xl text-indigo-900 font-black bg-white px-6 py-2 rounded-full shadow-sm border border-indigo-100">正在為您整理專屬車廂...</h3>
              </div>
            );
          }

          const myProjects = projects.filter(p => p.studentId === student.id);

          const [draftStatuses, setDraftStatuses] = useState({});
          const [draftDescriptions, setDraftDescriptions] = useState({});
          const [isAddingProject, setIsAddingProject] = useState(false);
          const [newTitle, setNewTitle] = useState("");

          const [isEditingDegree, setIsEditingDegree] = useState(false);
          const [tempDegree, setTempDegree] = useState(student.degree || "");
          
          const [editingProjectNotes, setEditingProjectNotes] = useState(null);

          useEffect(() => {
            if (myProjects.length > 0 && conferences.length > 0) {
              let changed = false;
              const updated = projects.map(p => {
                if (p.studentId === student.id && p.targetConference) {
                  const conf = conferences.find(c => c.id == p.targetConference);
                  if (!conf || calculateDaysLeft(conf.confirmDeadline) < 0) {
                    changed = true;
                    const up = { ...p, targetConference: null };
                    syncToBackend('updateProject', up);
                    return up;
                  }
                }
                return p;
              });
              if (changed) setProjects(updated);
            }
          }, [myProjects.length, conferences.length]);

          const handleSelectChange = (projectId, value) => setDraftStatuses(prev => ({ ...prev, [projectId]: value }));
          const handleDescriptionChange = (projectId, value) => {
            if (value.length <= 300) setDraftDescriptions(prev => ({ ...prev, [projectId]: value }));
          };

          const handleSubmitRequest = (projectId, currentStatus) => {
            const newStatus = draftStatuses[projectId];
            const newDesc = draftDescriptions[projectId] || '';
            if (newStatus && newStatus !== currentStatus) {
              const project = projects.find(p => p.id === projectId);
              if (!project) return;
              
              // 加入 isNewProgressUpdate 標記與 systemUrl 給 GAS 發信使用
              const updatedProject = { 
                  ...project, 
                  pendingStatus: newStatus, 
                  pendingDescription: newDesc,
                  isNewProgressUpdate: true,
                  systemUrl: window.location.href
              };

              setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
              syncToBackend('updateProject', updatedProject);

              setDraftStatuses(prev => { const n = {...prev}; delete n[projectId]; return n; });
              setDraftDescriptions(prev => { const n = {...prev}; delete n[projectId]; return n; });
            }
          };

          const handleAssignConference = (projectId, confId) => {
             const project = projects.find(p => p.id === projectId);
             const updated = { ...project, targetConference: confId || null };
             setProjects(projects.map(p => p.id === projectId ? updated : p));
             syncToBackend('updateProject', updated);
          };

          const saveDegree = () => {
             const updated = { ...student, degree: tempDegree };
             setStudents(students.map(s => s.id === student.id ? updated : s));
             syncToBackend('updateStudent', updated);
             setIsEditingDegree(false);
          };

          const handleAddProject = () => {
            if(!newTitle.trim()) return;
            const newProj = {
              id: Date.now().toString(), studentId: student.id, studentName: student.name,
              title: newTitle.trim(), status: '💭 概念發想未經報告', mentors: '',
              pendingStatus: null, pendingDescription: null, targetConference: null,
              notes: '', hasUnreadMemo: false, lastUpdate: new Date().toISOString().split('T')[0]
            };
            setProjects([...projects, newProj]);
            syncToBackend('addProject', newProj);
            setIsAddingProject(false);
            setNewTitle('');
          };

          const handleMarkMemoAsRead = (projectId) => {
             const project = projects.find(p => p.id === projectId);
             if (project && (project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true')) {
                 const updated = { ...project, hasUnreadMemo: false };
                 setProjects(projects.map(p => p.id === projectId ? updated : p));
                 syncToBackend('updateProject', updated);
             }
          };

          return (
            <div className="space-y-8 animate-fade-in pb-20">
              <AchievementDashboard projects={projects} students={students} />

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                 <AnnouncementsBoard announcements={announcements} />
                 <UsefulLinksBoard links={usefulLinks} />
              </div>

              {/* 學生資訊與聯絡列 */}
              <div className="flex flex-col md:flex-row justify-between items-end md:items-center bg-white/80 backdrop-blur-md p-6 rounded-[2rem] border-2 border-white shadow-sm mb-8">
                <div>
                  <div className="flex items-center gap-4">
                    <h2 className="text-3xl font-black text-indigo-900 tracking-tight flex items-center">
                        <i className="fa-solid fa-ticket text-indigo-400 mr-3 text-2xl -rotate-12"></i>
                        Hi, {student.name}
                    </h2>
                    {isEditingDegree ? (
                      <div className="flex items-center bg-indigo-50 border-2 border-indigo-200 rounded-full pl-3 pr-1 py-1 shadow-inner">
                        <input type="text" className="text-sm w-16 bg-transparent outline-none text-indigo-900 font-black" value={tempDegree} onChange={e=>setTempDegree(e.target.value)} autoFocus />
                        <button onClick={saveDegree} className="bg-indigo-500 hover:bg-indigo-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs ml-1 shadow"><i className="fa-solid fa-check"></i></button>
                        <button onClick={()=>setIsEditingDegree(false)} className="bg-slate-300 hover:bg-slate-400 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs ml-1"><i className="fa-solid fa-xmark"></i></button>
                      </div>
                    ) : (
                      <span 
                        onClick={() => { setTempDegree(student.degree); setIsEditingDegree(true); }}
                        className="text-sm bg-gradient-to-r from-indigo-100 to-purple-100 text-indigo-900 px-4 py-1.5 rounded-full cursor-pointer hover:shadow-md transition-all font-black flex items-center border border-indigo-200 tracking-wider"
                      >
                        {student.degree} <i className="fa-solid fa-pen ml-2 text-[10px] opacity-50"></i>
                      </span>
                    )}
                  </div>
                  <p className="text-slate-500 text-sm mt-3 font-bold bg-slate-100 inline-block px-3 py-1 rounded-lg">請確實更新進度，並留意研討會最後確認期限喔！🌟</p>
                </div>
                <div className="flex gap-3 mt-4 md:mt-0">
                  {student.contactLink && student.contactLink !== '#' && student.contactLink.trim() !== '' ? (
                    <a href={student.contactLink} target="_blank" rel="noopener noreferrer" className="px-6 py-3 bg-blue-500 text-white rounded-2xl font-black shadow-lg shadow-blue-200 hover:bg-blue-600 hover:-translate-y-1 transition-all flex items-center active:scale-95 border-b-4 border-blue-700">
                      <i className="fa-solid fa-paper-plane mr-2 animate-bounce-soft"></i> 聯繫指導教授
                    </a>
                  ) : (
                    <button className="px-6 py-3 bg-slate-200 text-slate-400 rounded-2xl font-black cursor-not-allowed flex items-center border-b-4 border-slate-300">
                      <i className="fa-solid fa-paper-plane mr-2"></i> 老師尚未設定連結
                    </button>
                  )}
                </div>
              </div>

              {/* 專案卡片列表 */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                {myProjects.map(project => {
                   let confInfoNode = null;
                   if (project.targetConference) {
                     const conf = conferences.find(c => c.id == project.targetConference);
                     if (conf) {
                       const days = calculateDaysLeft(conf.confirmDeadline);
                       if (days !== null) {
                         if (days < 0) {
                           confInfoNode = <div className="mt-3 text-xs font-black text-rose-700 bg-rose-50 p-3 rounded-xl border-2 border-rose-200"><i className="fa-solid fa-skull-crossbones mr-1"></i> 已超過老師確認死線！請盡快聯繫老師。</div>;
                         } else if (days <= 14) {
                           confInfoNode = <div className="mt-3 text-xs font-black text-rose-600 bg-rose-50 p-3 rounded-xl border-2 border-rose-300 animate-pulse"><i className="fa-solid fa-fire mr-1 text-rose-500"></i> 警報：距離確認死線 ({conf.confirmDeadline}) 只剩 {days} 天！</div>;
                         } else {
                           confInfoNode = <div className="mt-3 text-xs font-bold text-teal-700 bg-teal-50 p-3 rounded-xl border-2 border-teal-100"><i className="fa-solid fa-leaf mr-1"></i> 距離確認死線 ({conf.confirmDeadline}) 還有 {days} 天，繼續保持！</div>;
                         }
                       }
                     }
                   }
                   
                   const isUnread = project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true';

                   return (
                  <Card key={project.id} className="relative flex flex-col border-t-[8px] border-t-indigo-400">
                    {project.pendingStatus && (
                      <div className="absolute -top-5 -right-2 bg-orange-500 text-white text-sm font-black px-4 py-2 rounded-2xl shadow-lg flex items-center animate-bounce-soft border-4 border-white z-10">
                        <i className="fa-solid fa-hourglass-half mr-2 fa-spin-pulse"></i> 老師審核中
                      </div>
                    )}
                    <div className="p-6 md:p-8 flex-grow flex flex-col">
                      <h3 className="font-black text-2xl text-slate-800 leading-tight mb-4">{project.title}</h3>
                      
                      {project.mentors && project.mentors.trim() !== '' && (
                         <div className="mb-4 text-sm text-indigo-700 bg-indigo-50 px-4 py-2 rounded-xl border-2 border-indigo-100 inline-flex font-black w-fit items-center shadow-inner">
                             <i className="fa-solid fa-user-astronaut mr-2 text-indigo-400 text-lg"></i> 專家/學長姐：{project.mentors}
                         </div>
                      )}

                      <div className="mb-6">
                         <StatusBadge status={project.status} />
                      </div>

                      <button 
                        onClick={() => setEditingProjectNotes(project)} 
                        className={`w-full mb-6 py-3 font-black rounded-2xl border-[3px] transition-all shadow-sm flex justify-center items-center group active:scale-95 ${isUnread ? 'bg-rose-50 text-rose-600 border-rose-300 animate-pulse hover:bg-rose-100 hover:border-rose-400' : 'bg-white text-indigo-600 border-indigo-100 hover:bg-indigo-50 hover:border-indigo-300'}`}
                      >
                         <i className={`fa-solid fa-book-sparkles mr-2 text-lg ${isUnread ? 'animate-bounce text-rose-500' : 'group-hover:text-indigo-500 transition-colors'}`}></i> 
                         開啟專案備忘錄 
                         {isUnread && <span className="ml-3 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full shadow animate-none tracking-widest">NEW 指示!</span>}
                      </button>

                      <div className="mb-6 bg-gradient-to-r from-teal-50 to-emerald-50 p-5 rounded-3xl border-2 border-teal-100">
                        <label className="text-sm font-black text-teal-800 block mb-2 flex items-center">
                          <i className="fa-solid fa-flag-checkered mr-2 text-teal-500"></i> 預計投稿研討會目標
                        </label>
                        <select 
                          className="w-full text-sm p-3 border-2 border-white rounded-xl focus:border-teal-400 outline-none bg-white font-bold text-slate-700 shadow-sm"
                          value={project.targetConference || ""}
                          onChange={(e) => handleAssignConference(project.id, e.target.value)}
                        >
                          <option value="">-- 尚未決定 / 不投研討會 --</option>
                          {conferences.map(c => (
                            <option key={c.id} value={c.id}>{c.name} (死線: {c.confirmDeadline})</option>
                          ))}
                        </select>
                        {confInfoNode}
                      </div>

                      <div className="bg-slate-50 p-5 rounded-3xl border-2 border-slate-200 mt-auto shadow-inner">
                        <label className="text-base font-black text-slate-700 block mb-3 flex items-center">
                            <i className="fa-solid fa-bolt mr-2 text-yellow-500"></i> 更新進度狀態：
                        </label>
                        <div className="flex flex-col gap-4">
                          <select 
                            className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-indigo-400 outline-none bg-white font-bold disabled:bg-slate-200 disabled:text-slate-400 disabled:border-slate-300 shadow-sm transition-colors text-slate-800"
                            value={project.pendingStatus || draftStatuses[project.id] || project.status}
                            onChange={(e) => handleSelectChange(project.id, e.target.value)}
                            disabled={project.pendingStatus !== null}
                          >
                            {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                          
                          {draftStatuses[project.id] && draftStatuses[project.id] !== project.status && !project.pendingStatus && (
                            <div className="bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-200 shadow-sm animate-fade-in relative">
                              <div className="absolute -top-3 left-4 bg-indigo-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md">Step 2</div>
                              <label className="text-sm font-black text-indigo-900 block mb-2">給老師的話 <span className="text-indigo-400 font-bold">(選填)</span></label>
                              <textarea
                                className="w-full text-sm p-3 border-2 border-white rounded-xl focus:border-indigo-400 outline-none bg-white mb-3 resize-none font-medium shadow-sm"
                                rows="2"
                                placeholder="老師我做完問卷了，請過目..."
                                value={draftDescriptions[project.id] || ''}
                                onChange={(e) => handleDescriptionChange(project.id, e.target.value)}
                              ></textarea>
                              <div className="flex justify-end">
                                <button onClick={() => handleSubmitRequest(project.id, project.status)} className="px-5 py-2.5 bg-indigo-600 text-white text-sm font-black rounded-xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 active:scale-95 flex items-center transition-all">
                                  <i className="fa-solid fa-paper-plane mr-2 animate-bounce-soft"></i> 送出審核並通知老師
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                        
                        {project.pendingStatus && (
                          <div className="mt-4 flex items-start text-sm text-orange-700 bg-orange-100 p-3 rounded-xl border-2 border-orange-200 font-bold">
                              <i className="fa-solid fa-circle-info mt-0.5 mr-2 text-orange-500"></i>
                              <p>等待老師確認中，這段期間無法再次更改狀態喔。</p>
                          </div>
                        )}
                      </div>
                    </div>
                  </Card>
                )})}

                <Card onClick={() => setIsAddingProject(true)} className="border-dashed border-4 border-slate-300 bg-white/40 flex flex-col items-center justify-center p-10 text-slate-500 hover:bg-indigo-50/80 hover:border-indigo-300 hover:text-indigo-600 transition-all cursor-pointer group min-h-[350px]">
                  <div className="w-20 h-20 bg-white rounded-[2rem] shadow-md flex items-center justify-center mb-5 group-hover:scale-110 group-hover:rotate-12 transition-all duration-300 border-2 border-slate-100 group-hover:border-indigo-200">
                    <i className="fa-solid fa-plus text-3xl text-indigo-400"></i>
                  </div>
                  <span className="font-black text-2xl mb-2">發想新專案</span>
                  <p className="text-sm font-bold opacity-70 bg-white px-4 py-1.5 rounded-full shadow-sm">建立新的專案並提交給老師</p>
                </Card>
              </div>

              {/* Modal: 建立新專案 */}
              {isAddingProject && (
                <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                  <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden animate-modal-pop border-4 border-white">
                    <div className="bg-gradient-to-r from-indigo-500 to-indigo-600 p-5 text-white flex justify-between items-center">
                      <h3 className="font-black text-lg flex items-center"><i className="fa-solid fa-rocket mr-3 animate-bounce-soft"></i> 發想新專案</h3>
                      <button onClick={() => setIsAddingProject(false)} className="hover:rotate-90 transition-all"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="p-6 bg-slate-50">
                      <label className="block text-sm font-black text-slate-700 mb-2">請為你的新專案取個響亮的名稱！</label>
                      <input type="text" className="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-indigo-400 mb-8 bg-white font-bold text-lg outline-none shadow-inner" placeholder="例如：消防逃生VR..." value={newTitle} onChange={(e) => setNewTitle(e.target.value)} autoFocus />
                      <div className="flex justify-end gap-3">
                        <button onClick={() => setIsAddingProject(false)} className="px-5 py-3 text-slate-600 font-black bg-slate-200 rounded-xl hover:bg-slate-300 active:scale-95 transition-all">取消</button>
                        <button onClick={handleAddProject} disabled={!newTitle.trim()} className="px-5 py-3 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 disabled:opacity-50 shadow-lg shadow-indigo-200 active:scale-95 transition-all flex items-center"><i className="fa-solid fa-check mr-2"></i> 確認建立</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 專案備忘錄 Modal (學生端) */}
              <ProjectNotesModal 
                 isOpen={!!editingProjectNotes} project={editingProjectNotes} 
                 onClose={() => setEditingProjectNotes(null)} 
                 isTeacher={false} markAsRead={handleMarkMemoAsRead}
              />
            </div>
          );
        };

        // --- 主應用程式 ---
        const App = () => {
          const [currentUser, setCurrentUser] = useState(null); 
          const TEACHER_EMAIL = "composerho@gmail.com"; 
          
          const [students, setStudents] = useState([]);
          const [projects, setProjects] = useState([]);
          const [conferences, setConferences] = useState([]); 
          const [announcements, setAnnouncements] = useState([]);
          const [usefulLinks, setUsefulLinks] = useState([]);
          const [marqueeText, setMarqueeText] = useState("歡迎搭乘 MEG 新自強3000 列車，請各位乘客繫好安全帶準備出發！");
          const [isLoading, setIsLoading] = useState(true);
          const [isMarqueeModalOpen, setIsMarqueeModalOpen] = useState(false);
          const [tempMarquee, setTempMarquee] = useState("");

          useEffect(() => {
            fetch(GAS_API_URL)
              .then(res => res.json())
              .then(data => {
                if(data.students) setStudents(data.students);
                if(data.projects) setProjects(data.projects);
                
                if(data.config && data.config.length > 0) {
                  const marqueeConf = data.config.find(c => c.key === 'marqueeText');
                  if (marqueeConf) setMarqueeText(marqueeConf.value);
                  const confConfig = data.config.find(c => c.key === 'conferencesList');
                  if (confConfig && confConfig.value) { try { setConferences(JSON.parse(confConfig.value)); } catch(e) {} }
                  const annConfig = data.config.find(c => c.key === 'announcementsList');
                  if (annConfig && annConfig.value) { try { setAnnouncements(JSON.parse(annConfig.value)); } catch(e) {} }
                  const linkConfig = data.config.find(c => c.key === 'usefulLinksList');
                  if (linkConfig && linkConfig.value) { try { setUsefulLinks(JSON.parse(linkConfig.value)); } catch(e) {} }
                }
                setTimeout(() => setIsLoading(false), 800); // 稍微延遲讓 loading 動畫跑一下
              })
              .catch(err => {
                console.error("連線失敗:", err);
                setMarqueeText("無法連線到資料庫，請檢查網路。");
                setIsLoading(false);
              });
          }, []);

          if (isLoading) {
            return (
              <div className="min-h-screen bg-shapes flex items-center justify-center flex-col relative z-10">
                <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center shadow-xl animate-bounce-soft mb-6 border-4 border-indigo-100">
                    <i className="fa-solid fa-train-subway text-indigo-500 text-6xl"></i>
                </div>
                <h2 className="text-2xl font-black text-indigo-900 bg-white/80 px-6 py-2 rounded-full backdrop-blur-sm shadow-sm">列車啟動中... 正在連接資料庫 🚂</h2>
              </div>
            );
          }

          const handleLogin = (email, name, picture) => {
            const userEmail = email.toLowerCase().trim();
            if (userEmail === TEACHER_EMAIL.toLowerCase().trim()) {
              setCurrentUser({ email: userEmail, name, role: 'teacher', studentData: null });
              return;
            }
            const foundStudent = students.find(s => s.email && s.email.toLowerCase().trim() === userEmail);
            if (foundStudent) {
              setCurrentUser({ email: userEmail, name: foundStudent.name, role: 'student', studentData: foundStudent });
              return;
            }
            setCurrentUser({ email: userEmail, name, role: 'unauthorized', studentData: null });
          };

          const handleLogout = () => setCurrentUser(null);

          if (!currentUser) return <LoginScreen onLoginSuccess={handleLogin} students={students} />;
          if (currentUser.role === 'unauthorized') return (
             <div className="min-h-screen bg-shapes flex items-center justify-center p-4 relative z-10"><div className="bg-white/90 backdrop-blur-md p-10 rounded-[3rem] shadow-2xl text-center max-w-sm border-[6px] border-rose-100 animate-modal-pop"><div className="w-24 h-24 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-ban text-rose-500 text-5xl"></i></div><h2 className="text-3xl font-black text-slate-800 mb-3">未授權的乘客</h2><p className="font-bold text-slate-500 mb-6">您的車票無法進入此包廂，請聯絡列車長。</p><button onClick={handleLogout} className="px-8 py-3 bg-slate-800 text-white font-black rounded-2xl w-full active:scale-95 transition-all shadow-md">返回車站</button></div></div>
          );

          return (
            <div className="min-h-screen flex flex-col relative z-10">
              {/* 跑馬燈 */}
              <div className="bg-indigo-950 text-white px-4 py-2.5 flex items-center overflow-hidden border-b-[6px] border-rose-500 relative shadow-md">
                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/diagonal-stripes.png')] opacity-10"></div>
                <span className="bg-rose-500 text-xs font-black px-3 py-1.5 rounded-full shadow-inner text-white mr-4 shrink-0 flex items-center z-10 tracking-widest"><i className="fa-solid fa-tower-broadcast mr-2 animate-pulse"></i> LIVE 廣播</span>
                <div className="w-full relative whitespace-nowrap overflow-hidden flex items-center text-sm font-bold tracking-wide"><div className="animate-marquee">{marqueeText}</div></div>
              </div>

              {/* 導覽列 */}
              <header className="bg-white/80 backdrop-blur-xl shadow-sm sticky top-0 z-40 border-b border-white">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
                  <div className="flex items-center group cursor-pointer">
                    <div className="bg-gradient-to-br from-indigo-500 to-purple-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center mr-4 shadow-md group-hover:rotate-12 transition-transform"><i className="fa-solid fa-train-subway text-2xl"></i></div>
                    <div><h1 className="text-2xl font-black text-indigo-900 tracking-tight">MEG-RMS</h1><p className="text-[10px] text-indigo-500 font-black tracking-widest uppercase bg-indigo-50 px-2 rounded-md border border-indigo-100 w-fit mt-0.5">新自強3000列車</p></div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="text-right hidden sm:block bg-slate-50 px-4 py-1.5 rounded-2xl border-2 border-slate-100">
                      <div className="text-sm font-black text-indigo-900">{currentUser.name || (currentUser.role === 'teacher' ? '列車長 (老師)' : currentUser.studentData.name)}</div>
                      <div className="text-[10px] font-bold text-slate-500">{currentUser.email}</div>
                    </div>
                    <button onClick={handleLogout} className="w-10 h-10 bg-slate-100 text-slate-600 font-bold rounded-2xl hover:bg-rose-100 hover:text-rose-600 transition-colors border-2 border-slate-200 hover:border-rose-200 flex items-center justify-center active:scale-95" title="下車登出"><i className="fa-solid fa-right-from-bracket text-lg"></i></button>
                  </div>
                </div>
              </header>

              {/* 主要內容區 */}
              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full relative z-10">
                {currentUser.role === 'teacher' ? (
                  <TeacherDashboard 
                    projects={projects} setProjects={setProjects} students={students} setStudents={setStudents}
                    conferences={conferences} setConferences={setConferences} announcements={announcements} setAnnouncements={setAnnouncements}
                    usefulLinks={usefulLinks} setUsefulLinks={setUsefulLinks} openMarqueeManager={() => { setTempMarquee(marqueeText); setIsMarqueeModalOpen(true); }}
                  />
                ) : (
                  <StudentWorkspace 
                    student={currentUser.studentData} students={students} setStudents={setStudents} projects={projects} setProjects={setProjects}
                    conferences={conferences} announcements={announcements} usefulLinks={usefulLinks}
                  />
                )}
              </main>

              {/* Modal: 廣播跑馬燈 */}
              {isMarqueeModalOpen && (
                <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
                    <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden animate-modal-pop border-4 border-white">
                        <div className="bg-gradient-to-r from-rose-500 to-pink-500 p-5 text-white flex justify-between items-center">
                            <h3 className="font-black text-xl tracking-wide"><i className="fa-solid fa-tower-broadcast mr-3 animate-bounce-soft"></i>設定全車廣播</h3>
                            <button onClick={()=>setIsMarqueeModalOpen(false)} className="hover:rotate-90 transition-all w-8 h-8 rounded-full bg-white/20 flex justify-center items-center"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                        <div className="p-6 bg-slate-50">
                            <label className="block font-black text-slate-700 mb-3 text-sm">請輸入要廣播的跑馬燈內容：</label>
                            <textarea className="w-full p-4 border-2 border-slate-200 rounded-2xl shadow-inner focus:border-rose-400 outline-none font-bold text-slate-800 bg-white" rows="4" value={tempMarquee} onChange={(e) => setTempMarquee(e.target.value)}></textarea>
                            <div className="flex justify-end gap-3 mt-5">
                                <button onClick={()=>setIsMarqueeModalOpen(false)} className="px-5 py-2.5 bg-slate-200 text-slate-600 font-black rounded-xl hover:bg-slate-300 active:scale-95">取消</button>
                                <button onClick={() => { setMarqueeText(tempMarquee); setIsMarqueeModalOpen(false); syncToBackend('updateConfig', { key: 'marqueeText', value: tempMarquee });}} className="px-6 py-2.5 bg-rose-500 text-white font-black rounded-xl shadow-md hover:bg-rose-600 active:scale-95 flex items-center"><i className="fa-solid fa-bullhorn mr-2"></i> 發布廣播</button>
                            </div>
                        </div>
                    </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
