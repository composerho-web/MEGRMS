<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEG新自強3000列車 - 進度管理系統</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-150%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 25s linear infinite;
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STATUSES = [
          "💭 概念發想未經報告", "✅ 報告後老師確認", "🛠️ 研究與遊戲發展中", 
          "🎯 PILOT完成", "📤 研討會已投稿", "📋 期刊施測準備中", 
          "✍️ 期刊寫作中", "🎉 期刊已投稿", "📊 學位論文施測中", 
          "📜 學位論文撰寫中", "📌 其他"
        ];

        // 🌟 您的 API 網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwvFe7geACFOL5yRauhX8WiBqafBLJiOj7CSPB6PNgoWkVqHeIVUS-wxGQWPGuC5aFG/exec";

        // 通用複製剪貼簿函式
        const copyToClipboard = (text) => {
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert('✅ 已成功複製到剪貼簿！');
            } catch (err) {
                alert('❌ 複製失敗，請手動選取複製。');
            }
            textArea.remove();
        };

        const syncToBackend = (action, data) => {
          const toastId = 'toast-' + Date.now();
          const toast = document.createElement('div');
          toast.id = toastId;
          toast.className = 'fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-2xl z-50 text-sm animate-fade-in flex items-center border border-gray-700';
          toast.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-3 text-indigo-400"></i> 正在同步至資料庫...';
          document.body.appendChild(toast);

          fetch(GAS_API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data })
          })
          .then(res => res.json())
          .then(result => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();

            if (!result.success) {
              alert(`❌ 資料庫寫入失敗！\n\n動作：${action}\n錯誤原因：\n${result.error}`);
              console.error("Backend Error:", result.error);
            } else {
              const successToast = document.createElement('div');
              successToast.className = 'fixed bottom-4 right-4 bg-green-600 text-white px-4 py-3 rounded-lg shadow-2xl z-50 text-sm animate-fade-in flex items-center border border-green-500';
              successToast.innerHTML = '<i class="fa-solid fa-check mr-3"></i> 同步成功！';
              document.body.appendChild(successToast);
              setTimeout(() => {
                successToast.style.opacity = '0';
                successToast.style.transition = 'opacity 0.5s';
                setTimeout(() => successToast.remove(), 500);
              }, 2000);
            }
          })
          .catch(err => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            console.error("同步例外錯誤:", err);
            alert(`❌ 網路連線異常或 API 網址失效！\n\n詳細資訊: ${err.message}`);
          });
        };

        const calculateDaysLeft = (targetDate) => {
            if (!targetDate) return null;
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            if (isNaN(target.getTime())) return null; 
            target.setHours(0,0,0,0);
            return Math.round((target - today) / (1000 * 60000 * 60 * 24));
        };

        const StatusBadge = ({ status }) => {
          let bgColor = "bg-gray-100 text-gray-800 border-gray-200";
          if (status.includes("概念發想")) bgColor = "bg-orange-100 text-orange-800 border-orange-200";
          if (status.includes("發展中") || status.includes("準備中")) bgColor = "bg-yellow-100 text-yellow-800 border-yellow-200";
          if (status.includes("施測") || status.includes("確認")) bgColor = "bg-blue-100 text-blue-800 border-blue-200";
          if (status.includes("寫作中")) bgColor = "bg-purple-100 text-purple-800 border-purple-200";
          if (status.includes("投稿") || status.includes("完成")) bgColor = "bg-green-100 text-green-800 border-green-200";

          return (
            <span className={`px-3 py-1 rounded-full text-xs font-semibold shadow-sm border ${bgColor}`}>
              {status}
            </span>
          );
        };

        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden ${className}`}>
            {children}
          </div>
        );

        // 🌟 專案備忘錄 Modal (老師可編輯，學生唯讀並解除閃爍警示)
        const ProjectNotesModal = ({ isOpen, onClose, project, onSave, isTeacher, markAsRead }) => {
            const [notes, setNotes] = useState("");
            
            useEffect(() => {
                if (isOpen && project) {
                    setNotes(project.notes || "");
                    // 若是學生開啟，且帶有未讀標記，則觸發已讀
                    if (!isTeacher && (project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true') && markAsRead) {
                        markAsRead(project.id);
                    }
                }
            }, [isOpen, project, isTeacher]);

            if (!isOpen || !project) return null;

            return (
                <div className="fixed inset-0 bg-gray-900/80 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl w-full max-w-3xl flex flex-col h-[80vh] shadow-2xl overflow-hidden border border-gray-200">
                        <div className={`p-4 text-white flex justify-between items-center shadow ${isTeacher ? 'bg-indigo-700' : 'bg-gray-800'}`}>
                            <h3 className="font-bold text-lg flex items-center">
                                <i className="fa-solid fa-book-open mr-2"></i> 【{project.title}】專案備忘錄 {isTeacher ? "(編輯模式)" : "(唯讀模式)"}
                            </h3>
                            <button onClick={onClose} className="hover:text-gray-300 transition"><i className="fa-solid fa-xmark text-2xl"></i></button>
                        </div>
                        <div className="p-6 flex-grow flex flex-col bg-gray-50">
                            <label className="text-sm font-bold text-gray-700 mb-2">
                                {isTeacher ? "在此輸入給學生的專案備忘錄與指示（學生僅能檢視）：" : "老師給的專案備忘錄與指示："}
                            </label>
                            <textarea 
                                className={`flex-grow p-4 border rounded-xl shadow-inner leading-relaxed resize-none ${isTeacher ? 'border-gray-300 focus:ring-2 focus:ring-indigo-500 bg-white text-gray-800' : 'border-gray-200 bg-gray-100 text-gray-700 cursor-default outline-none'}`} 
                                value={notes} 
                                onChange={(e) => isTeacher && setNotes(e.target.value)}
                                placeholder={isTeacher ? "開始輸入專案備忘錄與修改方向..." : "目前沒有備忘錄。"}
                                readOnly={!isTeacher}
                            ></textarea>
                            <div className="flex justify-between mt-5">
                                <button onClick={() => copyToClipboard(notes)} className="px-5 py-2.5 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition flex items-center shadow-sm border border-gray-300">
                                    <i className="fa-regular fa-copy mr-2"></i> 全篇複製
                                </button>
                                <div className="flex gap-3">
                                    {isTeacher ? (
                                        <>
                                            <button onClick={onClose} className="px-5 py-2.5 bg-white border border-gray-300 text-gray-600 font-bold rounded-lg hover:bg-gray-50 transition">取消</button>
                                            <button onClick={() => onSave(project.id, notes)} className="px-5 py-2.5 bg-indigo-600 text-white font-bold rounded-lg shadow hover:bg-indigo-700 transition flex items-center">
                                                <i className="fa-solid fa-floppy-disk mr-2"></i> 儲存並關閉
                                            </button>
                                        </>
                                    ) : (
                                        <button onClick={onClose} className="px-8 py-2.5 bg-gray-800 text-white font-bold rounded-lg shadow hover:bg-gray-900 transition flex items-center">
                                            關閉
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 🌟 成就儀表板 (動態牆)
        const AchievementDashboard = ({ projects, students }) => {
            const totalProjects = projects.length;
            const totalStudents = students.length;
            const confSubmitted = projects.filter(p => p.status.includes('研討會已投稿')).length;
            const journalSubmitted = projects.filter(p => p.status.includes('期刊已投稿')).length;
            const pilotCompleted = projects.filter(p => p.status.includes('PILOT完成')).length;
            const gameDev = projects.filter(p => p.status.includes('發展中')).length;
            const journalWriting = projects.filter(p => p.status.includes('寫作中')).length;

            return (
                <Card className="bg-gradient-to-br from-indigo-600 to-blue-800 border-none shadow-lg text-white mb-6">
                    <div className="p-6 relative overflow-hidden">
                        <i className="fa-solid fa-train absolute -right-4 -bottom-4 text-9xl text-white opacity-10"></i>
                        <h2 className="text-xl font-bold mb-5 flex items-center">
                            <i className="fa-solid fa-trophy text-yellow-300 mr-3 text-2xl"></i> 研究室榮譽榜與動態牆
                        </h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 relative z-10">
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">乘客總數</span>
                                <span className="text-2xl font-black">{totalStudents}</span>
                            </div>
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">專案總數</span>
                                <span className="text-2xl font-black">{totalProjects}</span>
                            </div>
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">研討會已投稿</span>
                                <span className="text-2xl font-black text-green-300">{confSubmitted}</span>
                            </div>
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">期刊已投稿</span>
                                <span className="text-2xl font-black text-green-300">{journalSubmitted}</span>
                            </div>
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">PILOT完成</span>
                                <span className="text-2xl font-black text-yellow-300">{pilotCompleted}</span>
                            </div>
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">遊戲發展中</span>
                                <span className="text-2xl font-black text-yellow-300">{gameDev}</span>
                            </div>
                            <div className="bg-white/10 backdrop-blur-sm p-3 rounded-xl border border-white/20 flex flex-col justify-center text-center">
                                <span className="text-indigo-100 text-[11px] font-bold mb-1">期刊寫作中</span>
                                <span className="text-2xl font-black text-purple-300">{journalWriting}</span>
                            </div>
                        </div>
                    </div>
                </Card>
            );
        };

        // --- 登入介面元件 ---
        const LoginScreen = ({ onLoginSuccess }) => {
          const [devEmail, setDevEmail] = useState('composerho@gmail.com');

          useEffect(() => {
            const CLIENT_ID = "701247251903-878bdbdelfebt7tgm6sdlndtsirmv5li.apps.googleusercontent.com"; 
            if (window.google) {
              window.google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: (response) => {
                  const payload = JSON.parse(atob(response.credential.split('.')[1]));
                  onLoginSuccess(payload.email, payload.name, payload.picture);
                }
              });
              window.google.accounts.id.renderButton(
                document.getElementById("google-signin-button"),
                { theme: "outline", size: "large", width: 280, text: "continue_with" }
              );
            }
          }, []);

          return (
            <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
              <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden animate-fade-in border border-gray-100">
                <div className="bg-indigo-600 p-8 text-center">
                  <i className="fa-solid fa-train-subway text-white text-5xl mb-3"></i>
                  <h1 className="text-2xl font-black text-white tracking-tight">MEG-RMS</h1>
                  <p className="text-indigo-100 text-sm mt-1 font-medium">新自強3000 研究進度管理系統</p>
                </div>
                <div className="p-8 text-center flex flex-col items-center">
                  <h2 className="text-xl font-bold text-gray-800 mb-2">乘客請驗票登入</h2>
                  <p className="text-sm text-gray-500 mb-8">請使用您的 Google 帳號登入。系統將依據您的信箱自動分配專屬權限。</p>
                  <div id="google-signin-button" className="mb-6"></div>
                  <div className="w-full flex items-center justify-center mt-4 mb-4">
                    <div className="h-px bg-gray-200 flex-1"></div>
                    <span className="px-3 text-xs text-gray-400 font-bold uppercase tracking-wider">或開發測試</span>
                    <div className="h-px bg-gray-200 flex-1"></div>
                  </div>
                  <div className="w-full bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <p className="text-xs text-gray-500 font-bold mb-2 flex items-center justify-center">
                      <i className="fa-solid fa-triangle-exclamation text-orange-400 mr-1"></i> 測試模擬登入 (免驗證)
                    </p>
                    <input type="text" placeholder="輸入您的或學生的 Email..." className="w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 mb-2" value={devEmail} onChange={(e) => setDevEmail(e.target.value)} />
                    <button onClick={() => onLoginSuccess(devEmail, '測試用戶', '')} className="w-full py-2 bg-gray-800 text-white text-sm font-bold rounded hover:bg-gray-900 transition">模擬登入</button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- 老師儀表板 ---
        const TeacherDashboard = ({ projects, setProjects, students, setStudents, conferences, setConferences, openMarqueeManager }) => {
          const [sortBy, setSortBy] = useState('latest'); 
          const [filterDegree, setFilterDegree] = useState('all');
          const [filterStatus, setFilterStatus] = useState('all'); 
          
          const [isAddStudentOpen, setIsAddStudentOpen] = useState(false);
          const [isConfModalOpen, setIsConfModalOpen] = useState(false);
          const [manageStudentProjectsId, setManageStudentProjectsId] = useState(null);
          
          // 🌟 專案備忘錄 Modal State
          const [editingProjectNotes, setEditingProjectNotes] = useState(null);

          const [newStudent, setNewStudent] = useState({ name: '', degree: '', contactLink: '', email: '', localFolder: '' });
          
          const [newConf, setNewConf] = useState({ name: '', url: '', submitDeadline: '', confirmDeadline: '' });
          const [editingConfId, setEditingConfId] = useState(null);
          const [editConfData, setEditConfData] = useState({});

          const [deletingProjectId, setDeletingProjectId] = useState(null);
          const [deleteReason, setDeleteReason] = useState("");

          const pendingApprovals = projects.filter(p => p.pendingStatus !== null);
          const stagnantProjects = projects.filter(p => p.status.includes("概念發想") && p.pendingStatus === null);

          const handleApprove = (projectId) => {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const updatedProject = { ...project, status: project.pendingStatus, pendingStatus: null, pendingDescription: null, lastUpdate: new Date().toISOString().split('T')[0] };
            setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
            syncToBackend('updateProject', updatedProject);
          };

          const handleReject = (projectId) => {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const updatedProject = { ...project, pendingStatus: null, pendingDescription: null };
            setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
            syncToBackend('updateProject', updatedProject);
          };

          const handleAppendNote = (studentId, text) => {
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            const dateStr = new Date().toLocaleDateString('zh-TW', {month: 'numeric', day: 'numeric'});
            const newNotes = student.notes ? `${student.notes}\n[${dateStr}] ${text}` : `[${dateStr}] ${text}`;
            const updatedStudent = { ...student, notes: newNotes };
            setStudents(students.map(s => s.id === studentId ? updatedStudent : s));
            syncToBackend('updateStudent', updatedStudent);
          };

          const handleSetLocalFolder = (student) => {
            const path = prompt(`請設定或修改 ${student.name} 的本機資料夾路徑 (例如 D:\\MEG\\StudentA)：`, student.localFolder || "");
            if (path !== null) {
                const updatedStudent = { ...student, localFolder: path.trim() };
                setStudents(students.map(s => s.id === student.id ? updatedStudent : s));
                syncToBackend('updateStudent', updatedStudent);
            }
          };

          const handleAddStudentSubmit = () => {
            if (!newStudent.name || !newStudent.email) return alert("姓名與信箱為必填！");
            const st = {
              id: 's' + Date.now(),
              name: newStudent.name.trim(),
              degree: newStudent.degree.trim(),
              contactLink: newStudent.contactLink.trim(),
              email: newStudent.email.trim(),
              localFolder: newStudent.localFolder.trim(),
              notes: ''
            };
            setStudents([...students, st]);
            syncToBackend('addStudent', st);
            setIsAddStudentOpen(false);
            setNewStudent({ name: '', degree: '', contactLink: '', email: '', localFolder: '' });
          };

          const handleAddConfSubmit = () => {
            if (!newConf.name || !newConf.confirmDeadline) return alert("名稱與確認死線為必填！");
            const conf = {
              id: 'c' + Date.now(),
              name: newConf.name,
              url: newConf.url,
              submitDeadline: newConf.submitDeadline,
              confirmDeadline: newConf.confirmDeadline
            };
            const updatedConfs = [...conferences, conf];
            setConferences(updatedConfs);
            syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
            setNewConf({ name: '', url: '', submitDeadline: '', confirmDeadline: '' });
          };

          const handleSaveEditConf = () => {
            if (!editConfData.name || !editConfData.confirmDeadline) return alert("名稱與確認死線為必填！");
            const updatedConfs = conferences.map(c => c.id === editingConfId ? editConfData : c);
            setConferences(updatedConfs);
            syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
            setEditingConfId(null);
          };

          const handleDeleteConf = (confId) => {
            if(!confirm("確定要刪除這個研討會選項嗎？這會同時移除所有專案綁定的目標設定。")) return;
            const updatedConfs = conferences.filter(c => c.id !== confId);
            setConferences(updatedConfs);
            syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
          };

          const handleDeleteProjectSubmit = () => {
            if (!deleteReason.trim()) return alert("請輸入刪除說明或原因！");
            const project = projects.find(p => p.id === deletingProjectId);
            const student = students.find(s => s.id === project.studentId);
            
            const dateStr = new Date().toLocaleDateString('zh-TW', {month: 'numeric', day: 'numeric'});
            const reasonStr = `[${dateStr}] 系統刪除了專案「${project.title}」，原因：${deleteReason}`;
            const updatedStudent = { ...student, notes: student.notes ? student.notes + '\n' + reasonStr : reasonStr };
            
            setProjects(projects.filter(p => p.id !== deletingProjectId));
            setStudents(students.map(s => s.id === student.id ? updatedStudent : s));
            syncToBackend('deleteProject', { id: deletingProjectId });
            syncToBackend('updateStudent', updatedStudent);
            
            setDeletingProjectId(null);
            setDeleteReason("");
          };

          // 🌟 老師儲存備忘錄並自動標記為未讀
          const handleSaveProjectNotes = (projectId, notesText) => {
             const project = projects.find(p => p.id === projectId);
             // 寫入備忘錄，同時設定 hasUnreadMemo 為 true 觸發學生端警示
             const updated = { ...project, notes: notesText, hasUnreadMemo: true };
             setProjects(projects.map(p => p.id === projectId ? updated : p));
             syncToBackend('updateProject', updated);
             setEditingProjectNotes(null);
          };

          const augmentedStudents = students.map(student => {
            const studentProjects = projects.filter(p => p.studentId === student.id);
            const projectCount = studentProjects.length;
            let latestUpdate = '2000-01-01'; 
            studentProjects.forEach(p => { if (p.lastUpdate && p.lastUpdate > latestUpdate) latestUpdate = p.lastUpdate; });
            const displayDate = latestUpdate === '2000-01-01' ? '無更新' : latestUpdate;
            const hasPending = studentProjects.some(p => p.pendingStatus !== null);
            const hasStagnant = studentProjects.some(p => p.status.includes("概念發想") && p.pendingStatus === null);
            return { ...student, projectCount, latestUpdate, displayDate, hasPending, hasStagnant };
          });

          let processedStudents = augmentedStudents.filter(s => {
            if (filterDegree !== 'all' && !s.degree.includes(filterDegree)) return false;
            if (filterStatus === 'pending' && !s.hasPending) return false;
            if (filterStatus === 'stagnant' && !s.hasStagnant) return false;
            return true;
          });

          processedStudents.sort((a, b) => {
            if (sortBy === 'latest') return b.latestUpdate.localeCompare(a.latestUpdate);
            if (sortBy === 'oldest') return a.latestUpdate.localeCompare(b.latestUpdate);
            if (sortBy === 'projects_desc') return b.projectCount - a.projectCount;
            return 0;
          });

          return (

              <AchievementDashboard projects={projects} students={students} />

                <div className="flex gap-2">
                  <button onClick={() => setIsConfModalOpen(true)} className="px-4 py-2 bg-teal-50 text-teal-700 rounded-lg font-medium hover:bg-teal-100 transition shadow-sm border border-teal-100">

                    <h3 className="font-bold text-gray-800 flex items-center">
                      <i className="fa-solid fa-clock text-orange-500 mr-2"></i> 待確認進度申請 ({pendingApprovals.length})
                    </h3>
                  </div>
                  <div className="p-4 space-y-4 max-h-[400px] overflow-y-auto">
                    {pendingApprovals.length === 0 ? (
                      <div className="text-gray-500 text-center py-8">
                        <i className="fa-solid fa-mug-hot text-3xl mb-2 text-gray-300 block"></i>

                      </div>
                    ) : (
                      pendingApprovals.map(project => (
                        <div key={project.id} className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white border border-gray-100 rounded-lg p-4 shadow-sm hover:shadow-md transition">

                            <div className="font-bold text-indigo-900 text-lg flex items-center">
                              {project.studentName} <span className="text-gray-400 font-normal text-sm mx-2">|</span> {project.title}
                              {/* 🌟 老師儀表板：專案備忘錄入口 */}
                              <button onClick={() => setEditingProjectNotes(project)} className="ml-3 text-[11px] bg-indigo-50 text-indigo-700 font-bold px-2 py-1 rounded border border-indigo-200 hover:bg-indigo-100 transition flex items-center">
                                <i className="fa-solid fa-book-open mr-1"></i> 專案備忘錄
                              </button>
                            </div>
                            <div className="text-sm mt-2 flex items-center gap-2 bg-gray-50 p-2 rounded inline-flex border">
                              <span className="text-gray-500 line-through">{project.status}</span>
                              <i className="fa-solid fa-arrow-right text-gray-400"></i>
                              <span className="font-bold text-orange-600">{project.pendingStatus}</span>
                            </div>
                            {project.pendingDescription && (
                              <div className="mt-3 bg-blue-50/60 p-3 rounded-lg border border-blue-100 text-sm text-gray-700 relative group w-full sm:max-w-lg">
                                <span className="font-bold text-blue-800 text-xs block mb-1 flex items-center">
                                  <i className="fa-solid fa-comment-dots mr-1.5"></i>進度更新說明：
                                </span>
                                <p className="whitespace-pre-wrap">{project.pendingDescription}</p>
                                <button onClick={() => handleAppendNote(project.studentId, project.pendingDescription)} className="absolute top-2 right-2 text-[10px] bg-white border border-blue-200 text-blue-600 px-2 py-1 rounded shadow-sm hover:bg-blue-600 hover:text-white transition opacity-0 group-hover:opacity-100 flex items-center" title="移至學生的指導註記中">
                                  <i className="fa-solid fa-thumbtack mr-1"></i>移至註記
                                </button>
                              </div>
                            )}

                          <div className="flex gap-2 mt-4 sm:mt-0 w-full sm:w-auto self-start sm:self-center">
                            <button onClick={() => handleApprove(project.id)} className="flex-1 sm:flex-none px-4 py-2 bg-green-500 text-white text-sm font-bold rounded-lg hover:bg-green-600 shadow-sm"><i className="fa-solid fa-circle-check mr-2"></i> 確認</button>
                            <button onClick={() => handleReject(project.id)} className="flex-1 sm:flex-none px-4 py-2 bg-red-50 text-red-600 text-sm font-bold rounded-lg hover:bg-red-100 border border-red-200">退回</button>
                          </div>
                        </div>
                      ))

                  </div>
                </Card>

                <Card className="border-l-4 border-l-red-500">
                  <div className="p-4 border-b bg-red-50/50">
                    <h3 className="font-bold text-gray-800 flex items-center">
                      <i className="fa-solid fa-triangle-exclamation text-red-500 mr-2"></i> 需關注專案 (卡關過久)
                    </h3>
                  </div>
                  <div className="p-4 max-h-[400px] overflow-y-auto">
                    <ul className="space-y-3">
                      {stagnantProjects.map(project => (
                        <li key={project.id} className="flex justify-between items-center text-sm border-b pb-3 last:border-0">

                            <div className="w-8 h-8 rounded-full bg-red-100 text-red-700 flex items-center justify-center font-bold mr-3">{project.studentName.charAt(0)}</div>

                              <div className="font-bold text-gray-800">{project.studentName}</div>

                                ><i className="fa-solid fa-pen text-[10px]"></i></button>

                            <span className="font-bold mb-0.5 flex items-center"><i className="fa-solid fa-bars-progress mr-1"></i>管理專案</span>
                            <span className="font-black text-sm">{student.projectCount} 個</span>
                          </button>
                          <div className="text-[11px] text-gray-500 bg-gray-50 p-1.5 rounded border border-gray-100 flex flex-col items-center justify-center">
                            <span className="font-semibold mb-0.5">最後更新</span>
                            <span className={`font-bold ${student.displayDate === '無更新' ? 'text-gray-400' : 'text-gray-700'}`}>
                              {student.displayDate}
                            </span>
                          </div>
                        </div>

                        <div className="mt-auto pt-2">
                          <label className="text-[11px] font-semibold text-gray-500 mb-1 block">學生綜合指導註記 / 刪除紀錄</label>
                          <textarea 
                            className="w-full text-sm p-2 border border-yellow-200 rounded-lg bg-yellow-50/50 focus:outline-none focus:ring-2 focus:ring-yellow-400 resize-none"
                            rows="2"
                            value={student.notes || ""}
                            onChange={(e) => setStudents(students.map(s => s.id === student.id ? { ...s, notes: e.target.value } : s))}
                            onBlur={() => syncToBackend('updateStudent', students.find(s => s.id === student.id))}
                            placeholder="紀錄重點或原因..."
                          ></textarea>
                        </div>
                      </div>
                    </Card>
                  ))}
                  
                  {processedStudents.length === 0 && (
                    <div className="col-span-full text-center py-10 bg-gray-50 rounded-xl border border-dashed border-gray-300 text-gray-500">
                      <p>沒有符合條件的學生。</p>
                    </div>
                  )}

              </div>

              {/* Modal: 新增學生 */}
              {isAddStudentOpen && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">

                    </div>

                      <div><label className="block font-bold text-gray-700 mb-1">學生姓名 *</label><input type="text" className="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500" value={newStudent.name} onChange={e => setNewStudent({...newStudent, name: e.target.value})} placeholder="例如：王小明"/></div>
                      <div><label className="block font-bold text-gray-700 mb-1">年級 (身分)</label><input type="text" className="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500" value={newStudent.degree} onChange={e => setNewStudent({...newStudent, degree: e.target.value})} placeholder="例如：博一、碩二..."/></div>
                      <div><label className="block font-bold text-gray-700 mb-1">Google 登入 Email *</label><input type="email" className="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500" value={newStudent.email} onChange={e => setNewStudent({...newStudent, email: e.target.value})} placeholder="學生真實的 Google 信箱"/></div>
                      <div><label className="block font-bold text-gray-700 mb-1">私訊聯絡連結 (選填)</label><input type="url" className="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500" value={newStudent.contactLink} onChange={e => setNewStudent({...newStudent, contactLink: e.target.value})} placeholder="例如 LINE 或 Messenger 網址"/></div>
                      <div><label className="block font-bold text-gray-700 mb-1">本機資料夾路徑 (選填)</label><input type="text" className="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500" value={newStudent.localFolder} onChange={e => setNewStudent({...newStudent, localFolder: e.target.value})} placeholder="例如 D:\MEG\StudentA"/></div>
                      <div className="flex justify-end gap-3 mt-6 pt-4 border-t">
                        <button onClick={() => setIsAddStudentOpen(false)} className="px-4 py-2 bg-gray-100 text-gray-600 font-bold rounded hover:bg-gray-200">取消</button>
                        <button onClick={handleAddStudentSubmit} className="px-4 py-2 bg-indigo-600 text-white font-bold rounded hover:bg-indigo-700">建立帳號</button>
                      </div>

                  </div>
                </div>

              {/* Modal: 研討會管理 */}
              {isConfModalOpen && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">

                    <div className="p-6 overflow-y-auto flex-grow bg-gray-50">
                      <div className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6">
                        <h4 className="font-bold text-teal-800 mb-3 border-b pb-2"><i className="fa-solid fa-plus mr-1"></i> 新增研討會選項</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">

                      </h3>
                      <button onClick={() => { setManageStudentProjectsId(null); setDeletingProjectId(null); }}><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="p-6 overflow-y-auto bg-gray-50 flex-grow">
                      {projects.filter(p => p.studentId === manageStudentProjectsId).length === 0 ? (
                        <div className="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                          <i className="fa-solid fa-box-open text-4xl text-gray-300 mb-3 block"></i>
                          <p className="text-gray-500 font-bold">該學生目前沒有任何專案。</p>
                        </div>
                      ) : (
                        <div className="space-y-4">
                          {projects.filter(p => p.studentId === manageStudentProjectsId).map(project => (
                            <div key={project.id} className={`bg-white border rounded-xl p-5 shadow-sm transition ${deletingProjectId === project.id ? 'border-red-400 ring-2 ring-red-100' : 'border-gray-200 hover:shadow-md'}`}>
                              <div className="flex flex-col sm:flex-row justify-between items-start gap-4">
                                <div className="flex-grow">
                                  <h4 className="font-black text-xl text-gray-800 mb-2">{project.title}</h4>
                                  <div className="flex flex-wrap items-center gap-3">
                                    <StatusBadge status={project.status} />
                                    {/* 🌟 老師管理專案時的備忘錄按鈕 */}
                                    <button onClick={() => setEditingProjectNotes(project)} className="text-xs bg-indigo-600 text-white font-bold px-3 py-1.5 rounded-md hover:bg-indigo-700 transition shadow flex items-center">
                                      <i className="fa-solid fa-book-open mr-1.5"></i> 專案備忘錄
                                    </button>
                                  </div>
                                </div>
                                {deletingProjectId !== project.id && (
                                  <button onClick={() => setDeletingProjectId(project.id)} className="px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg text-sm font-bold border border-red-200 transition whitespace-nowrap">
                                    <i className="fa-solid fa-trash-can mr-1"></i> 刪除專案
                                  </button>
                                )}
                              </div>
                              
                              {/* 刪除確認區塊 */}
                              {deletingProjectId === project.id && (
                                <div className="mt-4 bg-red-50 border border-red-200 p-4 rounded-xl animate-fade-in">
                                  <label className="block text-sm font-bold text-red-800 mb-2">請輸入退回或刪除的原因 (此原因將同步至學生的指導註記中)：</label>
                                  <textarea 
                                    className="w-full p-3 border border-red-300 rounded-lg focus:ring-2 focus:ring-red-400 bg-white text-sm"
                                    rows="2"
                                    placeholder="例如：題目不符合目標、內容重疊需合併..."
                                    value={deleteReason}
                                    onChange={(e) => setDeleteReason(e.target.value)}
                                  ></textarea>
                                  <div className="flex justify-end gap-2 mt-3">
                                    <button onClick={() => setDeletingProjectId(null)} className="px-4 py-2 bg-white text-gray-600 font-bold text-sm border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
                                    <button onClick={handleDeleteProjectSubmit} className="px-4 py-2 bg-red-600 text-white font-bold text-sm rounded-lg shadow hover:bg-red-700">確定刪除並寫入備註</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* 專案備忘錄 Modal (老師) */}
              <ProjectNotesModal 
                 isOpen={!!editingProjectNotes} 
                 project={editingProjectNotes} 
                 onClose={() => setEditingProjectNotes(null)} 
                 onSave={handleSaveProjectNotes} 
                 isTeacher={true}
              />
            </div>
          );
        };

        // --- 學生工作區 ---
        const StudentWorkspace = ({ student, projects, setProjects, students, setStudents, conferences }) => {
          if (!student) {
            return (
              <div className="text-center py-20 animate-pulse">
                <i className="fa-solid fa-spinner fa-spin text-4xl text-indigo-400 mb-4"></i>
                <h3 className="text-xl text-gray-600 font-bold">正在為您整理專屬車廂...</h3>
              </div>
            );
          }

          const myProjects = projects.filter(p => p.studentId === student.id);

          const [draftStatuses, setDraftStatuses] = useState({});
          const [draftDescriptions, setDraftDescriptions] = useState({});
          const [isAddingProject, setIsAddingProject] = useState(false);
          const [newTitle, setNewTitle] = useState("");

          const [isEditingDegree, setIsEditingDegree] = useState(false);
          const [tempDegree, setTempDegree] = useState(student.degree || "");
          
          // 🌟 專案備忘錄 Modal State
          const [editingProjectNotes, setEditingProjectNotes] = useState(null);

          const [hasCheckedExpiry, setHasCheckedExpiry] = useState(false);
          useEffect(() => {
            if (!hasCheckedExpiry && myProjects.length > 0 && conferences.length > 0) {
              let changed = false;
              const updated = projects.map(p => {
                if (p.studentId === student.id && p.targetConference) {
                  const conf = conferences.find(c => c.id == p.targetConference);
                  if (!conf || calculateDaysLeft(conf.confirmDeadline) < 0) {
                    changed = true;
                    const up = { ...p, targetConference: null };
                    syncToBackend('updateProject', up);
                    return up;
                  }
                }
                return p;
              });
              if (changed) setProjects(updated);
              setHasCheckedExpiry(true);
            }
          }, [myProjects.length, conferences.length, hasCheckedExpiry]);

          const handleSelectChange = (projectId, value) => setDraftStatuses(prev => ({ ...prev, [projectId]: value }));
          const handleDescriptionChange = (projectId, value) => {
            if (value.length <= 300) setDraftDescriptions(prev => ({ ...prev, [projectId]: value }));
          };

          const handleSubmitRequest = (projectId, currentStatus) => {
            const newStatus = draftStatuses[projectId];
            const newDesc = draftDescriptions[projectId] || '';
            if (newStatus && newStatus !== currentStatus) {
              const project = projects.find(p => p.id === projectId);
              if (!project) return;
              const updatedProject = { ...project, pendingStatus: newStatus, pendingDescription: newDesc };

              setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
              syncToBackend('updateProject', updatedProject);

              setDraftStatuses(prev => { const n = {...prev}; delete n[projectId]; return n; });
              setDraftDescriptions(prev => { const n = {...prev}; delete n[projectId]; return n; });
            }
          };

          const handleAssignConference = (projectId, confId) => {
             const project = projects.find(p => p.id === projectId);
             const updated = { ...project, targetConference: confId || null };
             setProjects(projects.map(p => p.id === projectId ? updated : p));
             syncToBackend('updateProject', updated);
          };

          const saveDegree = () => {
             const updated = { ...student, degree: tempDegree };
             setStudents(students.map(s => s.id === student.id ? updated : s));
             syncToBackend('updateStudent', updated);
             setIsEditingDegree(false);
          };

          const handleAddProject = () => {
            if(!newTitle.trim()) return;
            const newProj = {
              id: Date.now().toString(),
              studentId: student.id,
              studentName: student.name,
              title: newTitle.trim(),
              status: '💭 概念發想未經報告',
              pendingStatus: null,
              pendingDescription: null,
              targetConference: null,
              notes: '',
              hasUnreadMemo: false,
              lastUpdate: new Date().toISOString().split('T')[0]
            };
            setProjects([...projects, newProj]);
            syncToBackend('addProject', newProj);
            setIsAddingProject(false);
            setNewTitle('');
          };

          // 學生端觸發已讀
          const handleMarkMemoAsRead = (projectId) => {
             const project = projects.find(p => p.id === projectId);
             if (project && (project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true')) {
                 const updated = { ...project, hasUnreadMemo: false };
                 setProjects(projects.map(p => p.id === projectId ? updated : p));
                 syncToBackend('updateProject', updated);
             }
          };

          return (
            <div className="space-y-8 animate-fade-in">
              <AchievementDashboard projects={projects} students={students} />

              {/* 學生資訊與聯絡列 */}
              <div className="flex flex-col md:flex-row justify-between items-end md:items-center border-b border-gray-200 pb-4">
                <div>
                  <div className="flex items-center gap-3">
                    <h2 className="text-3xl font-extrabold text-gray-800 tracking-tight">Hi, {student.name} 的專屬車廂</h2>
                    {isEditingDegree ? (
                      <div className="flex items-center bg-white border border-indigo-200 rounded-full pl-2 overflow-hidden shadow-sm">
                        <input type="text" className="text-xs w-16 outline-none text-indigo-800 font-bold" value={tempDegree} onChange={e=>setTempDegree(e.target.value)} autoFocus />
                        <button onClick={saveDegree} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-2 py-1 text-xs font-bold transition"><i className="fa-solid fa-check"></i></button>
                        <button onClick={()=>setIsEditingDegree(false)} className="bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 text-xs transition"><i className="fa-solid fa-xmark"></i></button>
                      </div>
                    ) : (
                      <span 
                        onClick={() => { setTempDegree(student.degree); setIsEditingDegree(true); }}
                        className="text-sm bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full cursor-pointer hover:bg-indigo-200 transition font-bold flex items-center border border-indigo-200 shadow-sm"
                        title="點擊修改年級身分"
                      >
                        {student.degree} <i className="fa-solid fa-pen ml-1.5 text-[10px] opacity-60"></i>
                      </span>
                    )}
                  </div>
                  <p className="text-gray-500 text-sm mt-2 font-medium">請確實更新進度，並留意研討會最後確認期限。</p>
                </div>
                <div className="flex gap-3 mt-4 md:mt-0">
                  {student.contactLink && student.contactLink !== '#' && student.contactLink.trim() !== '' ? (
                    <a href={student.contactLink} target="_blank" rel="noopener noreferrer" className="px-4 py-2 bg-blue-600 text-white rounded-lg font-bold shadow hover:bg-blue-700 transition flex items-center">
                      <i className="fa-solid fa-paper-plane mr-2"></i> 聯繫指導教授
                    </a>
                  ) : (
                    <button className="px-4 py-2 bg-gray-300 text-white rounded-lg font-bold cursor-not-allowed flex items-center" title="老師尚未設定聯絡連結">
                      <i className="fa-solid fa-paper-plane mr-2"></i> 聯繫指導教授
                    </button>
                  )}
                </div>
              </div>

              {/* 專案卡片列表 */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {myProjects.map(project => {
                   let confInfoNode = null;
                   if (project.targetConference) {
                     const conf = conferences.find(c => c.id == project.targetConference);
                     if (conf) {
                       const days = calculateDaysLeft(conf.confirmDeadline);
                       if (days !== null) {
                         if (days < 0) {
                           confInfoNode = <div className="mt-2 text-xs font-bold text-red-600 bg-red-50 p-2 rounded-lg border border-red-200">🚨 已超過老師確認死線！系統將於下次整理時自動除名。</div>;
                         } else if (days <= 14) {
                           confInfoNode = <div className="mt-2 text-xs font-bold text-red-600 bg-red-50 p-2 rounded-lg border border-red-200 animate-pulse">🚨 警示：距離老師確認死線 ({conf.confirmDeadline}) 只剩 {days} 天！</div>;
                         } else {
                           confInfoNode = <div className="mt-2 text-xs font-bold text-teal-700 bg-teal-50 p-2 rounded-lg border border-teal-200">ℹ️ 距離老師確認死線 ({conf.confirmDeadline}) 還有 {days} 天。</div>;
                         }
                       }
                     }
                   }
                   
                   // 判斷是否為未讀狀態
                   const isUnread = project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true';

                   return (
                  <Card key={project.id} className="relative overflow-visible border-t-4 border-t-indigo-500 hover:shadow-lg transition duration-300 flex flex-col">
                    {project.pendingStatus && (
                      <div className="absolute -top-4 -right-4 bg-orange-500 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow-lg flex items-center animate-pulse border-2 border-white z-10">
                        <i className="fa-solid fa-hourglass-half mr-2"></i> 老師審核中
                      </div>
                    )}
                    <div className="p-6 flex-grow flex flex-col">
                      <h3 className="font-extrabold text-2xl text-gray-900 leading-tight mb-2">{project.title}</h3>
                      
                      <div className="mb-4">
                         <StatusBadge status={project.status} />
                      </div>

                      {/* 🌟 學生專案卡片：醒目的備忘錄按鈕 (帶有未讀警示) */}
                      <button 
                        onClick={() => setEditingProjectNotes(project)} 
                        className={`w-full mb-5 py-2.5 font-bold rounded-xl border-2 transition shadow-sm flex justify-center items-center group ${isUnread ? 'bg-red-50 text-red-700 border-red-300 animate-pulse hover:bg-red-100 ring-2 ring-red-400 ring-offset-1' : 'bg-indigo-50 text-indigo-700 border-indigo-200 hover:bg-indigo-100'}`}
                      >
                         <i className={`fa-solid fa-book-open mr-2 ${isUnread ? 'animate-bounce' : 'group-hover:scale-110 transition'}`}></i> 
                         📝 開啟專案備忘錄 
                         {isUnread && <span className="ml-2 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full animate-none shadow">老師有新指示！</span>}
                      </button>

                      <div className="mb-5 bg-teal-50/50 p-3.5 rounded-xl border border-teal-100">
                        <label className="text-[11px] font-bold text-teal-800 block mb-1.5">
                          <i className="fa-solid fa-calendar-check mr-1"></i> 預計投稿研討會目標
                        </label>
                        <select 
                          className="w-full text-sm p-2 border border-teal-200 rounded-lg focus:ring-2 focus:ring-teal-500 bg-white font-medium text-gray-700 shadow-sm mb-2"
                          value={project.targetConference || ""}
                          onChange={(e) => handleAssignConference(project.id, e.target.value)}
                        >
                          <option value="">-- 尚未決定 / 不投研討會 --</option>
                          {conferences.map(c => (
                            <option key={c.id} value={c.id}>{c.name} (死線: {c.confirmDeadline})</option>
                          ))}
                        </select>
                        {confInfoNode}
                      </div>

                      <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 mt-auto">
                        <label className="text-sm font-bold text-gray-700 block mb-2">更新專案進度狀態：</label>
                        <div className="flex flex-col gap-3">
                          <select 
                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 bg-white font-medium disabled:bg-gray-200 disabled:text-gray-500 shadow-sm"
                            value={project.pendingStatus || draftStatuses[project.id] || project.status}
                            onChange={(e) => handleSelectChange(project.id, e.target.value)}
                            disabled={project.pendingStatus !== null}
                          >
                            {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                          
                          {draftStatuses[project.id] && draftStatuses[project.id] !== project.status && !project.pendingStatus && (
                            <div className="bg-white p-3 rounded-xl border border-indigo-100 shadow-sm animate-fade-in">
                              <label className="text-xs font-bold text-gray-700 block mb-1">給老師的話 <span className="text-gray-400 font-normal">(選填，最多300字)</span>：</label>
                              <textarea
                                className="w-full text-sm p-2 border border-gray-300 rounded-lg focus:ring-indigo-500 bg-gray-50 mb-2 resize-none"
                                rows="2"
                                value={draftDescriptions[project.id] || ''}
                                onChange={(e) => handleDescriptionChange(project.id, e.target.value)}
                              ></textarea>
                              <div className="flex justify-end">
                                <button onClick={() => handleSubmitRequest(project.id, project.status)} className="px-4 py-1.5 bg-indigo-600 text-white text-sm font-bold rounded-lg shadow hover:bg-indigo-700 flex items-center">
                                  <i className="fa-solid fa-paper-plane mr-1.5"></i> 送出審核
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                        
                        {project.pendingStatus && (
                          <div className="mt-3 flex flex-col gap-2">
                            <div className="flex items-start text-xs text-orange-600 bg-orange-50 p-2.5 rounded-lg border border-orange-100 shadow-sm">
                              <i className="fa-solid fa-circle-info mt-0.5 mr-1.5"></i>
                              <p>等待老師確認中。在核准前無法再次更改。</p>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </Card>
                )})}

                <Card onClick={() => setIsAddingProject(true)} className="border-dashed border-2 border-gray-300 bg-gray-50/50 flex flex-col items-center justify-center p-10 text-gray-500 hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-600 transition cursor-pointer group min-h-[300px]">
                  <div className="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <i className="fa-solid fa-plus text-2xl"></i>
                  </div>
                  <span className="font-bold text-lg">發想新專案</span>
                  <p className="text-xs mt-2 text-center px-4">建立新的專案並提交給老師</p>
                </Card>
              </div>

              {/* Modal: 建立新專案 */}
              {isAddingProject && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
                  <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
                    <div className="bg-indigo-600 p-4 text-white flex justify-between items-center">
                      <h3 className="font-bold"><i className="fa-solid fa-plus mr-2"></i> 發想新專案</h3>
                      <button onClick={() => setIsAddingProject(false)}><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="p-6">
                      <label className="block text-sm font-bold text-gray-700 mb-2">專案名稱：</label>
                      <input type="text" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 mb-6 bg-gray-50" placeholder="例如：消防逃生VR..." value={newTitle} onChange={(e) => setNewTitle(e.target.value)} autoFocus />
                      <div className="flex justify-end gap-3">
                        <button onClick={() => setIsAddingProject(false)} className="px-4 py-2 text-gray-600 font-bold bg-gray-100 rounded-lg hover:bg-gray-200">取消</button>
                        <button onClick={handleAddProject} disabled={!newTitle.trim()} className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 disabled:opacity-50 shadow">確認建立</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 專案備忘錄 Modal (學生端：唯讀並傳入 markAsRead) */}
              <ProjectNotesModal 
                 isOpen={!!editingProjectNotes} 
                 project={editingProjectNotes} 
                 onClose={() => setEditingProjectNotes(null)} 
                 isTeacher={false}
                 markAsRead={handleMarkMemoAsRead}
              />
            </div>
          );
        };

        // --- 主應用程式 ---
        const App = () => {
          const [currentUser, setCurrentUser] = useState(null); 
          const TEACHER_EMAIL = "composerho@gmail.com"; 
          
          const [students, setStudents] = useState([]);
          const [projects, setProjects] = useState([]);
          const [conferences, setConferences] = useState([]); 
          const [marqueeText, setMarqueeText] = useState("連線中...");
          const [isLoading, setIsLoading] = useState(true);
          const [isMarqueeModalOpen, setIsMarqueeModalOpen] = useState(false);
          const [tempMarquee, setTempMarquee] = useState("");

          useEffect(() => {
            fetch(GAS_API_URL)
              .then(res => res.json())
              .then(data => {
                if(data.students) setStudents(data.students);
                if(data.projects) setProjects(data.projects);
                
                if(data.config && data.config.length > 0) {
                  const marqueeConf = data.config.find(c => c.key === 'marqueeText');
                  if (marqueeConf) setMarqueeText(marqueeConf.value);
                  
                  const confConfig = data.config.find(c => c.key === 'conferencesList');
                  if (confConfig && confConfig.value) {
                     try { setConferences(JSON.parse(confConfig.value)); } 
                     catch(e) { console.error("解析研討會清單失敗", e); }
                  }
                }
                setIsLoading(false);
              })
              .catch(err => {
                console.error("連線失敗:", err);
                setMarqueeText("無法連線到資料庫。");
                setIsLoading(false);
              });
          }, []);

          if (isLoading) {
            return (
              <div className="min-h-screen bg-gray-100 flex items-center justify-center flex-col">
                <i className="fa-solid fa-train-subway text-indigo-600 text-6xl animate-bounce mb-4"></i>
                <h2 className="text-xl font-bold text-gray-700">列車啟動中... 正在連接資料庫</h2>
              </div>
            );
          }

          const handleLogin = (email, name, picture) => {
            const userEmail = email.toLowerCase().trim();
            if (userEmail === TEACHER_EMAIL.toLowerCase().trim()) {
              setCurrentUser({ email: userEmail, name, role: 'teacher', studentData: null });
              return;
            }
            const foundStudent = students.find(s => s.email && s.email.toLowerCase().trim() === userEmail);
            if (foundStudent) {
              setCurrentUser({ email: userEmail, name: foundStudent.name, role: 'student', studentData: foundStudent });
              return;
            }
            setCurrentUser({ email: userEmail, name, role: 'unauthorized', studentData: null });
          };

          const handleLogout = () => setCurrentUser(null);

          if (!currentUser) return <LoginScreen onLoginSuccess={handleLogin} students={students} />;
          if (currentUser.role === 'unauthorized') return (
             <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4"><div className="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm border-t-4 border-red-500"><i className="fa-solid fa-ban text-red-500 text-5xl mb-4"></i><h2 className="text-2xl font-bold mb-2">未授權的乘客</h2><button onClick={handleLogout} className="px-6 py-2 bg-gray-800 text-white font-bold rounded-lg mt-4">返回</button></div></div>
          );

          return (
            <div className="min-h-screen bg-gray-100 flex flex-col">
              <div className="bg-gray-900 text-white px-4 py-2.5 flex items-center overflow-hidden border-b-4 border-red-600">
                <span className="bg-red-600 text-xs font-black px-2.5 py-1 rounded shadow text-white mr-4 shrink-0 flex items-center"><i className="fa-solid fa-broadcast-tower mr-1.5 animate-pulse"></i> LIVE</span>
                <div className="w-full relative whitespace-nowrap overflow-hidden flex items-center text-sm font-medium"><div className="animate-marquee">{marqueeText}</div></div>
              </div>

              <header className="bg-white shadow-sm sticky top-0 z-40 border-b border-gray-200">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
                  <div className="flex items-center">
                    <div className="bg-indigo-600 text-white p-2 rounded-lg mr-3 shadow-sm"><i className="fa-solid fa-train-subway text-xl"></i></div>
                    <div><h1 className="text-xl font-black text-gray-900 tracking-tight">MEG-RMS</h1><p className="text-[10px] text-indigo-600 font-bold uppercase">新自強3000 研究進度管理</p></div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="text-right hidden sm:block">
                      <div className="text-sm font-bold text-gray-800">{currentUser.name || (currentUser.role === 'teacher' ? '列車長 (老師)' : currentUser.studentData.name)}</div>
                      <div className="text-[10px] text-gray-500">{currentUser.email}</div>
                    </div>
                    <button onClick={handleLogout} className="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs font-bold rounded-lg hover:bg-red-50 hover:text-red-600 transition border"><i className="fa-solid fa-right-from-bracket mr-1"></i> 登出</button>
                  </div>
                </div>
              </header>

              <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
                {currentUser.role === 'teacher' ? (
                  <TeacherDashboard 
                    projects={projects} setProjects={setProjects} 
                    students={students} setStudents={setStudents}
                    conferences={conferences} setConferences={setConferences}
                    openMarqueeManager={() => { setTempMarquee(marqueeText); setIsMarqueeModalOpen(true); }}
                  />
                ) : (
                  <StudentWorkspace 
                    student={currentUser.studentData} 
                    students={students} setStudents={setStudents}
                    projects={projects} setProjects={setProjects}
                    conferences={conferences}
                  />
                )}
              </main>

              {isMarqueeModalOpen && (
                <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4"><div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden"><div className="bg-indigo-600 p-4 text-white flex justify-between items-center"><h3 className="font-bold">廣播跑馬燈</h3><button onClick={()=>setIsMarqueeModalOpen(false)}><i className="fa-solid fa-xmark text-xl"></i></button></div><div className="p-6"><textarea className="w-full p-3 border rounded-xl shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none" rows="4" value={tempMarquee} onChange={(e) => setTempMarquee(e.target.value)}></textarea><div className="flex justify-end gap-3 mt-4"><button onClick={()=>setIsMarqueeModalOpen(false)} className="px-4 py-2 bg-gray-100 font-bold rounded-lg hover:bg-gray-200">取消</button><button onClick={() => { setMarqueeText(tempMarquee); setIsMarqueeModalOpen(false); syncToBackend('updateConfig', { key: 'marqueeText', value: tempMarquee });}} className="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg shadow hover:bg-indigo-700">發布廣播</button></div></div></div></div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
