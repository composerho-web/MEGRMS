<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEG新自強3000列車 - 進度管理系統</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8; /* 備用背景 */
        }

        /* 可愛動態效果 Keyframes */
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-150%); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes float-cloud {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-20vw); }
        }
        @keyframes slide-train {
            0% { transform: translateX(120vw); }
            100% { transform: translateX(-50vw); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
        }
        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-bounce-soft { animation: bounce-soft 2s infinite ease-in-out; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-modal-pop { animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 豐富編輯器 (Rich Text) 專用樣式 */
        .rich-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content a { color: #4f46e5; text-decoration: underline; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .rich-content a:hover { color: #ec4899; }
        .rich-content p { margin-bottom: 0.5rem; min-height: 1rem; }
        .rich-content b, .rich-content strong { font-weight: 900; color: #1e1b4b; }
        .rich-content i, .rich-content em { font-style: italic; }
        .rich-content u { text-decoration: underline; text-decoration-color: #818cf8; text-decoration-thickness: 3px;}
        .rich-content strike { text-decoration: line-through; color: #9ca3af; }

        /* 自訂捲軸讓它更可愛 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }

        /* 背景可愛裝飾圖形 */
        .bg-shapes {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden;
            background: linear-gradient(135deg, #e0e7ff 0%, #fdf4ff 50%, #e0f2fe 100%);
        }
        .cloud { position: absolute; font-size: 4rem; opacity: 0.4; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
        .cloud-1 { top: 10%; animation: float-cloud 40s linear infinite; }
        .cloud-2 { top: 30%; font-size: 5rem; animation: float-cloud 55s linear infinite 15s; }
        .cloud-3 { top: 60%; font-size: 3rem; animation: float-cloud 45s linear infinite 5s; }
        .bg-train { position: absolute; bottom: 5%; font-size: 5rem; opacity: 0.15; animation: slide-train 30s linear infinite; }
    </style>
</head>
<body class="text-gray-800">
    <!-- 可愛動態背景 -->
    <div class="bg-shapes">
        <div class="cloud cloud-1">☁️</div>
        <div class="cloud cloud-2">⛅</div>
        <div class="cloud cloud-3">☁️</div>
        <div class="bg-train">🚂🚋🚋🚋🚋🚋</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STATUSES = [
          "💭 概念發想未經報告", "✅ 報告後老師確認", "🛠️ 研究與遊戲發展中", 
          "🎯 PILOT完成", "📤 研討會已投稿", "📋 期刊施測準備中", 
          "✍️ 期刊寫作中", "🎉 期刊已投稿", "📊 學位論文施測中", 
          "📜 學位論文撰寫中", "📌 其他"
        ];

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwvFe7geACFOL5yRauhX8WiBqafBLJiOj7CSPB6PNgoWkVqHeIVUS-wxGQWPGuC5aFG/exec";

        const extractText = (html) => {
            if(!html) return "";
            const tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        };

        const copyToClipboard = (text) => {
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert('✨ 登登！已成功複製到剪貼簿！');
            } catch (err) {
                alert('🥺 哎呀，複製失敗，請手動選取複製。');
            }
            textArea.remove();
        };

        const syncToBackend = (action, data) => {
          const toastId = 'toast-' + Date.now();
          const toast = document.createElement('div');
          toast.id = toastId;
          toast.className = 'fixed bottom-6 right-6 bg-indigo-900/90 backdrop-blur-md text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-indigo-400 animate-modal-pop';
          toast.innerHTML = '<i class="fa-solid fa-train-subway fa-bounce mr-3 text-2xl text-yellow-300"></i> 列車行駛中，正在同步資料...';
          document.body.appendChild(toast);

          fetch(GAS_API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data })
          })
          .then(res => res.json())
          .then(result => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();

            if (!result.success) {
              alert(`❌ 資料庫寫入失敗！\n\n動作：${action}\n錯誤原因：\n${result.error}`);
              console.error("Backend Error:", result.error);
            } else {
              const successToast = document.createElement('div');
              successToast.className = 'fixed bottom-6 right-6 bg-gradient-to-r from-emerald-400 to-teal-500 text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-white animate-modal-pop';
              successToast.innerHTML = '<i class="fa-solid fa-star fa-spin mr-3 text-2xl text-yellow-200"></i> 同步成功！棒棒的！';
              document.body.appendChild(successToast);
              setTimeout(() => {
                successToast.style.opacity = '0';
                successToast.style.transform = 'translateY(20px)';
                successToast.style.transition = 'all 0.5s ease-out';
                setTimeout(() => successToast.remove(), 500);
              }, 2500);
            }
          })
          .catch(err => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            console.error("同步例外錯誤:", err);
            alert(`🔌 哎呀，網路斷線了！請檢查網路後再試。\n\n詳細資訊: ${err.message}`);
          });
        };

        const calculateDaysLeft = (targetDate) => {
            if (!targetDate) return null;
            const today = new Date();
            today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            if (isNaN(target.getTime())) return null; 
            target.setHours(0,0,0,0);
            return Math.round((target - today) / (1000 * 60000 * 60 * 24));
        };

        const StatusBadge = ({ status }) => {
          let colors = "bg-gray-100 text-gray-600 border-gray-200";
          if (status.includes("發想")) colors = "bg-orange-100 text-orange-700 border-orange-300 shadow-orange-100";
          if (status.includes("發展中") || status.includes("準備中")) colors = "bg-yellow-100 text-yellow-700 border-yellow-400 shadow-yellow-100";
          if (status.includes("施測") || status.includes("確認")) colors = "bg-sky-100 text-sky-700 border-sky-300 shadow-sky-100";
          if (status.includes("寫作中")) colors = "bg-fuchsia-100 text-fuchsia-700 border-fuchsia-300 shadow-fuchsia-100";
          if (status.includes("投稿") || status.includes("完成")) colors = "bg-emerald-100 text-emerald-700 border-emerald-300 shadow-emerald-100";

          return (
            <span className={`px-3 py-1.5 rounded-2xl text-xs font-black shadow-sm border-2 ${colors} flex items-center w-fit`}>
              {status}
            </span>
          );
        };

        // 可愛風的卡片元件
        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white/80 backdrop-blur-lg rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 overflow-hidden ${className}`}>
            {children}
          </div>
        );

        // 🌟 核心組件：輕量級 Rich Text Editor
        const RichTextEditor = ({ initialValue, onChange, readOnly, placeholder }) => {
            const editorRef = useRef(null);

            useEffect(() => {
                if (editorRef.current && initialValue !== undefined && !readOnly) {
                    if(editorRef.current.innerHTML === '') {
                         editorRef.current.innerHTML = initialValue || '';
                    }
                }
            }, [initialValue, readOnly]);

            const execCmd = (cmd, val = null) => {
                document.execCommand(cmd, false, val);
                if(editorRef.current) { 
                    editorRef.current.focus(); 
                    onChange(editorRef.current.innerHTML); 
                }
            };

            const insertLink = () => {
                const url = prompt("🔗 請輸入網址 (須包含 http:// 或 https://):", "https://");
                if(url) execCmd('createLink', url);
            };

            if (readOnly) {
                return (
                    <div 
                        className="rich-content text-sm text-gray-800 leading-relaxed bg-white/60 p-5 rounded-2xl border-2 border-indigo-100 min-h-[120px] overflow-y-auto shadow-inner" 
                        dangerouslySetInnerHTML={{__html: initialValue || '<span class="text-gray-400 font-bold flex items-center justify-center h-full"><i class="fa-solid fa-ghost mr-2"></i> 空空如也，目前沒有備忘錄喔。</span>'}}
                    ></div>
                );
            }

            return (
                <div className="border-2 border-indigo-200 rounded-2xl overflow-hidden bg-white flex flex-col h-full shadow-inner focus-within:border-indigo-400 transition-colors">
                    <div className="bg-indigo-50 border-b-2 border-indigo-100 flex items-center p-2 gap-2 overflow-x-auto flex-wrap">
                        <button type="button" onClick={() => execCmd('bold')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 font-black transition" title="粗體">B</button>
                        <button type="button" onClick={() => execCmd('italic')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 italic font-serif transition" title="斜體">I</button>
                        <button type="button" onClick={() => execCmd('underline')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 underline transition" title="底線">U</button>
                        <button type="button" onClick={() => execCmd('strikeThrough')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 line-through transition" title="刪除線">S</button>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={() => execCmd('justifyLeft')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition" title="靠左"><i className="fa-solid fa-align-left"></i></button>
                        <button type="button" onClick={() => execCmd('justifyCenter')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition" title="置中"><i className="fa-solid fa-align-center"></i></button>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={() => execCmd('insertUnorderedList')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition" title="項目"><i className="fa-solid fa-list-ul"></i></button>
                        <button type="button" onClick={() => execCmd('insertOrderedList')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition" title="編號"><i className="fa-solid fa-list-ol"></i></button>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={insertLink} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-pink-500 transition" title="插入連結"><i className="fa-solid fa-link"></i></button>
                        <button type="button" onClick={() => execCmd('unlink')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-gray-400 transition" title="移除連結"><i className="fa-solid fa-link-slash"></i></button>
                    </div>
                    <div 
                        ref={editorRef}
                        className="flex-grow p-5 outline-none overflow-y-auto rich-content text-sm leading-relaxed"
                        contentEditable={true}
                        onInput={(e) => onChange(e.currentTarget.innerHTML)}
                        onBlur={(e) => onChange(e.currentTarget.innerHTML)}
                        style={{ minHeight: '200px' }}
                    ></div>
                </div>
            );
        };

        // 🌟 專案備忘錄 Modal
        const ProjectNotesModal = ({ isOpen, onClose, project, onSave, isTeacher, markAsRead }) => {
            const [notes, setNotes] = useState("");
            
            useEffect(() => {
                if (isOpen && project) {
                    setNotes(project.notes || "");
                    if (!isTeacher && (project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true') && markAsRead) {
                        markAsRead(project.id);
                    }
                }
            }, [isOpen, project, isTeacher]);

            if (!isOpen || !project) return null;

            return (
                <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                    <div className="bg-white rounded-[2rem] w-full max-w-4xl flex flex-col h-[85vh] shadow-[0_20px_50px_rgb(0,0,0,0.15)] overflow-hidden border-4 border-white animate-modal-pop">
                        <div className={`p-5 text-white flex justify-between items-center shadow-sm ${isTeacher ? 'bg-gradient-to-r from-indigo-600 to-purple-600' : 'bg-gradient-to-r from-slate-700 to-slate-800'}`}>
                            <h3 className="font-black text-xl flex items-center tracking-wide">
                                <i className="fa-solid fa-book-sparkles mr-3 text-yellow-300 animate-bounce-soft"></i> 
                                【{project.title}】專案備忘錄 {isTeacher ? "(編輯模式)" : "(唯讀模式)"}
                            </h3>
                            <button onClick={onClose} className="hover:rotate-90 hover:scale-110 transition-all duration-300 w-8 h-8 flex justify-center items-center rounded-full bg-white/20"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="p-6 flex-grow flex flex-col bg-slate-50/50 overflow-hidden">
                            <label className="text-sm font-black text-indigo-900 mb-3 flex items-center">
                                <i className="fa-solid fa-pen-nib text-indigo-400 mr-2"></i>
                                {isTeacher ? "在此編輯給學生的專案備忘錄與指示（支援粗體、超連結等）：" : "老師給的專案備忘錄與指示："}
                            </label>
                            
                            <div className="flex-grow overflow-hidden relative">
                                <RichTextEditor 
                                    initialValue={notes} 
                                    onChange={setNotes} 
                                    readOnly={!isTeacher} 
                                    placeholder="開始輸入專案備忘錄與修改方向..." 
                                />
                            </div>

                            <div className="flex justify-between items-center mt-6 pt-4 border-t-2 border-indigo-50">
                                <button onClick={() => copyToClipboard(extractText(notes))} className="px-6 py-3 bg-white text-indigo-600 font-black rounded-2xl hover:bg-indigo-50 hover:shadow-md transition-all flex items-center border-2 border-indigo-100 active:scale-95">
                                    <i className="fa-regular fa-copy mr-2"></i> 複製純文字
                                </button>
                                <div className="flex gap-4">
                                    {isTeacher ? (
                                        <>
                                            <button onClick={onClose} className="px-6 py-3 bg-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-200 transition-colors active:scale-95">取消</button>
                                            <button onClick={() => onSave(project.id, notes)} className="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-xl hover:-translate-y-1 transition-all flex items-center active:scale-95">
                                                <i className="fa-solid fa-wand-magic-sparkles mr-2"></i> 儲存魔法
                                            </button>
                                        </>
                                    ) : (
                                        <button onClick={onClose} className="px-8 py-3 bg-slate-800 text-white font-black rounded-2xl shadow-lg hover:bg-slate-700 transition-all active:scale-95 flex items-center">
                                            <i className="fa-solid fa-check mr-2"></i> 我知道了
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 🌟 列車公告欄元件
        const AnnouncementsBoard = ({ announcements }) => (
          <Card className="flex flex-col h-full border-t-[6px] border-t-sky-400">
             <div className="p-5 border-b border-sky-50 bg-gradient-to-r from-sky-50 to-white flex justify-between items-center">
                <h3 className="font-black text-xl text-sky-900 flex items-center"><i className="fa-solid fa-bullhorn text-sky-500 mr-3 animate-bounce-soft"></i>列車公告欄</h3>
             </div>
             <div className="p-5 flex-grow overflow-y-auto space-y-4" style={{maxHeight: '400px'}}>
                {announcements.length === 0 ? <div className="text-sky-300 text-sm font-bold text-center py-10 flex flex-col items-center"><i className="fa-regular fa-face-smile text-4xl mb-2"></i>目前沒有公告。</div> :
                 [...announcements].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(a => (
                    <div key={a.id} className="bg-white border-2 border-sky-100 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-sky-300 transition-all group">
                       <div className="flex justify-between items-start border-b-2 border-sky-50 pb-3 mb-3">
                          <h4 className="font-black text-sky-900 text-lg group-hover:text-sky-600 transition-colors">{a.title}</h4>
                          <span className="text-[10px] font-bold text-sky-600 bg-sky-100 px-3 py-1 rounded-full whitespace-nowrap"><i className="fa-regular fa-clock mr-1"></i>{a.date}</span>
                       </div>
                       <div className="rich-content text-sm text-gray-700" dangerouslySetInnerHTML={{__html: a.content}}></div>
                    </div>
                 ))
                }
             </div>
          </Card>
        );

        // 🌟 研究室常用連結元件
        const UsefulLinksBoard = ({ links }) => (
          <Card className="flex flex-col h-full border-t-[6px] border-t-emerald-400">
             <div className="p-5 border-b border-emerald-50 bg-gradient-to-r from-emerald-50 to-white flex justify-between items-center">
                <h3 className="font-black text-xl text-emerald-900 flex items-center"><i className="fa-solid fa-link text-emerald-500 mr-3 animate-bounce-soft"></i>百寶袋常用連結</h3>
             </div>
             <div className="p-5 flex-grow overflow-y-auto space-y-3" style={{maxHeight: '400px'}}>
                {links.length === 0 ? <div className="text-emerald-300 text-sm font-bold text-center py-10 flex flex-col items-center"><i className="fa-solid fa-box-open text-4xl mb-2"></i>目前沒有常用連結。</div> :
                 links.map(link => (
                    <a key={link.id} href={link.url} target="_blank" rel="noreferrer" className="block bg-white border-2 border-emerald-50 hover:border-emerald-300 hover:bg-emerald-50/50 rounded-2xl p-4 transition-all duration-300 group hover:-translate-y-1 shadow-sm">
                       <div className="font-black text-emerald-700 group-hover:text-emerald-900 flex items-center text-lg">
                          <i className="fa-solid fa-circle-arrow-right mr-2 text-emerald-400 group-hover:translate-x-1 transition-transform"></i> {link.title}
                       </div>
                       {link.description && <p className="text-xs text-gray-500 mt-2 font-medium pl-6">{link.description}</p>}
                    </a>
                 ))
                }
             </div>
          </Card>
        );

        // 🌟 成就儀表板 (動態牆)
        const AchievementDashboard = ({ projects, students }) => {
            const totalProjects = projects.length;
            const totalStudents = students.length;
            const confSubmitted = projects.filter(p => p.status.includes('研討會已投稿')).length;
            const journalSubmitted = projects.filter(p => p.status.includes('期刊已投稿')).length;
            const pilotCompleted = projects.filter(p => p.status.includes('PILOT完成')).length;
            const gameDev = projects.filter(p => p.status.includes('發展中')).length;
            const journalWriting = projects.filter(p => p.status.includes('寫作中')).length;

            return (
                <div className="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-[2rem] shadow-[0_10px_40px_rgba(99,102,241,0.3)] text-white mb-8 overflow-hidden relative border-4 border-white">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                    <div className="absolute bottom-0 left-0 w-40 h-40 bg-pink-300 opacity-20 rounded-full blur-2xl -ml-10 -mb-10"></div>
                    
                    <div className="p-8 relative z-10">
                        <h2 className="text-2xl font-black mb-6 flex items-center text-white drop-shadow-md">
                            <i className="fa-solid fa-trophy text-yellow-300 mr-3 text-3xl animate-bounce-soft"></i> 榮譽榜與動態牆
                        </h2>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                            {[
                                {label: '乘客總數', val: totalStudents, color: 'text-white'},
                                {label: '專案總數', val: totalProjects, color: 'text-white'},
                                {label: '研討會已投稿', val: confSubmitted, color: 'text-green-300'},
                                {label: '期刊已投稿', val: journalSubmitted, color: 'text-green-300'},
                                {label: 'PILOT完成', val: pilotCompleted, color: 'text-yellow-300'},
                                {label: '遊戲發展中', val: gameDev, color: 'text-yellow-300'},
                                {label: '期刊寫作中', val: journalWriting, color: 'text-pink-300'}
                            ].map((item, idx) => (
                                <div key={idx} className="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20 flex flex-col justify-center text-center hover:bg-white/20 transition-colors group">
                                    <span className="text-indigo-100 text-[11px] font-black tracking-wider mb-2 opacity-80">{item.label}</span>
                                    <span className={`text-3xl font-black drop-shadow-lg group-hover:scale-110 transition-transform ${item.color}`}>{item.val}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 登入介面 ---
        const LoginScreen = ({ onLoginSuccess }) => {
          const [devEmail, setDevEmail] = useState('composerho@gmail.com');

          useEffect(() => {
            const CLIENT_ID = "701247251903-878bdbdelfebt7tgm6sdlndtsirmv5li.apps.googleusercontent.com"; 
            if (window.google) {
              window.google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: (response) => {
                  const payload = JSON.parse(atob(response.credential.split('.')[1]));
                  onLoginSuccess(payload.email, payload.name, payload.picture);
                }
              });
              window.google.accounts.id.renderButton(
                document.getElementById("google-signin-button"),
                { theme: "outline", size: "large", width: 280, text: "continue_with" }
              );
            }
          }, []);

          return (
            <div className="min-h-screen bg-shapes flex items-center justify-center p-4">
               <div className="cloud cloud-1">☁️</div><div className="cloud cloud-2">⛅</div><div className="bg-train">🚂🚋🚋</div>
              
              <div className="bg-white/90 backdrop-blur-xl max-w-md w-full rounded-[2.5rem] shadow-[0_20px_60px_rgba(0,0,0,0.1)] overflow-hidden animate-modal-pop border-[6px] border-white relative z-10">
                <div className="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-10 text-center relative overflow-hidden">
                  <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20"></div>
                  <i className="fa-solid fa-train-subway text-white text-6xl mb-4 drop-shadow-lg animate-bounce-soft"></i>
                  <h1 className="text-3xl font-black text-white tracking-tight drop-shadow-md">MEG-RMS</h1>
                  <p className="bg-white/20 inline-block px-4 py-1.5 rounded-full text-indigo-50 text-sm mt-3 font-bold backdrop-blur-sm border border-white/30">新自強3000 研究進度管理系統</p>
                </div>
                <div className="p-8 text-center flex flex-col items-center">
                  <h2 className="text-2xl font-black text-indigo-900 mb-2">乘客請驗票登入 🎫</h2>
                  <p className="text-sm text-gray-500 mb-8 font-medium">請使用您的 Google 帳號嗶卡上車。</p>
                  
                  <div className="p-2 bg-indigo-50 rounded-2xl border-2 border-indigo-100 mb-8 animate-pulse-glow">
                      <div id="google-signin-button"></div>
                  </div>

                  <div className="w-full flex items-center justify-center mt-4 mb-4 opacity-50">
                    <div className="h-0.5 bg-gray-300 flex-1 rounded-full"></div>
                    <span className="px-4 text-xs text-gray-500 font-black">開發測試專用</span>
                    <div className="h-0.5 bg-gray-300 flex-1 rounded-full"></div>
                  </div>
                  
                  <div className="w-full bg-slate-50 p-5 rounded-3xl border-2 border-slate-200 group focus-within:border-indigo-300 transition-colors">
                    <input type="text" placeholder="輸入 Email..." className="w-full p-3 text-sm border-2 border-slate-200 rounded-xl focus:border-indigo-400 focus:outline-none mb-3 font-bold text-center bg-white transition-colors" value={devEmail} onChange={(e) => setDevEmail(e.target.value)} />
                    <button onClick={() => onLoginSuccess(devEmail, '測試用戶', '')} className="w-full py-3 bg-slate-800 text-white font-black rounded-xl hover:bg-slate-700 active:scale-95 transition-all shadow-md">模擬上車</button>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- 老師儀表板 ---
        const TeacherDashboard = ({ 
            projects, setProjects, students, setStudents, conferences, setConferences, 
            announcements, setAnnouncements, usefulLinks, setUsefulLinks, openMarqueeManager 
        }) => {
          const [sortBy, setSortBy] = useState('latest'); 
          const [filterDegree, setFilterDegree] = useState('all');
          const [filterStatus, setFilterStatus] = useState('all'); 
          
          const [isAddStudentOpen, setIsAddStudentOpen] = useState(false);
          const [isConfModalOpen, setIsConfModalOpen] = useState(false);
          const [isAnnouncementsModalOpen, setIsAnnouncementsModalOpen] = useState(false);
          const [isLinksModalOpen, setIsLinksModalOpen] = useState(false);

          const [manageStudentProjectsId, setManageStudentProjectsId] = useState(null);
          const [editingProjectNotes, setEditingProjectNotes] = useState(null);
          const [isAddProjectModalOpen, setIsAddProjectModalOpen] = useState(false);
          
          const [newProjectForStudent, setNewProjectForStudent] = useState({ title: '', status: STATUSES[0], mentors: '' });
          const [newStudent, setNewStudent] = useState({ name: '', degree: '', contactLink: '', email: '', localFolder: '' });
          const [newConf, setNewConf] = useState({ name: '', url: '', submitDeadline: '', confirmDeadline: '' });
          const [editingConfId, setEditingConfId] = useState(null);
          const [editConfData, setEditConfData] = useState({});

          const [newAnnouncement, setNewAnnouncement] = useState({ title: '', content: '' });
          const [editingAnnouncementId, setEditingAnnouncementId] = useState(null);
          const [editAnnouncementData, setEditAnnouncementData] = useState({});

          const [newLink, setNewLink] = useState({ title: '', url: '', description: '' });
          const [editingLinkId, setEditingLinkId] = useState(null);
          const [editLinkData, setEditLinkData] = useState({});

          const [deletingProjectId, setDeletingProjectId] = useState(null);
          const [deleteReason, setDeleteReason] = useState("");

          const pendingApprovals = projects.filter(p => p.pendingStatus !== null);
          const stagnantProjects = projects.filter(p => p.status.includes("概念發想") && p.pendingStatus === null);

          // Approval actions
          const handleApprove = (projectId) => {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const updatedProject = { ...project, status: project.pendingStatus, pendingStatus: null, pendingDescription: null, lastUpdate: new Date().toISOString().split('T')[0] };
            setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
            syncToBackend('updateProject', updatedProject);
          };

          const handleReject = (projectId) => {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            const updatedProject = { ...project, pendingStatus: null, pendingDescription: null };
            setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
            syncToBackend('updateProject', updatedProject);
          };

          const handleAppendNote = (studentId, text) => {
            const student = students.find(s => s.id === studentId);
            if (!student) return;
            const dateStr = new Date().toLocaleDateString('zh-TW', {month: 'numeric', day: 'numeric'});
            const newNotes = student.notes ? `${student.notes}\n[${dateStr}] ${text}` : `[${dateStr}] ${text}`;
            const updatedStudent = { ...student, notes: newNotes };
            setStudents(students.map(s => s.id === studentId ? updatedStudent : s));
            syncToBackend('updateStudent', updatedStudent);
          };

          const handleSetLocalFolder = (student) => {
            const path = prompt(`請設定 ${student.name} 的本機資料夾路徑 (例如 D:\\MEG\\StudentA)：`, student.localFolder || "");
            if (path !== null) {
                const updatedStudent = { ...student, localFolder: path.trim() };
                setStudents(students.map(s => s.id === student.id ? updatedStudent : s));
                syncToBackend('updateStudent', updatedStudent);
            }
          };

          const handleAddStudentSubmit = () => {
            if (!newStudent.name || !newStudent.email) return alert("姓名與信箱為必填！");
            const st = {
              id: 's' + Date.now(),
              name: newStudent.name.trim(),
              degree: newStudent.degree.trim(),
              contactLink: newStudent.contactLink.trim(),
              email: newStudent.email.trim(),
              localFolder: newStudent.localFolder.trim(),
              notes: ''
            };
            setStudents([...students, st]);
            syncToBackend('addStudent', st);
            setIsAddStudentOpen(false);
            setNewStudent({ name: '', degree: '', contactLink: '', email: '', localFolder: '' });
          };

          const handleAddConfSubmit = () => {
            if (!newConf.name || !newConf.confirmDeadline) return alert("名稱與確認死線為必填！");
            const conf = { id: 'c' + Date.now(), ...newConf };
            const updatedConfs = [...conferences, conf];
            setConferences(updatedConfs);
            syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
            setNewConf({ name: '', url: '', submitDeadline: '', confirmDeadline: '' });
          };
          const handleSaveEditConf = () => {
            if (!editConfData.name || !editConfData.confirmDeadline) return alert("名稱與死線必填！");
            const updatedConfs = conferences.map(c => c.id === editingConfId ? editConfData : c);
            setConferences(updatedConfs);
            syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
            setEditingConfId(null);
          };
          const handleDeleteConf = (confId) => {
            if(!confirm("確定要刪除嗎？")) return;
            const updatedConfs = conferences.filter(c => c.id !== confId);
            setConferences(updatedConfs);
            syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
          };

          const handleAddAnnouncement = () => {
             if (!newAnnouncement.title || !newAnnouncement.content) return alert("標題與內容必填！");
             const ann = { id: 'a' + Date.now(), title: newAnnouncement.title, content: newAnnouncement.content, date: new Date().toLocaleDateString('zh-TW') };
             const updatedAnns = [...announcements, ann];
             setAnnouncements(updatedAnns);
             syncToBackend('updateConfig', { key: 'announcementsList', value: JSON.stringify(updatedAnns) });
             setNewAnnouncement({ title: '', content: '' });
          };
          const handleSaveEditAnnouncement = () => {
             if (!editAnnouncementData.title || !editAnnouncementData.content) return alert("標題與內容必填！");
             const updatedAnns = announcements.map(a => a.id === editingAnnouncementId ? editAnnouncementData : a);
             setAnnouncements(updatedAnns);
             syncToBackend('updateConfig', { key: 'announcementsList', value: JSON.stringify(updatedAnns) });
             setEditingAnnouncementId(null);
          };
          const handleDeleteAnnouncement = (id) => {
             if(!confirm("確定要刪除此公告嗎？")) return;
             const updatedAnns = announcements.filter(a => a.id !== id);
             setAnnouncements(updatedAnns);
             syncToBackend('updateConfig', { key: 'announcementsList', value: JSON.stringify(updatedAnns) });
          };

          const handleAddLink = () => {
             if (!newLink.title || !newLink.url) return alert("標題與網址必填！");
             const link = { id: 'l' + Date.now(), ...newLink };
             const updatedLinks = [...usefulLinks, link];
             setUsefulLinks(updatedLinks);
             syncToBackend('updateConfig', { key: 'usefulLinksList', value: JSON.stringify(updatedLinks) });
             setNewLink({ title: '', url: '', description: '' });
          };
          const handleSaveEditLink = () => {
             if (!editLinkData.title || !editLinkData.url) return alert("標題與網址必填！");
             const updatedLinks = usefulLinks.map(l => l.id === editingLinkId ? editLinkData : l);
             setUsefulLinks(updatedLinks);
             syncToBackend('updateConfig', { key: 'usefulLinksList', value: JSON.stringify(updatedLinks) });
             setEditingLinkId(null);
          };
          const handleDeleteLink = (id) => {
             if(!confirm("確定要刪除此連結嗎？")) return;
             const updatedLinks = usefulLinks.filter(l => l.id !== id);
             setUsefulLinks(updatedLinks);
             syncToBackend('updateConfig', { key: 'usefulLinksList', value: JSON.stringify(updatedLinks) });
          };

          const handleDeleteProjectSubmit = () => {
            if (!deleteReason.trim()) return alert("請輸入刪除說明或原因！");
            const project = projects.find(p => p.id === deletingProjectId);
            const student = students.find(s => s.id === project.studentId);
            const dateStr = new Date().toLocaleDateString('zh-TW', {month: 'numeric', day: 'numeric'});
            const reasonStr = `[${dateStr}] 系統刪除了專案「${project.title}」，原因：${deleteReason}`;
            const updatedStudent = { ...student, notes: student.notes ? student.notes + '\n' + reasonStr : reasonStr };
            
            setProjects(projects.filter(p => p.id !== deletingProjectId));
            setStudents(students.map(s => s.id === student.id ? updatedStudent : s));
            syncToBackend('deleteProject', { id: deletingProjectId });
            syncToBackend('updateStudent', updatedStudent);
            
            setDeletingProjectId(null);
            setDeleteReason("");
          };

          const handleSaveProjectNotes = (projectId, notesText) => {
             const project = projects.find(p => p.id === projectId);
             const updated = { ...project, notes: notesText, hasUnreadMemo: true };
             setProjects(projects.map(p => p.id === projectId ? updated : p));
             syncToBackend('updateProject', updated);
             setEditingProjectNotes(null);
          };

          const handleAddProjectByTeacher = () => {
            if(!newProjectForStudent.title.trim() || !manageStudentProjectsId) return;
            const targetStudent = students.find(s => s.id === manageStudentProjectsId);
            
            const newProj = {
              id: Date.now().toString(), studentId: targetStudent.id, studentName: targetStudent.name,
              title: newProjectForStudent.title.trim(), status: newProjectForStudent.status,
              mentors: newProjectForStudent.mentors.trim(), pendingStatus: null, pendingDescription: null,
              targetConference: null, notes: '', hasUnreadMemo: true, 
              lastUpdate: new Date().toISOString().split('T')[0]
            };
            setProjects([...projects, newProj]);
            syncToBackend('addProject', newProj);
            setIsAddProjectModalOpen(false);
            setNewProjectForStudent({ title: '', status: STATUSES[0], mentors: '' });
          };

          const handleUpdateMentors = (projectId, newMentors) => {
              const project = projects.find(p => p.id === projectId);
              if (project.mentors !== newMentors) {
                  const updated = { ...project, mentors: newMentors };
                  setProjects(projects.map(p => p.id === projectId ? updated : p));
                  syncToBackend('updateProject', updated);
              }
          };

          const augmentedStudents = students.map(student => {
            const studentProjects = projects.filter(p => p.studentId === student.id);
            const projectCount = studentProjects.length;
            let latestUpdate = '2000-01-01'; 
            studentProjects.forEach(p => { if (p.lastUpdate && p.lastUpdate > latestUpdate) latestUpdate = p.lastUpdate; });
            const displayDate = latestUpdate === '2000-01-01' ? '無更新' : latestUpdate;
            const hasPending = studentProjects.some(p => p.pendingStatus !== null);
            const hasStagnant = studentProjects.some(p => p.status.includes("概念發想") && p.pendingStatus === null);
            return { ...student, projectCount, latestUpdate, displayDate, hasPending, hasStagnant };
          });

          let processedStudents = augmentedStudents.filter(s => {
            if (filterDegree !== 'all' && !s.degree.includes(filterDegree)) return false;
            if (filterStatus === 'pending' && !s.hasPending) return false;
            if (filterStatus === 'stagnant' && !s.hasStagnant) return false;
            return true;
          });

          processedStudents.sort((a, b) => {
            if (sortBy === 'latest') return b.latestUpdate.localeCompare(a.latestUpdate);
            if (sortBy === 'oldest') return a.latestUpdate.localeCompare(b.latestUpdate);
            if (sortBy === 'projects_desc') return b.projectCount - a.projectCount;
            return 0;
          });

          return (
            <div className="space-y-8 animate-fade-in pb-20">
              <AchievementDashboard projects={projects} students={students} />

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                 <AnnouncementsBoard announcements={announcements} />
                 <UsefulLinksBoard links={usefulLinks} />
              </div>

              {/* 管理控制列 */}
              <div className="flex flex-wrap justify-between items-center bg-white/90 backdrop-blur-md p-5 rounded-[2rem] shadow-sm border-2 border-white gap-4">
                <h2 className="text-2xl font-black text-indigo-900 flex items-center tracking-wide">
                  <i className="fa-solid fa-gamepad text-indigo-500 mr-3 text-3xl"></i> 列車長控制台
                </h2>
                <div className="flex flex-wrap gap-3">
                  <button onClick={() => setIsAnnouncementsModalOpen(true)} className="px-4 py-2.5 bg-sky-100 text-sky-700 rounded-2xl font-bold hover:bg-sky-200 transition border border-sky-200 shadow-sm active:scale-95">
                    <i className="fa-solid fa-bullhorn mr-2"></i> 發布公告
                  </button>
                  <button onClick={() => setIsLinksModalOpen(true)} className="px-4 py-2.5 bg-emerald-100 text-emerald-700 rounded-2xl font-bold hover:bg-emerald-200 transition border border-emerald-200 shadow-sm active:scale-95">
                    <i className="fa-solid fa-link mr-2"></i> 連結管理
                  </button>
                  <button onClick={() => setIsConfModalOpen(true)} className="px-4 py-2.5 bg-teal-100 text-teal-700 rounded-2xl font-bold hover:bg-teal-200 transition border border-teal-200 shadow-sm active:scale-95">
                    <i className="fa-solid fa-calendar-check mr-2"></i> 研討會
                  </button>
                  <button onClick={openMarqueeManager} className="px-4 py-2.5 bg-indigo-100 text-indigo-700 rounded-2xl font-bold hover:bg-indigo-200 transition border border-indigo-200 shadow-sm active:scale-95">
                    <i className="fa-solid fa-tower-broadcast mr-2"></i> 廣播
                  </button>
                </div>
              </div>

              {/* 待辦事項區 */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <Card className="col-span-1 lg:col-span-2 border-t-[6px] border-t-orange-400">
                  <div className="p-5 border-b bg-gradient-to-r from-orange-50 to-white flex justify-between items-center">
                    <h3 className="font-black text-xl text-orange-900 flex items-center">
                      <i className="fa-solid fa-bell text-orange-500 mr-3 animate-bounce-soft"></i> 待確認進度申請 
                      <span className="ml-3 bg-orange-500 text-white text-sm px-3 py-1 rounded-full shadow-inner">{pendingApprovals.length}</span>
                    </h3>
                  </div>
                  <div className="p-5 space-y-5 max-h-[450px] overflow-y-auto bg-slate-50/50">
                    {pendingApprovals.length === 0 ? (
                      <div className="text-orange-300 font-bold text-center py-10 flex flex-col items-center">
                        <i className="fa-solid fa-mug-hot text-5xl mb-4"></i>
                        目前沒有待審核的申請，可以喝杯咖啡休息一下囉！☕
                      </div>
                    ) : (
                      pendingApprovals.map(project => (
                        <div key={project.id} className="flex flex-col xl:flex-row justify-between items-start xl:items-center bg-white border-2 border-orange-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition gap-4">
                          <div className="w-full">
                            <div className="font-black text-indigo-900 text-xl flex items-center flex-wrap gap-2">
                              <span className="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-xl text-sm mr-2">{project.studentName}</span> 
                              {project.title}
                              <button onClick={() => setEditingProjectNotes(project)} className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1.5 rounded-xl border-2 border-indigo-100 hover:bg-indigo-100 transition flex items-center active:scale-95">
                                <i className="fa-solid fa-book-open mr-1.5"></i> 備忘錄
                              </button>
                            </div>
                            <div className="text-sm mt-3 flex items-center gap-3 bg-slate-50 p-2.5 rounded-xl border border-slate-200 w-fit font-bold text-slate-600">
                              <span className="line-through opacity-60">{project.status}</span>
                              <i className="fa-solid fa-circle-arrow-right text-orange-400 text-lg"></i>
                              <span className="text-orange-600 bg-orange-50 px-2 py-1 rounded-lg">{project.pendingStatus}</span>
                            </div>
                            {project.pendingDescription && (
                              <div className="mt-4 bg-sky-50/80 p-4 rounded-xl border-2 border-sky-100 text-sm text-sky-900 relative group w-full">
                                <span className="font-black text-sky-700 mb-2 flex items-center">
                                  <i className="fa-solid fa-comment-dots mr-2 text-lg"></i>學生的話：
                                </span>
                                <p className="whitespace-pre-wrap font-medium">{project.pendingDescription}</p>
                                <button onClick={() => handleAppendNote(project.studentId, project.pendingDescription)} className="absolute top-3 right-3 text-xs bg-white border-2 border-sky-200 text-sky-600 px-3 py-1.5 rounded-xl shadow-sm hover:bg-sky-500 hover:text-white transition opacity-0 group-hover:opacity-100 font-bold active:scale-95" title="移至學生的指導註記中">
                                  <i className="fa-solid fa-thumbtack mr-1"></i> 釘選註記
                                </button>
                              </div>
                            )}
                          </div>
                          <div className="flex gap-3 w-full xl:w-auto shrink-0">
                            <button onClick={() => handleApprove(project.id)} className="flex-1 xl:flex-none px-6 py-3 bg-green-500 text-white font-black rounded-2xl hover:bg-green-600 shadow-md shadow-green-200 active:scale-95 transition flex justify-center items-center"><i className="fa-solid fa-check mr-2"></i> 核准</button>
                            <button onClick={() => handleReject(project.id)} className="flex-1 xl:flex-none px-6 py-3 bg-white text-red-500 font-black rounded-2xl border-2 border-red-200 hover:bg-red-50 active:scale-95 transition flex justify-center items-center">退回</button>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </Card>

                <Card className="border-t-[6px] border-t-red-400 flex flex-col">
                  <div className="p-5 border-b bg-gradient-to-r from-red-50 to-white">
                    <h3 className="font-black text-xl text-red-900 flex items-center">
                      <i className="fa-solid fa-triangle-exclamation text-red-500 mr-3 animate-pulse"></i> 卡關警報區
                    </h3>
                  </div>
                  <div className="p-5 flex-grow overflow-y-auto bg-slate-50/50" style={{maxHeight: '450px'}}>
                    <ul className="space-y-4">
