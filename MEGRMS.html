<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEG新自強3000列車 - 進度管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background-color: #f0f4f8; }

        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-150%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes float-cloud { 0% { transform: translateX(100vw); } 100% { transform: translateX(-20vw); } }
        @keyframes slide-train { 0% { transform: translateX(120vw); } 100% { transform: translateX(-50vw); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-bounce-soft { animation: bounce-soft 2s infinite ease-in-out; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-modal-pop { animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .rich-content { font-size: 1.125rem; line-height: 1.75; }
        .rich-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content a { color: #4f46e5; text-decoration: underline; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .rich-content a:hover { color: #ec4899; }
        .rich-content p { margin-bottom: 0.5rem; min-height: 1rem; }
        .rich-content b, .rich-content strong { font-weight: 900; color: #1e1b4b; }
        .rich-content i, .rich-content em { font-style: italic; }
        .rich-content u { text-decoration: underline; text-decoration-color: #818cf8; text-decoration-thickness: 3px;}
        .rich-content strike { text-decoration: line-through; color: #9ca3af; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }

        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #e0e7ff 0%, #fdf4ff 50%, #e0f2fe 100%); }
        .cloud { position: absolute; font-size: 4rem; opacity: 0.4; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
        .cloud-1 { top: 10%; animation: float-cloud 40s linear infinite; }
        .cloud-2 { top: 30%; font-size: 5rem; animation: float-cloud 55s linear infinite 15s; }
        .cloud-3 { top: 60%; font-size: 3rem; animation: float-cloud 45s linear infinite 5s; }
        .bg-train { position: absolute; bottom: 5%; font-size: 5rem; opacity: 0.15; animation: slide-train 30s linear infinite; }
    </style>
</head>
<body class="text-gray-800">
    <div class="bg-shapes">
        <div class="cloud cloud-1">☁️</div><div class="cloud cloud-2">⛅</div><div class="cloud cloud-3">☁️</div>
        <div class="bg-train">🚂🚋🚋🚋🚋🚋</div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STATUSES = [
          "💭 概念發想未經報告", "✅ 報告後老師確認", "🛠️ 研究與遊戲發展中", 
          "🎯 PILOT完成", "📤 研討會已投稿", "📋 期刊施測準備中", 
          "✍️ 期刊寫作中", "🎉 期刊已投稿", "📊 學位論文施測中", 
          "📜 學位論文撰寫中", "📌 其他"
        ];

        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwvFe7geACFOL5yRauhX8WiBqafBLJiOj7CSPB6PNgoWkVqHeIVUS-wxGQWPGuC5aFG/exec";

        // 🌟 自動裁切日期格式的工具函式 (去除 T16:00:00.000Z 等)
        const formatDate = (dateVal) => {
            if (!dateVal) return '';
            if (typeof dateVal === 'string') return dateVal.split('T')[0];
            if (dateVal instanceof Date && !isNaN(dateVal.getTime())) {
                const y = dateVal.getFullYear();
                const m = String(dateVal.getMonth() + 1).padStart(2, '0');
                const d = String(dateVal.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }
            return dateVal;
        };

        const extractText = (html) => {
            if(!html) return "";
            const tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        };

        const copyToClipboard = (text) => {
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-999999px"; textArea.style.top = "-999999px";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); alert('✨ 登登！已成功複製到剪貼簿！'); } catch (err) { alert('🥺 哎呀，複製失敗，請手動選取複製。'); }
            textArea.remove();
        };

        const syncToBackend = (action, data) => {
          const toastId = 'toast-' + Date.now();
          const toast = document.createElement('div');
          toast.id = toastId;
          toast.className = 'fixed bottom-6 right-6 bg-indigo-900/90 backdrop-blur-md text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-indigo-400 animate-modal-pop';
          toast.innerHTML = '<i class="fa-solid fa-train-subway fa-bounce mr-3 text-2xl text-yellow-300"></i> 列車行駛中，正在同步資料...';
          document.body.appendChild(toast);

          fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action, data }) })
          .then(res => res.json())
          .then(result => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            if (!result.success) {
              alert(`❌ 資料庫寫入失敗！\n\n動作：${action}\n錯誤原因：\n${result.error}`);
            } else {
              const successToast = document.createElement('div');
              successToast.className = 'fixed bottom-6 right-6 bg-gradient-to-r from-emerald-400 to-teal-500 text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-white animate-modal-pop';
              successToast.innerHTML = '<i class="fa-solid fa-star fa-spin mr-3 text-2xl text-yellow-200"></i> 同步成功！棒棒的！';
              document.body.appendChild(successToast);
              setTimeout(() => {
                successToast.style.opacity = '0'; successToast.style.transform = 'translateY(20px)'; successToast.style.transition = 'all 0.5s ease-out';
                setTimeout(() => successToast.remove(), 500);
              }, 2500);
            }
          })
          .catch(err => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            alert(`🔌 哎呀，網路斷線了！請檢查網路後再試。\n\n詳細資訊: ${err.message}`);
          });
        };

        const calculateDaysLeft = (targetDate) => {
            if (!targetDate) return null;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            if (isNaN(target.getTime())) return null; 
            target.setHours(0,0,0,0);
            return Math.round((target - today) / (1000 * 60 * 60 * 24));
        };

        const getDaysSince = (dateString) => {
            if(!dateString) return 0;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateString);
            if(isNaN(target.getTime())) return 0;
            target.setHours(0,0,0,0);
            return Math.round((today - target) / (1000 * 60 * 60 * 24));
        };

        const StatusBadge = ({ status }) => {
          let colors = "bg-gray-100 text-gray-600 border-gray-200";
          if (status.includes("發想")) colors = "bg-orange-100 text-orange-700 border-orange-300 shadow-orange-100";
          if (status.includes("發展中") || status.includes("準備中")) colors = "bg-yellow-100 text-yellow-700 border-yellow-400 shadow-yellow-100";
          if (status.includes("施測") || status.includes("確認")) colors = "bg-sky-100 text-sky-700 border-sky-300 shadow-sky-100";
          if (status.includes("寫作中")) colors = "bg-fuchsia-100 text-fuchsia-700 border-fuchsia-300 shadow-fuchsia-100";
          if (status.includes("投稿") || status.includes("完成")) colors = "bg-emerald-100 text-emerald-700 border-emerald-300 shadow-emerald-100";
          if (status.includes("終止")) colors = "bg-slate-200 text-slate-700 border-slate-400 shadow-slate-200 line-through opacity-70";

          return <span className={`px-3 py-1.5 rounded-2xl text-xs font-black shadow-sm border-2 ${colors} flex items-center w-fit`}>{status}</span>;
        };

        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white/80 backdrop-blur-lg rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 ${className}`}>
            {children}
          </div>
        );

        const RichTextEditor = ({ initialValue, onChange, readOnly, placeholder }) => {
            const editorRef = useRef(null);

            useEffect(() => {
                if (editorRef.current && initialValue !== undefined && !readOnly) {
                    if(editorRef.current.innerHTML === '') { editorRef.current.innerHTML = initialValue || ''; }
                }
            }, [initialValue, readOnly]);

            const execCmd = (cmd, val = null) => {
                document.execCommand(cmd, false, val);
                if(editorRef.current) { editorRef.current.focus(); onChange(editorRef.current.innerHTML); }
            };

            const insertLink = () => {
                const url = prompt("🔗 請輸入網址 (須包含 http:// 或 https://):", "https://");
                if(url) execCmd('createLink', url);
            };

            if (readOnly) {
                return (
                    <div 
                        className="rich-content text-gray-800 leading-relaxed bg-white/60 p-5 rounded-2xl border-2 border-indigo-100 min-h-[120px] overflow-y-auto shadow-inner" 
                        dangerouslySetInnerHTML={{__html: initialValue || '<span class="text-gray-400 font-bold flex items-center justify-center h-full"><i class="fa-solid fa-ghost mr-2"></i> 空空如也，目前沒有備忘錄喔。</span>'}}
                    ></div>
                );
            }

            return (
                <div className="border-2 border-indigo-200 rounded-2xl overflow-hidden bg-white flex flex-col h-full shadow-inner focus-within:border-indigo-400 transition-colors">
                    <div className="bg-indigo-50 border-b-2 border-indigo-100 flex items-center p-2 gap-2 overflow-x-auto flex-wrap">
                        <select onChange={(e) => execCmd('fontSize', e.target.value)} className="p-1 rounded border-2 border-indigo-200 text-sm font-bold text-indigo-900 bg-white outline-none cursor-pointer" title="字體大小">
                            <option value="3">正常字體</option>
                            <option value="4">加大字體</option>
                            <option value="5">巨大字體</option>
                            <option value="6">超巨大字體</option>
                        </select>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={() => execCmd('bold')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 font-black transition">B</button>
                        <button type="button" onClick={() => execCmd('italic')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 italic font-serif transition">I</button>
                        <button type="button" onClick={() => execCmd('underline')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 underline transition">U</button>
                        <button type="button" onClick={() => execCmd('strikeThrough')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-900 line-through transition">S</button>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={() => execCmd('justifyLeft')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition"><i className="fa-solid fa-align-left"></i></button>
                        <button type="button" onClick={() => execCmd('justifyCenter')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition"><i className="fa-solid fa-align-center"></i></button>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={() => execCmd('insertUnorderedList')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition"><i className="fa-solid fa-list-ul"></i></button>
                        <button type="button" onClick={() => execCmd('insertOrderedList')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-indigo-700 transition"><i className="fa-solid fa-list-ol"></i></button>
                        <div className="w-1 h-1 bg-indigo-300 rounded-full mx-1"></div>
                        <button type="button" onClick={insertLink} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-pink-500 transition"><i className="fa-solid fa-link"></i></button>
                        <button type="button" onClick={() => execCmd('unlink')} className="w-9 h-9 flex items-center justify-center hover:bg-white rounded-xl shadow-sm text-gray-400 transition"><i className="fa-solid fa-link-slash"></i></button>
                    </div>
                    <div 
                        ref={editorRef}
                        className="flex-grow p-5 outline-none overflow-y-auto rich-content leading-relaxed"
                        contentEditable={true}
                        onInput={(e) => onChange(e.currentTarget.innerHTML)}
                        onBlur={(e) => onChange(e.currentTarget.innerHTML)}
                        style={{ minHeight: '200px' }}
                    ></div>
                </div>
            );
        };

        const ProjectNotesModal = ({ isOpen, onClose, project, onSave, isTeacher, markAsRead }) => {
            const [notes, setNotes] = useState("");
            
            useEffect(() => {
                if (isOpen && project) {
                    setNotes(project.notes || "");
                    if (!isTeacher && (project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true') && markAsRead) {
                        markAsRead(project.id);
                    }
                }
            }, [isOpen, project, isTeacher]);

            if (!isOpen || !project) return null;

            return (
                <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                    <div className="bg-white rounded-[2rem] w-full max-w-4xl flex flex-col h-[85vh] shadow-[0_20px_50px_rgb(0,0,0,0.15)] overflow-hidden border-4 border-white animate-modal-pop">
                        <div className={`p-5 text-white flex justify-between items-center shadow-sm ${isTeacher ? 'bg-gradient-to-r from-indigo-600 to-purple-600' : 'bg-gradient-to-r from-slate-700 to-slate-800'}`}>
                            <h3 className="font-black text-xl flex items-center tracking-wide">
                                <i className="fa-solid fa-book-sparkles mr-3 text-yellow-300 animate-bounce-soft"></i> 
                                【{project.title}】專案備忘錄 {isTeacher ? "(編輯模式)" : "(唯讀模式)"}
                            </h3>
                            <button onClick={onClose} className="hover:rotate-90 hover:scale-110 transition-all duration-300 w-8 h-8 flex justify-center items-center rounded-full bg-white/20"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="p-6 flex-grow flex flex-col bg-slate-50/50 overflow-hidden">
                            <label className="text-sm font-black text-indigo-900 mb-3 flex items-center">
                                <i className="fa-solid fa-pen-nib text-indigo-400 mr-2"></i>
                                {isTeacher ? "在此編輯給學生的專案備忘錄與指示（支援粗體、大小調整等）：" : "老師給的專案備忘錄與指示："}
                            </label>
                            
                            <div className="flex-grow overflow-hidden relative">
                                <RichTextEditor initialValue={notes} onChange={setNotes} readOnly={!isTeacher} placeholder="開始輸入專案備忘錄與修改方向..." />
                            </div>

                            <div className="flex justify-between items-center mt-6 pt-4 border-t-2 border-indigo-50">
                                <button onClick={() => copyToClipboard(extractText(notes))} className="px-6 py-3 bg-white text-indigo-600 font-black rounded-2xl hover:bg-indigo-50 hover:shadow-md transition-all flex items-center border-2 border-indigo-100 active:scale-95">
                                    <i className="fa-regular fa-copy mr-2"></i> 複製純文字
                                </button>
                                <div className="flex gap-4">
                                    {isTeacher ? (
                                        <>
                                            <button onClick={onClose} className="px-6 py-3 bg-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-200 transition-colors active:scale-95">取消</button>
                                            <button onClick={() => onSave(project.id, notes)} className="px-6 py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black rounded-2xl shadow-lg shadow-indigo-200 hover:shadow-xl hover:-translate-y-1 transition-all flex items-center active:scale-95">
                                                <i className="fa-solid fa-wand-magic-sparkles mr-2"></i> 儲存確認
                                            </button>
                                        </>
                                    ) : (
                                        <button onClick={onClose} className="px-8 py-3 bg-slate-800 text-white font-black rounded-2xl shadow-lg hover:bg-slate-700 transition-all active:scale-95 flex items-center">
                                            <i className="fa-solid fa-check mr-2"></i> 我知道了
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AnnouncementsBoard = ({ announcements }) => (
          <Card className="flex flex-col h-full border-t-[6px] border-t-sky-400 overflow-hidden">
             <div className="p-5 border-b border-sky-50 bg-gradient-to-r from-sky-50 to-white flex justify-between items-center">
                <h3 className="font-black text-xl text-sky-900 flex items-center"><i className="fa-solid fa-bullhorn text-sky-500 mr-3 animate-bounce-soft"></i>列車公告欄</h3>
             </div>
             <div className="p-5 flex-grow overflow-y-auto space-y-4" style={{maxHeight: '400px'}}>
                {announcements.length === 0 ? <div className="text-sky-300 text-sm font-bold text-center py-10 flex flex-col items-center"><i className="fa-regular fa-face-smile text-4xl mb-2"></i>目前沒有公告。</div> :
                 [...announcements].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(a => (
                    <div key={a.id} className="bg-white border-2 border-sky-100 rounded-2xl p-5 shadow-sm hover:shadow-md hover:border-sky-300 transition-all group">
                       <div className="flex justify-between items-start border-b-2 border-sky-50 pb-3 mb-3">
                          <h4 className="font-black text-sky-900 text-lg group-hover:text-sky-600 transition-colors">{a.title}</h4>
                          <span className="text-[10px] font-bold text-sky-600 bg-sky-100 px-3 py-1 rounded-full whitespace-nowrap"><i className="fa-regular fa-clock mr-1"></i>{formatDate(a.date)}</span>
                       </div>
                       <div className="rich-content text-sm text-gray-700" dangerouslySetInnerHTML={{__html: a.content}}></div>
                    </div>
                 ))
                }
             </div>
          </Card>
        );

        const ConferencesBoard = ({ conferences }) => (
          <Card className="flex flex-col h-full border-t-[6px] border-t-teal-400 overflow-hidden">
             <div className="p-5 border-b border-teal-50 bg-gradient-to-r from-teal-50 to-white flex justify-between items-center">
                <h3 className="font-black text-xl text-teal-900 flex items-center"><i className="fa-solid fa-calendar-check text-teal-500 mr-3 animate-bounce-soft"></i>近期研討會清單</h3>
             </div>
             <div className="p-5 flex-grow overflow-y-auto space-y-3" style={{maxHeight: '400px'}}>
                {conferences.length === 0 ? <div className="text-teal-300 text-sm font-bold text-center py-10 flex flex-col items-center"><i className="fa-regular fa-calendar-xmark text-4xl mb-2"></i>目前沒有研討會資訊。</div> :
                 conferences.map(conf => {
                    const days = calculateDaysLeft(conf.confirmDeadline);
                    return (
                        <div key={conf.id} className="bg-white border-2 border-teal-50 rounded-2xl p-4 transition-all duration-300 shadow-sm relative">
                           {days !== null && days <= 14 && days >= 0 && <div className="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] font-black px-2 py-1 rounded-lg animate-pulse shadow-md">急迫!</div>}
                           <h4 className="font-black text-teal-800 text-lg mb-2">{conf.name}</h4>
                           <div className="flex flex-col gap-1 text-xs font-bold">
                               <span className="text-slate-500">大會截稿日: {formatDate(conf.submitDeadline) || '未提供'}</span>
                               <span className={`px-2 py-1 rounded-md w-fit ${days < 0 ? 'bg-rose-100 text-rose-700' : 'bg-rose-50 border border-rose-200 text-rose-600'}`}>
                                   老師死線: {formatDate(conf.confirmDeadline)} {days !== null ? (days < 0 ? '(已過期)' : `(剩 ${days} 天)`) : ''}
                               </span>
                           </div>
                           {conf.url && <a href={conf.url} target="_blank" rel="noreferrer" className="mt-3 block text-center bg-teal-50 text-teal-700 p-2 rounded-xl text-sm font-bold hover:bg-teal-100 transition"><i className="fa-solid fa-link mr-1"></i> 前往官網</a>}
                        </div>
                    )
                 })
                }
             </div>
          </Card>
        );

        const UsefulLinksBoard = ({ links }) => (
          <Card className="flex flex-col h-full border-t-[6px] border-t-emerald-400 overflow-hidden">
             <div className="p-5 border-b border-emerald-50 bg-gradient-to-r from-emerald-50 to-white flex justify-between items-center">

              let reasons = [];
              if (p.pendingStatus !== null) return []; // 若正在等待審核，不視為卡關
              
              const daysToNext = calculateDaysLeft(p.nextStageDate);
              if (daysToNext !== null && daysToNext < 0) {
                  reasons.push(`預估進度已逾期 ${Math.abs(daysToNext)} 天`);
              }
              
              const daysSinceUpdate = getDaysSince(p.lastUpdate);
              if (p.status.includes('發想') && daysSinceUpdate > 14) {
                  reasons.push(`概念發想已卡關超過 14 天`);
              } else if (daysSinceUpdate > 30) {
                  reasons.push(`超過一個月未更新狀態`);
              }
              return reasons;
          };

          const alertedProjects = activeProjects
              .map(p => ({ ...p, alertReasons: getAlerts(p) }))
              .filter(p => p.alertReasons.length > 0);

          const handleApproveInitiate = (project) => {
             const dateStr = new Date().toLocaleDateString('zh-TW');
             const prefillNote = `\n\n<p><b>[${dateStr}] ✅ 老師已核准進度變更為：「${project.pendingStatus}」。</b></p><p>老師補充說明：</p>`;
             setEditingProjectNotes({...project, notes: (project.notes || '') + prefillNote});
             setPendingApprovalFlow({ type: 'approve', projectId: project.id, newStatus: project.pendingStatus, nextDate: project.nextStageDate });
          };

          const handleRejectInitiate = (project) => {
             const dateStr = new Date().toLocaleDateString('zh-TW');
             const prefillNote = `\n\n<p><b><span style="color:red">[${dateStr}] ❌ 老師已退回進度變更申請 (原申請：「${project.pendingStatus}」)。</span></b></p><p>退回原因與修改建議：</p>`;
             setEditingProjectNotes({...project, notes: (project.notes || '') + prefillNote});
             setPendingApprovalFlow({ type: 'reject', projectId: project.id });
          };

          const handleSaveProjectNotes = (projectId, notesText) => {
             let updated = null;
             if (pendingApprovalFlow && pendingApprovalFlow.projectId === projectId) {
                 const project = projects.find(p => p.id === projectId);
                 if (pendingApprovalFlow.type === 'approve') {
                     updated = { 
                         ...project, status: pendingApprovalFlow.newStatus, pendingStatus: null, pendingDescription: null, 
                         lastUpdate: new Date().toISOString().split('T')[0], notes: notesText, hasUnreadMemo: true, 
                         overdueEmailSent: false, lastPokeDate: null // 核准後清除提醒
                     };
                 } else { 
                     updated = { ...project, pendingStatus: null, pendingDescription: null, notes: notesText, hasUnreadMemo: true };
                 }
                 setPendingApprovalFlow(null);
             } else {
                 const project = projects.find(p => p.id === projectId);
                 updated = { ...project, notes: notesText, hasUnreadMemo: true };
             }
             setProjects(projects.map(p => p.id === projectId ? updated : p));
             syncToBackend('updateProject', updated);
             setEditingProjectNotes(null);

              const s = { id: 's' + Date.now(), ...newStudent };

              syncToBackend('addStudent', s);

                                                <span className="text-rose-600 bg-rose-50 px-2 py-1 rounded-md border border-rose-100">老師死線: {formatDate(conf.confirmDeadline)}</span>

              {/* 🌟 專案管理 Modal (管理學生的活躍專案) */}
              {manageStudentProjectsId && (
                <div className="fixed inset-0 bg-indigo-900/50 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in">
                  <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh] overflow-hidden border-4 border-indigo-100 animate-modal-pop">
                    <div className="bg-gradient-to-r from-indigo-800 to-indigo-600 p-5 text-white flex justify-between items-center">
                      <h3 className="font-black text-xl"><i className="fa-solid fa-bars-progress mr-3"></i> {students.find(s=>s.id === manageStudentProjectsId)?.name} 的專案車廂</h3>
                      <div className="flex gap-4 items-center">
                          <button onClick={() => setIsAddProjectModalOpen(true)} className="px-4 py-2 bg-white text-indigo-700 font-black rounded-xl hover:bg-indigo-50 shadow-sm active:scale-95 transition">
                              <i className="fa-solid fa-folder-plus mr-2"></i>新增專案
                          </button>
                          <button onClick={() => setManageStudentProjectsId(null)} className="hover:rotate-90 transition-all w-8 h-8 flex justify-center items-center rounded-full bg-white/20"><i className="fa-solid fa-xmark text-xl"></i></button>
                      </div>
                    </div>
                    <div className="p-6 overflow-y-auto bg-slate-50 flex-grow">
                        <div className="space-y-6">
                          {activeProjects.filter(p => p.studentId === manageStudentProjectsId).length === 0 ? (
                              <div className="text-center py-10 text-indigo-300 font-bold">這個車廂目前空空的，趕快點擊右上角新增一個專案吧！</div>
                          ) : (
                              activeProjects.filter(p => p.studentId === manageStudentProjectsId).map(project => (
                                <div key={project.id} className="bg-white border-2 border-indigo-50 rounded-3xl p-6 shadow-sm relative group">
                                    
                                    {/* 下車/終止按鈕 */}
                                    <button onClick={() => handleTerminateProject(project)} className="absolute top-6 right-6 w-10 h-10 bg-slate-100 text-slate-400 hover:bg-rose-500 hover:text-white rounded-xl flex items-center justify-center transition shadow-sm" title="設定為終止(下車)">
                                        <i className="fa-solid fa-power-off"></i>
                                    </button>

                                    <h4 className="font-black text-2xl text-slate-800 mb-3 pr-12">{project.title}</h4>
                                    
                                    <div className="mb-4 text-sm font-black text-indigo-700 flex items-center gap-2 bg-indigo-50/50 p-2.5 rounded-xl border border-indigo-100 w-fit">
                                        <i className="fa-solid fa-user-graduate text-indigo-500"></i> 指導學長姐/專家：
                                        <input 
                                            type="text" 
                                            className="p-1 border-b-2 border-indigo-200 bg-transparent focus:border-indigo-500 outline-none text-indigo-900 placeholder-indigo-300 transition-colors w-40"
                                            placeholder="尚未指派"
                                            defaultValue={project.mentors || ''}
                                            onBlur={(e) => handleUpdateMentors(project.id, e.target.value)}

                                    <div className="flex gap-3 mb-4 items-center flex-wrap">

                                        <div className="text-xs font-black text-rose-600 bg-rose-50 px-3 py-1.5 rounded-lg border border-rose-100 flex items-center shadow-sm">

                                            <button onClick={() => {setEditingDateProjectId(project.id); setNewDateVal(formatDate(project.nextStageDate) || ''); setDateReasonVal('');}} className="ml-3 bg-rose-200 text-rose-800 w-6 h-6 rounded hover:bg-rose-300 flex items-center justify-center transition active:scale-95" title="修改日期">
                                                <i className="fa-solid fa-pen"></i>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    {editingDateProjectId === project.id && (

                                            <div className="flex justify-end gap-2 mt-2">
                                                <button onClick={()=>setEditingDateProjectId(null)} className="px-4 py-2 bg-slate-200 text-slate-700 font-bold rounded-xl text-sm hover:bg-slate-300">取消</button>
                                                <button onClick={()=>handleSaveDateChange(project)} className="px-4 py-2 bg-rose-500 text-white font-black rounded-xl text-sm hover:bg-rose-600 shadow-md flex items-center active:scale-95">
                                                    <i className="fa-regular fa-paper-plane mr-2"></i>確認並通知學生
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    <button onClick={() => setEditingProjectNotes(project)} className="text-sm bg-indigo-600 text-white font-black px-5 py-2.5 rounded-xl shadow-md hover:bg-indigo-700 transition active:scale-95 mt-2">
                                      <i className="fa-solid fa-book-sparkles mr-2"></i> 專案備忘錄
                                    </button>
                                </div>
                              ))
                          )}
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 🌟 歷史/下車專案 Modal (獨立區塊) */}
              {isTerminatedModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[75] p-4 animate-fade-in">
                  <div className="bg-slate-100 rounded-[2rem] shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh] overflow-hidden border-4 border-slate-300 animate-modal-pop">
                    <div className="bg-slate-700 p-5 text-white flex justify-between items-center">
                      <h3 className="font-black text-xl"><i className="fa-solid fa-ghost mr-3"></i> 歷史下車專案管理區</h3>
                      <button onClick={() => setIsTerminatedModalOpen(false)} className="hover:rotate-90 transition-all w-8 h-8 flex justify-center items-center rounded-full bg-white/20"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div className="p-6 overflow-y-auto flex-grow">
                        <div className="space-y-4">
                          {terminatedProjects.length === 0 ? (
                              <div className="text-center py-10 text-slate-400 font-bold text-lg"><i className="fa-regular fa-folder-open text-4xl mb-3 block"></i>目前沒有下車的專案。</div>
                          ) : (
                              terminatedProjects.map(project => (
                                <div key={project.id} className="bg-white border-2 border-slate-200 rounded-3xl p-5 shadow-sm opacity-90 hover:opacity-100 transition">
                                    <div className="flex justify-between items-start mb-3">
                                        <h4 className="font-black text-xl text-slate-700"><span className="bg-slate-200 text-slate-600 px-3 py-1 rounded-xl text-sm mr-3">{project.studentName}</span>{project.title}</h4>
                                        <StatusBadge status={project.status} />
                                    </div>
                                    <div className="flex gap-3 mt-4 pt-4 border-t-2 border-slate-50">
                                        <button onClick={() => setEditingProjectNotes(project)} className="flex-1 bg-slate-200 text-slate-700 font-black py-2.5 rounded-xl hover:bg-slate-300 transition active:scale-95"><i className="fa-solid fa-clock-rotate-left mr-2"></i>查看歷史備忘錄</button>
                                        <button onClick={() => handleRestoreProject(project)} className="flex-1 bg-emerald-100 text-emerald-700 font-black py-2.5 rounded-xl hover:bg-emerald-200 transition active:scale-95"><i className="fa-solid fa-trash-can-arrow-up mr-2"></i>復原專案</button>
                                        <button onClick={() => handlePermanentDeleteProject(project)} className="flex-1 bg-rose-100 text-rose-600 font-black py-2.5 rounded-xl hover:bg-rose-500 hover:text-white transition active:scale-95"><i className="fa-solid fa-skull-crossbones mr-2"></i>永久刪除</button>
                                    </div>
                                </div>
                              ))
                          )}
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 🌟 新增專案小 Modal */}
              {isAddProjectModalOpen && (
                  <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm flex items-center justify-center z-[70] p-4 animate-fade-in">
                      <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-modal-pop border-4 border-indigo-100">
                          <h3 className="text-xl font-black text-indigo-900 mb-4"><i className="fa-solid fa-folder-plus mr-2 text-indigo-500"></i>為 {students.find(s=>s.id === manageStudentProjectsId)?.name} 新增專案</h3>
                          <div className="space-y-4">
                              <div>
                                  <label className="font-bold text-sm text-slate-700 mb-1 block">專案名稱 *</label>
                                  <input type="text" className="w-full p-2 border-2 rounded-xl bg-slate-50 focus:border-indigo-400 outline-none font-bold" value={newProjectForStudent.title} onChange={e=>setNewProjectForStudent({...newProjectForStudent, title: e.target.value})} placeholder="例如: 消防逃生VR研究" />
                              </div>
                              <div>
                                  <label className="font-bold text-sm text-slate-700 mb-1 block">初始狀態</label>
                                  <select className="w-full p-2 border-2 rounded-xl bg-slate-50 focus:border-indigo-400 outline-none font-bold text-slate-700" value={newProjectForStudent.status} onChange={e=>setNewProjectForStudent({...newProjectForStudent, status: e.target.value})}>
                                      {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                                  </select>
                              </div>
                              <div>
                                  <label className="font-bold text-sm text-slate-700 mb-1 block">指導學長姐 / 專家 (選填)</label>
                                  <input type="text" className="w-full p-2 border-2 rounded-xl bg-slate-50 focus:border-indigo-400 outline-none font-bold" value={newProjectForStudent.mentors} onChange={e=>setNewProjectForStudent({...newProjectForStudent, mentors: e.target.value})} placeholder="例如: 國鈞、立翔" />
                              </div>
                          </div>
                          <div className="mt-6 flex justify-end gap-3">
                              <button onClick={() => setIsAddProjectModalOpen(false)} className="px-5 py-2 bg-slate-200 text-slate-700 font-bold rounded-xl">取消</button>
                              <button onClick={handleAddProject} className="px-5 py-2 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 shadow-md">確認新增</button>
                          </div>
                      </div>
                  </div>
              )}

              <ProjectNotesModal isOpen={!!editingProjectNotes} project={editingProjectNotes} onClose={handleCloseProjectNotes} onSave={handleSaveProjectNotes} isTeacher={true} />
            </div>
          );
        };

        const StudentWorkspace = ({ student, projects, setProjects, students, setStudents, conferences, announcements, usefulLinks }) => {
          if (!student) return <div className="text-center py-20"><i className="fa-solid fa-train-subway text-6xl text-indigo-400 mb-6 animate-bounce-soft"></i></div>;

          // 🌟 學生端也分離活躍與下車專案
          const myActiveProjects = projects.filter(p => p.studentId === student.id && p.status !== '🛑 專案已終止 (下車)');
          const myTerminatedProjects = projects.filter(p => p.studentId === student.id && p.status === '🛑 專案已終止 (下車)');

          const [draftStatuses, setDraftStatuses] = useState({});
          const [draftDescriptions, setDraftDescriptions] = useState({});
          const [draftNextDates, setDraftNextDates] = useState({}); 

          const [isAddingProject, setIsAddingProject] = useState(false);
          const [newTitle, setNewTitle] = useState("");
          const [editingProjectNotes, setEditingProjectNotes] = useState(null);

          useEffect(() => {
              myActiveProjects.forEach(p => {
                  if (p.nextStageDate && p.overdueEmailSent !== true && p.overdueEmailSent !== "true" && !p.pendingStatus) {
                      const daysLeft = calculateDaysLeft(p.nextStageDate);
                      if (daysLeft !== null && daysLeft < 0) {
                          syncToBackend('sendOverdueEmail', { projectId: p.id, title: p.title, nextStageDate: formatDate(p.nextStageDate), studentEmail: student.email });
                          const updated = {...p, overdueEmailSent: true};
                          setProjects(prev => prev.map(proj => proj.id === p.id ? updated : proj));
                      }
                  }
              });
          }, [myActiveProjects.length]);

          const handleSubmitRequest = (projectId, currentStatus) => {
            const newStatus = draftStatuses[projectId];
            const newDesc = draftDescriptions[projectId] || '';
            const newDate = draftNextDates[projectId];

            if (!newStatus || newStatus === currentStatus) return;
            if (!newDate) return alert("🚨 請務必設定「預估抵達下個階段的日期」喔！");

            const project = projects.find(p => p.id === projectId);
            const updatedProject = { 
                ...project, pendingStatus: newStatus, pendingDescription: newDesc, nextStageDate: newDate, 
                isNewProgressUpdate: true, systemUrl: window.location.href, overdueEmailSent: false,
                lastPokeDate: null // 🌟 學生送出更新後，自動清除老師的「提醒一下」警示
            };

            setProjects(projects.map(p => p.id === projectId ? updatedProject : p));
            syncToBackend('updateProject', updatedProject);
            
            setDraftStatuses(prev => { const n={...prev}; delete n[projectId]; return n; });
            setDraftDescriptions(prev => { const n={...prev}; delete n[projectId]; return n; });
            setDraftNextDates(prev => { const n={...prev}; delete n[projectId]; return n; });
          };

          const handleMarkMemoAsRead = (projectId) => {
             const project = projects.find(p => p.id === projectId);
             if (project && (project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true')) {
                 const updated = { ...project, hasUnreadMemo: false };
                 setProjects(projects.map(p => p.id === projectId ? updated : p)); syncToBackend('updateProject', updated);
             }
          };

          return (
            <div className="space-y-8 animate-fade-in pb-20">
              <AchievementDashboard projects={projects.filter(p=>p.status!=='🛑 專案已終止 (下車)')} students={students} />

              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                 <AnnouncementsBoard announcements={announcements} />
                 <ConferencesBoard conferences={conferences} />
                 <UsefulLinksBoard links={usefulLinks} />
              </div>

              <div className="flex flex-col md:flex-row justify-between items-end md:items-center bg-white/80 backdrop-blur-md p-6 rounded-[2rem] border-2 border-white shadow-sm mb-8">
                <div>
                  <h2 className="text-3xl font-black text-indigo-900 tracking-tight flex items-center"><i className="fa-solid fa-ticket text-indigo-400 mr-3 text-2xl -rotate-12"></i> Hi, {student.name}</h2>
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                {myActiveProjects.map(project => {
                   const isUnread = project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true';
                   const daysToNext = calculateDaysLeft(project.nextStageDate);

                   return (
                  <Card key={project.id} className="relative flex flex-col border-t-[8px] border-t-indigo-400 overflow-visible mt-6">
                    {/* 🌟 持續存在的老師提醒 */}
                    {project.lastPokeDate && (
                        <div className="absolute -top-12 left-0 w-full bg-rose-500 text-white font-black p-3 rounded-t-2xl shadow-lg flex items-center justify-center animate-pulse z-0 border-2 border-rose-600">
                            <i className="fa-solid fa-hand-point-right mr-2 text-xl fa-bounce"></i> 老師在 {formatDate(project.lastPokeDate)} 關注了此專案，請盡快送出進度更新！
                        </div>
                    )}

                    {project.pendingStatus && (
                      <div className="absolute -top-4 -right-4 bg-orange-500 text-white text-sm font-black px-4 py-2 rounded-2xl shadow-lg flex items-center animate-bounce border-4 border-white z-50">
                        <i className="fa-solid fa-hourglass-half mr-2 fa-spin-pulse"></i> 老師審核中
                      </div>
                    )}

                    <div className="p-6 md:p-8 flex-grow flex flex-col bg-white rounded-3xl relative z-10">
                      <h3 className="font-black text-2xl text-slate-800 leading-tight mb-3">{project.title}</h3>
                      
                      {project.mentors && (
                          <div className="text-sm font-black text-indigo-600 mb-4 flex items-center bg-indigo-50 w-fit px-3 py-1.5 rounded-lg border border-indigo-100">
                              <i className="fa-solid fa-user-graduate mr-2"></i>指導學長姐/專家：{project.mentors}
                          </div>
                      )}

                      <div className="mb-4"><StatusBadge status={project.status} /></div>

                      <button onClick={() => setEditingProjectNotes(project)} className={`w-full mb-6 py-3 font-black rounded-2xl border-[3px] transition-all shadow-sm flex justify-center items-center group active:scale-95 ${isUnread ? 'bg-rose-50 text-rose-600 border-rose-300 animate-pulse' : 'bg-white text-indigo-600 border-indigo-100 hover:bg-indigo-50'}`}>
                         <i className={`fa-solid fa-book-sparkles mr-2 text-lg ${isUnread ? 'text-rose-500' : 'group-hover:text-indigo-500'}`}></i> 開啟專案備忘錄 
                         {isUnread && <span className="ml-3 bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full shadow tracking-widest">NEW 指示!</span>}
                      </button>

                      <div className="bg-slate-50 p-5 rounded-3xl border-2 border-slate-200 mt-auto shadow-inner">
                        <label className="text-base font-black text-slate-700 block mb-3 flex items-center"><i className="fa-solid fa-bolt mr-2 text-yellow-500"></i> 更新進度狀態：</label>
                        <div className="flex flex-col gap-4">
                          <select className="w-full p-3 border-2 border-slate-200 rounded-xl bg-white font-bold" value={project.pendingStatus || draftStatuses[project.id] || project.status} onChange={(e) => setDraftStatuses({...draftStatuses, [project.id]: e.target.value})} disabled={project.pendingStatus !== null}>
                            {STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                          
                          {!draftStatuses[project.id] && !project.pendingStatus && project.nextStageDate && (
                              <div className={`p-3 rounded-xl border-2 font-black text-sm flex items-center ${daysToNext !== null && daysToNext < 0 ? 'bg-rose-100 text-rose-700 border-rose-300 animate-pulse' : daysToNext !== null && daysToNext <= 14 ? 'bg-orange-100 text-orange-700 border-orange-300' : 'bg-teal-50 text-teal-700 border-teal-200'}`}>
                                  <i className="fa-regular fa-calendar-check mr-2"></i> 
                                  預估抵達下個階段：{formatDate(project.nextStageDate)} 
                                  {daysToNext !== null && <span className="ml-2">({daysToNext < 0 ? '已逾期！' : `剩餘 ${daysToNext} 天`})</span>}
                              </div>
                          )}
                          
                          {draftStatuses[project.id] && draftStatuses[project.id] !== project.status && !project.pendingStatus && (
                            <div className="bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-200 shadow-sm animate-fade-in relative mt-2">
                              <label className="text-sm font-black text-rose-600 block mb-2"><i className="fa-solid fa-calendar-days mr-1"></i> 預估抵達下個階段的日期 *</label>
                              <input type="date" className="w-full p-3 border-2 border-rose-200 rounded-xl bg-white font-bold mb-4 text-rose-700 outline-none focus:border-rose-400" value={draftNextDates[project.id] || ''} onChange={(e) => setDraftNextDates({...draftNextDates, [project.id]: e.target.value})} />

                              <label className="text-sm font-black text-indigo-900 block mb-2">給老師的話 <span className="text-indigo-400 font-bold">(選填)</span></label>
                              <textarea className="w-full text-sm p-3 border-2 border-white rounded-xl focus:border-indigo-400 bg-white mb-3 resize-none font-medium" rows="2" value={draftDescriptions[project.id] || ''} onChange={(e) => setDraftDescriptions({...draftDescriptions, [project.id]: e.target.value})}></textarea>
                              
                              <div className="flex justify-end">
                                <button onClick={() => handleSubmitRequest(project.id, project.status)} className="px-5 py-2.5 bg-indigo-600 text-white text-sm font-black rounded-xl hover:bg-indigo-700 active:scale-95 flex items-center shadow-md">
                                  <i className="fa-solid fa-paper-plane mr-2"></i> 送出審核並通知老師
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  </Card>
                )})}
              </div>
              
              {/* 🌟 學生端的歷史專案區塊 */}
              {myTerminatedProjects.length > 0 && (
                <div className="mt-16 bg-slate-100 p-8 rounded-[2rem] border-4 border-white shadow-inner">
                  <h3 className="text-xl font-black text-slate-500 mb-6 flex items-center">
                      <i className="fa-solid fa-ghost mr-3"></i> 已下車 / 終止的專案紀錄
                  </h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 opacity-75 grayscale hover:grayscale-0 transition duration-500">
                    {myTerminatedProjects.map(project => (
                        <div key={project.id} className="bg-white border-2 border-slate-200 rounded-2xl p-5 shadow-sm">
                            <h4 className="font-black text-lg text-slate-700 mb-2">{project.title}</h4>
                            <StatusBadge status={project.status} />
                            <button onClick={() => setEditingProjectNotes(project)} className="w-full mt-4 bg-slate-200 text-slate-600 font-black py-2 rounded-xl hover:bg-slate-300 transition"><i className="fa-solid fa-book-open mr-2"></i>查看最終備忘錄</button>
                        </div>
                    ))}
                  </div>
                </div>
              )}

              <ProjectNotesModal isOpen={!!editingProjectNotes} project={editingProjectNotes} onClose={() => setEditingProjectNotes(null)} isTeacher={false} markAsRead={handleMarkMemoAsRead} />
            </div>
          );
        };

        const App = () => {
          const [currentUser, setCurrentUser] = useState(null); 
          const TEACHER_EMAIL = "composerho@gmail.com"; 
          
          const [students, setStudents] = useState([]); const [projects, setProjects] = useState([]);
          const [conferences, setConferences] = useState([]); const [announcements, setAnnouncements] = useState([]); const [usefulLinks, setUsefulLinks] = useState([]);
          const [marqueeText, setMarqueeText] = useState("歡迎搭乘 MEG 新自強3000 列車！");
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            fetch(GAS_API_URL).then(res => res.json()).then(data => {
                if(data.students) setStudents(data.students); 
                // 🌟 過濾掉已永久刪除的資料 (確保不進入 React 狀態中)
                if(data.projects) setProjects(data.projects.filter(p => p.isDeleted !== true && p.isDeleted !== 'true'));
                if(data.config && data.config.length > 0) {
                  const marqueeConf = data.config.find(c => c.key === 'marqueeText'); if (marqueeConf) setMarqueeText(marqueeConf.value);
                  const confConfig = data.config.find(c => c.key === 'conferencesList'); if (confConfig && confConfig.value) try { setConferences(JSON.parse(confConfig.value)); } catch(e) {}
                  const annConfig = data.config.find(c => c.key === 'announcementsList'); if (annConfig && annConfig.value) try { setAnnouncements(JSON.parse(annConfig.value)); } catch(e) {}
                  const linkConfig = data.config.find(c => c.key === 'usefulLinksList'); if (linkConfig && linkConfig.value) try { setUsefulLinks(JSON.parse(linkConfig.value)); } catch(e) {}
                }
                setIsLoading(false);
              }).catch(err => setIsLoading(false));
          }, []);

          if (isLoading) return <div className="min-h-screen bg-shapes flex items-center justify-center flex-col z-10"><i className="fa-solid fa-train-subway text-indigo-500 text-6xl animate-bounce-soft mb-6"></i><h2 className="text-2xl font-black text-indigo-900 bg-white/80 px-6 py-2 rounded-full">列車啟動中...</h2></div>;

          const handleLogin = (email, name, picture) => {
            const userEmail = email.toLowerCase().trim();
            if (userEmail === TEACHER_EMAIL.toLowerCase().trim()) return setCurrentUser({ email: userEmail, name, picture, role: 'teacher', studentData: null });
            const foundStudent = students.find(s => s.email && s.email.toLowerCase().trim() === userEmail);
            if (foundStudent) return setCurrentUser({ email: userEmail, name: foundStudent.name, picture, role: 'student', studentData: foundStudent });
            setCurrentUser({ email: userEmail, name, picture, role: 'unauthorized', studentData: null });
          };

          if (!currentUser) return <LoginScreen onLoginSuccess={handleLogin} />;
          if (currentUser.role === 'unauthorized') return <div className="min-h-screen flex items-center justify-center text-xl font-black text-rose-500">未授權的乘客，無法進入車廂。</div>;

          return (
            <div className="min-h-screen flex flex-col z-10">
              <header className="bg-white/90 backdrop-blur-xl shadow-sm sticky top-0 z-40 p-4 flex justify-between items-center">
                  <h1 className="text-2xl font-black text-indigo-900"><i className="fa-solid fa-train-subway text-indigo-500 mr-2"></i> MEG-RMS</h1>
                  
                  <div className="flex items-center gap-4">
                      <div className="hidden sm:flex items-center bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100">
                          {currentUser.picture ? (
                              <img src={currentUser.picture} className="w-8 h-8 rounded-full mr-2 shadow-sm border-2 border-white" alt="avatar" />
                          ) : (
                              <div className="w-8 h-8 rounded-full bg-indigo-500 text-white flex items-center justify-center font-bold mr-2 border-2 border-white">{currentUser.name.charAt(0)}</div>
                          )}
                          <span className="font-bold text-indigo-900 text-sm">{currentUser.name}</span>
                          <span className="text-xs text-indigo-500 ml-2 font-black bg-indigo-100 px-2 py-0.5 rounded-md">{currentUser.role === 'teacher' ? '列車長' : '乘客'}</span>
                      </div>
                      <button onClick={()=>setCurrentUser(null)} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-rose-100 hover:text-rose-600 transition shadow-sm">
                          <i className="fa-solid fa-right-from-bracket mr-1"></i> 登出
                      </button>
                  </div>
              </header>
              <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full z-10">
                {currentUser.role === 'teacher' ? 
                  <TeacherDashboard projects={projects} setProjects={setProjects} students={students} setStudents={setStudents} conferences={conferences} setConferences={setConferences} announcements={announcements} setAnnouncements={setAnnouncements} usefulLinks={usefulLinks} setUsefulLinks={setUsefulLinks} /> 
                  : 
                  <StudentWorkspace student={currentUser.studentData} students={students} setStudents={setStudents} projects={projects} setProjects={setProjects} conferences={conferences} announcements={announcements} usefulLinks={usefulLinks} />
                }
              </main>
            </div>
          );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
