<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEG新自強3000列車 - 進度管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body { font-family: 'Nunito', 'Noto Sans TC', sans-serif; background-color: #f0f4f8; }

        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-150%); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }
        @keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes float-cloud { 0% { transform: translateX(100vw); } 100% { transform: translateX(-20vw); } }
        @keyframes slide-train { 0% { transform: translateX(120vw); } 100% { transform: translateX(-50vw); } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 50% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.9) translateY(20px); } 100% { opacity: 1; transform: none; } }
        @keyframes aiPulse { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 25s linear infinite; }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .animate-bounce-soft { animation: bounce-soft 2s infinite ease-in-out; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-modal-pop { animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-ai-bg { background-size: 200% 200%; animation: aiPulse 3s ease infinite; }

        .rich-content { font-size: 1.125rem; line-height: 1.75; }
        .rich-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .rich-content a { color: #4f46e5; text-decoration: underline; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .rich-content a:hover { color: #ec4899; }
        .rich-content p { margin-bottom: 0.5rem; min-height: 1rem; }
        .rich-content b, .rich-content strong { font-weight: 900; color: #1e1b4b; }
        .rich-content i, .rich-content em { font-style: italic; }
        .rich-content u { text-decoration: underline; text-decoration-color: #818cf8; text-decoration-thickness: 3px;}
        .rich-content strike { text-decoration: line-through; color: #9ca3af; }

        .ai-markdown { font-size: 0.95rem; line-height: 1.6; }
        .ai-markdown p { margin-bottom: 0.75rem; }
        .ai-markdown p:last-child { margin-bottom: 0; }
        .ai-markdown ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .ai-markdown ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
        .ai-markdown li { margin-bottom: 0.25rem; }
        .ai-markdown strong { font-weight: 900; color: inherit; }
        .ai-markdown h3, .ai-markdown h4 { font-weight: 900; margin-top: 1rem; margin-bottom: 0.5rem; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }
        
        .thin-scrollbar::-webkit-scrollbar { height: 6px; }
        .thin-scrollbar::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 6px; border: none; }
        .thin-scrollbar::-webkit-scrollbar-thumb:hover { background: #818cf8; }

        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; overflow: hidden; background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 1.5s ease-in-out; }
        
        .cloud { position: absolute; font-size: 4rem; opacity: 0.4; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
        .cloud-1 { top: 10%; animation: float-cloud 40s linear infinite; }
        .cloud-2 { top: 30%; font-size: 5rem; animation: float-cloud 55s linear infinite 15s; }
        .cloud-3 { top: 60%; font-size: 3rem; animation: float-cloud 45s linear infinite 5s; }
        .bg-train { position: absolute; bottom: 5%; font-size: 5rem; opacity: 0.15; animation: slide-train 30s linear infinite; }
    </style>
</head>
<body class="text-gray-800 relative">
    <div id="main-bg" class="bg-shapes"></div>
    
    <script>
        const bgImages = [
            'https://i.ibb.co/xS4y2nLZ/Gemini-Generated-Image-glqg2kglqg2kglqg-1.png', 
            'https://i.ibb.co/93ryGND0/Gemini-Generated-Image-m3tar8m3tar8m3ta.png',    
            'https://i.ibb.co/p6dngRgF/Gemini-Generated-Image-21aq1o21aq1o21aq.png'     
        ];
        
        window.changeBackground = function() {
            const randomBg = bgImages[Math.floor(Math.random() * bgImages.length)];
            document.getElementById('main-bg').style.backgroundImage = `url('${randomBg}')`;
        };
        window.changeBackground();
    </script>
    
    <div id="bg-overlay" class="fixed top-0 left-0 w-full h-full z-[-1] bg-transparent backdrop-blur-none transition-all duration-1000"></div>
    
    <div class="fixed top-0 left-0 w-full h-full z-[-1] overflow-hidden pointer-events-none">
        <div class="cloud cloud-1">☁️</div><div class="cloud cloud-2">⛅</div><div class="cloud cloud-3">☁️</div>
        <div class="bg-train">🚂🚋🚋🚋🚋🚋</div>
    </div>

    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 共用元件：Modal 彈出視窗容器
        const ModalPortal = ({ children }) => {
            const [mounted, setMounted] = useState(false);
            useEffect(() => { setMounted(true); }, []);
            return mounted ? ReactDOM.createPortal(children, document.body) : null;
        };

        const STATUSES = [
          "💭 概念發想未經報告", "✅ 報告後老師確認", "🛠️ 研究與遊戲發展中", 
          "🎯 PILOT完成", "📤 研討會已投稿", "🎊 研討會已被接受", "📋 期刊施測準備中", 
          "✍️ 期刊寫作中", "🎉 期刊已投稿", "🏅 期刊已被接受", "📊 學位論文施測中", 
          "📜 學位論文撰寫中", "📌 其他"
        ];

        // 🔴 非常重要：請將下方引號內的網址，替換成您自己的 GAS 部署網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwvFe7geACFOL5yRauhX8WiBqafBLJiOj7CSPB6PNgoWkVqHeIVUS-wxGQWPGuC5aFG/exec";

        const formatDate = (dateVal) => {
            if (!dateVal) return '';
            try {
                if (typeof dateVal === 'string') {
                    const cleanStr = dateVal.split('T')[0].split(' ')[0];
                    if (cleanStr.includes('-') || cleanStr.includes('/')) return cleanStr;
                }
                const d = new Date(dateVal);
                if (isNaN(d.getTime())) return String(dateVal); 
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            } catch(e) {
                return String(dateVal);
            }
        };

        const extractText = (html) => {
            if(!html) return "";
            const tmp = document.createElement("DIV");
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        };

        const copyToClipboard = (text) => {
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-999999px"; textArea.style.top = "-999999px";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); alert('✨ 登登！已成功複製到剪貼簿！'); } catch (err) { alert('🥺 哎呀，複製失敗，請手動選取複製。'); }
            textArea.remove();
        };

        const syncToBackend = (action, data) => {
          const toastId = 'toast-' + Date.now();
          const toast = document.createElement('div');
          toast.id = toastId;
          toast.className = 'fixed bottom-6 right-6 bg-indigo-900/90 backdrop-blur-md text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-indigo-400 animate-modal-pop';
          toast.innerHTML = '<i class="fa-solid fa-train-subway fa-bounce mr-3 text-2xl text-yellow-300"></i> 列車行駛中，正在同步資料...';
          document.body.appendChild(toast);

          fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action, data }) })
          .then(res => res.json())
          .then(result => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            if (!result.success) {
              alert(`❌ 資料庫寫入失敗！\n\n動作：${action}\n錯誤原因：\n${result.error}`);
            } else {
              const successToast = document.createElement('div');
              successToast.className = 'fixed bottom-6 right-6 bg-gradient-to-r from-emerald-400 to-teal-500 text-white px-5 py-4 rounded-2xl shadow-2xl z-50 text-sm font-bold flex items-center border-2 border-white animate-modal-pop';
              successToast.innerHTML = '<i class="fa-solid fa-star fa-spin mr-3 text-2xl text-yellow-200"></i> 同步成功！棒棒的！';
              document.body.appendChild(successToast);
              setTimeout(() => {
                successToast.style.opacity = '0'; successToast.style.transform = 'translateY(20px)'; successToast.style.transition = 'all 0.5s ease-out';
                setTimeout(() => successToast.remove(), 500);
              }, 2500);
            }
          })
          .catch(err => {
            const currentToast = document.getElementById(toastId);
            if (currentToast) currentToast.remove();
            alert(`🔌 哎呀，網路斷線了或伺服器無回應！請檢查網路後再試。\n\n詳細資訊: ${err.message}`);
          });
        };

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, options);
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        const errMsg = data.error?.message || `HTTP ${res.status}`;
                        throw new Error(errMsg);
                    }
                    return data;
                } catch (err) {
                    if (i === retries - 1 || err.message.includes('403') || err.message.includes('400')) throw err;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const calculateDaysLeft = (targetDate) => {
            if (!targetDate) return null;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(targetDate);
            if (isNaN(target.getTime())) return null; 
            target.setHours(0,0,0,0);
            return Math.round((target - today) / (1000 * 60 * 60 * 24));
        };

        const getDaysSince = (dateString) => {
            if(!dateString) return 0;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateString);
            if(isNaN(target.getTime())) return 0;
            target.setHours(0,0,0,0);
            return Math.round((today - target) / (1000 * 60 * 60 * 24));
        };

        const isStatusPending = (val) => {
            return val !== undefined && val !== null && String(val).trim() !== "" && String(val).toLowerCase() !== "null";
        };

        const StatusBadge = ({ status }) => {
          let colors = "bg-gray-100 text-gray-600 border-gray-200";
          if (status.includes("發想")) colors = "bg-orange-100 text-orange-700 border-orange-300 shadow-orange-100";
          if (status.includes("發展中") || status.includes("準備中")) colors = "bg-yellow-100 text-yellow-700 border-yellow-400 shadow-yellow-100";
          if (status.includes("施測") || status.includes("確認")) colors = "bg-sky-100 text-sky-700 border-sky-300 shadow-sky-100";
          if (status.includes("寫作中")) colors = "bg-fuchsia-100 text-fuchsia-700 border-fuchsia-300 shadow-fuchsia-100";
          if (status.includes("投稿") || status.includes("完成") || status.includes("接受")) colors = "bg-emerald-100 text-emerald-700 border-emerald-300 shadow-emerald-100";
          if (status.includes("終止")) colors = "bg-slate-200 text-slate-700 border-slate-400 shadow-slate-200 line-through opacity-70";

          return <span className={`px-3 py-1.5 rounded-2xl text-xs font-black shadow-sm border-2 ${colors} flex items-center w-fit`}>{status}</span>;
        };

        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white/80 backdrop-blur-lg rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 ${className}`}>
            {children}
          </div>
        );

        const AIAssistantModal = ({ isOpen, onClose, projects, students, conferences, announcements, usefulLinks, geminiApiKey, setGeminiApiKey, geminiModel, setGeminiModel }) => {
            const [query, setQuery] = useState('');
            const [chatHistory, setChatHistory] = useState([
                { role: 'ai', text: '嗨！老師好～我是最貼心的專屬小助手 **小毛丸** 🐾✨\n\n我已經幫老師把系統裡所有的專案、學生名單、研討會死線跟最新公告都整理好放進腦袋裡囉！\n老師今天辛苦了！有什麼我可以幫忙的嗎？' }
            ]);
            const [isLoading, setIsLoading] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [tempKey, setTempKey] = useState(geminiApiKey || '');
            const [tempModel, setTempModel] = useState(geminiModel || 'gemini-1.5-flash');
            const [testResult, setTestResult] = useState(null);
            const [scannedModels, setScannedModels] = useState([]); 
            const chatEndRef = useRef(null);

            useEffect(() => {
                setTempKey(geminiApiKey || '');
                setTempModel(geminiModel || 'gemini-1.5-flash');
            }, [geminiApiKey, geminiModel]);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [chatHistory, isLoading, isOpen, showSettings]);

            const handleScanAndTestKey = async () => {
                let clean = tempKey.trim().replace(/[^a-zA-Z0-9_-]/g, '');
                if (!clean) {
                    setTestResult({ success: false, msg: `❌ 老師～請先輸入 API Key 唷！` });
                    return;
                }
                
                setTestResult({ success: null, msg: "⏳ 小毛丸正在聯絡 Google 伺服器，檢查您的 Key 可以用哪些超能力..." });
                
                try {
                    const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${clean}`);
                    const listData = await listRes.json();

                    if (!listRes.ok) {
                        throw new Error(listData.error?.message || "無法取得模型清單 (可能 Key 錯誤或權限不足)");
                    }

                    const validModels = listData.models
                        .filter(m => m.supportedGenerationMethods?.includes('generateContent'))
                        .map(m => m.name.replace('models/', ''));

                    setScannedModels(validModels);

                    if (validModels.length === 0) {
                        return setTestResult({ success: false, msg: "❌ 老師，您的 Key 是對的，但好像沒有開啟生成文字的權限呢。" });
                    }

                    let modelToTest = tempModel;
                    if (!validModels.includes(modelToTest)) {
                        modelToTest = validModels.find(m => m.includes('flash')) || validModels[0];
                        setTempModel(modelToTest);
                    }

                    setTestResult({ success: null, msg: `⏳ 掃描成功！找到 ${validModels.length} 個模型。小毛丸正在測試連線...🐾` });
                    
                    const testRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToTest}:generateContent?key=${clean}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: 'Hello' }] }] })
                    });
                    const testData = await testRes.json();

                    if (!testRes.ok) {
                        throw new Error(testData.error?.message || `模型 ${modelToTest} 測試失敗`);
                    }

                    setTestResult({ success: true, msg: `✅ 連線大成功！🎉\n請記得點擊下方的【儲存設定】喔。` });

                } catch (err) {
                    let errorMsg = `❌ 哎呀，連線失敗了：\n${err.message}`;
                    if (err.message.includes('403') || err.message.includes('unregistered')) {
                        errorMsg = `❌ 連線失敗 (403 未註冊)：\n老師，這代表您的專案還沒有啟用「Generative Language API」權限喔。`;
                    }
                    setTestResult({ success: false, msg: errorMsg });
                }
            };

            const handleAsk = async () => {
                if (!query.trim() || isLoading) return;

                const userText = query.trim();
                setQuery('');
                setChatHistory(prev => [...prev, { role: 'user', text: userText }]);
                setIsLoading(true);

                let cleanKey = (geminiApiKey || '').trim().replace(/[^a-zA-Z0-9_-]/g, '');

                if (!cleanKey || cleanKey.length < 30) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: `⚠️ **老師～API Key 還沒設定好喔！**\n\n請點擊右上角的「⚙️ 齒輪」，貼上正確的金鑰後點擊儲存！` }]);
                    setIsLoading(false);
                    return;
                }

                try {
                    const cleanProjects = projects.map(p => ({
                        專案名稱: p.title || '無名稱',
                        狀態: p.status || '未知',
                        負責學生: p.studentName || '未知',
                        預估下階段時間: p.nextStageDate || '未設定',
                        備忘錄: p.notes ? extractText(p.notes) : '無'
                    }));

                    const cleanStudents = (students || []).map(s => ({
                        姓名: s.name,
                        學制: s.degree || '未填寫',
                        老師指導紀錄: s.notes ? extractText(s.notes) : '無'
                    }));

                    const systemPrompt = `你是一個 MEG 研究室進度管理系統的專屬貼心 AI 助理，你的名字叫「小毛丸」。
你的個性非常可愛、充滿正能量、熱情且極度貼心。你一律稱呼使用者為「老師」。
你的首要任務是幫老師分憂解勞，回答時要「主動替老師想到各種貼心的安排」。
若資料中找不到答案，請誠實告知，絕對不要捏造資料。

【目前專案資料庫】：
${JSON.stringify(cleanProjects)}

【學生名單與指導紀錄】：
${JSON.stringify(cleanStudents)}`;

                    const payload = {
                        contents: [{ parts: [{ text: userText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    };

                    const targetModel = geminiModel || 'gemini-1.5-flash';
                    const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${cleanKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "嗚嗚，小毛丸腦袋有點打結，現在無法產生回答。";
                    setChatHistory(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (err) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: `⚠️ **連線異常**\n\n原因：${err.message}` }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <ModalPortal>
                    <div className="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm flex items-center justify-end z-[100] sm:p-4 animate-fade-in">
                        <div className="bg-white sm:rounded-[2rem] w-full h-full sm:h-[90vh] sm:max-w-md flex flex-col shadow-[0_20px_50px_rgb(0,0,0,0.3)] overflow-hidden border-4 border-white animate-modal-pop">
                            <div className="bg-gradient-to-r from-violet-600 via-fuchsia-600 to-pink-600 animate-ai-bg p-5 text-white flex justify-between items-center shadow-sm">
                                <h3 className="font-black text-xl flex items-center tracking-wide">
                                    <i className="fa-solid fa-paw mr-3 text-yellow-300 animate-bounce"></i> 小毛丸 (Gemini)
                                </h3>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowSettings(!showSettings)} className={`hover:scale-110 transition-all duration-300 w-8 h-8 flex justify-center items-center rounded-full ${showSettings ? 'bg-white text-pink-600' : 'bg-white/20'}`}><i className="fa-solid fa-gear"></i></button>
                                    <button onClick={onClose} className="hover:rotate-90 hover:scale-110 transition-all duration-300 w-8 h-8 flex justify-center items-center rounded-full bg-white/20"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                            </div>
                            
                            {showSettings && (
                                <div className="bg-fuchsia-50 p-5 border-b-2 border-fuchsia-100 animate-fade-in shadow-inner overflow-y-auto max-h-[50vh]">
                                    <label className="text-sm font-black text-fuchsia-900 block mb-2 flex items-center"><i className="fa-solid fa-key mr-2 text-fuchsia-500"></i> 設定 Gemini API Key</label>
                                    <div className="flex flex-col gap-2 mb-3">

          const pendingApprovals = activeProjects.filter(p => isStatusPending(p.pendingStatus));

              let reasons = [];
              if (isStatusPending(p.pendingStatus)) return []; 
              const daysToNext = calculateDaysLeft(p.nextStageDate);
              if (daysToNext !== null && daysToNext < 0) reasons.push(`預估進度已逾期 ${Math.abs(daysToNext)} 天`);
              const daysSinceUpdate = getDaysSince(p.lastUpdate);
              if (p.status.includes('發想') && daysSinceUpdate > 14) reasons.push(`概念發想已卡關超過 14 天`);
              else if (daysSinceUpdate > 30) reasons.push(`超過一個月未更新狀態`);
              return reasons;

          };

          const handleRestoreProject = (project) => {
              const updated = { ...project, status: STATUSES[0], lastUpdate: new Date().toISOString().split('T')[0] };
              setProjects(projects.map(p => p.id === project.id ? updated : p)); syncToBackend('updateProject', updated);
              alert("✅ 專案已復原！");
          };

          const handlePermanentDeleteProject = (project) => {
              if(!confirm(`⚠️ 嚴重警告：確定要永久刪除【${project.title}】嗎？此動作將無法復原！`)) return;
              const updated = { ...project, isDeleted: true };
              setProjects(projects.filter(p => p.id !== project.id)); syncToBackend('deleteProject', updated); 
          };

          const handleAddStudent = () => {
              if (!newStudent.name || !newStudent.email) return alert("姓名與登入用 Email 為必填！");
              const s = { id: 's' + Date.now(), ...newStudent };
              const updated = [...students, s];
              setStudents(updated); syncToBackend('addStudent', s);
              setIsAddStudentOpen(false); setNewStudent({ name: '', email: '', degree: '', contactLink: '', localFolder: '' });
          };

          const handleAddProject = () => {
              if (!newProjectForStudent.title) return alert("專案名稱為必填！");
              if (!newProjectForStudent.initialDescription || newProjectForStudent.initialDescription.trim().length < 10) return alert("初步說明至少需 10 個字！");

              const student = students.find(s => s.id === manageStudentProjectsId);
              const initialNote = `<p><b>[${new Date().toLocaleDateString('zh-TW')}] 🆕 專案已由列車長建立。</b><br>初步說明：${newProjectForStudent.initialDescription}</p>`;
              const isConfAccepted = newProjectForStudent.status.includes('研討會已被接受');
              const isJournalAccepted = newProjectForStudent.status.includes('期刊已被接受');

              const p = { 
                  id: 'p' + Date.now(), studentId: manageStudentProjectsId, studentName: student.name, 
                  title: newProjectForStudent.title, status: newProjectForStudent.status, mentors: newProjectForStudent.mentors,
                  lastUpdate: new Date().toISOString().split('T')[0], pendingStatus: null,
                  notes: initialNote, hasConfAccepted: isConfAccepted, hasJournalAccepted: isJournalAccepted
              };
              const updated = [...projects, p];
              setProjects(updated); syncToBackend('addProject', p);
              setIsAddProjectModalOpen(false); setNewProjectForStudent({ title: '', status: STATUSES[0], mentors: '', initialDescription: '' });
          };

          const handleUpdateMentors = (projectId, newMentors) => {
              const project = projects.find(p => p.id === projectId);
              if (project && project.mentors !== newMentors) {
                  const updated = { ...project, mentors: newMentors };
                  setProjects(projects.map(p => p.id === projectId ? updated : p)); syncToBackend('updateProject', updated);
              }
          };

          const handleAddConfSubmit = () => {
            if (!newConf.name || !newConf.confirmDeadline) return alert("名稱與確認死線為必填！");
            const conf = { id: 'c' + Date.now(), ...newConf };
            const updatedConfs = [...conferences, conf];
            setConferences(updatedConfs); syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
            setNewConf({ name: '', url: '', submitDeadline: '', confirmDeadline: '' });
          };
          const handleSaveEditConf = () => {
            if (!editConfData.name || !editConfData.confirmDeadline) return alert("名稱與死線必填！");
            const updatedConfs = conferences.map(c => c.id === editingConfId ? editConfData : c);
            setConferences(updatedConfs); syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
            setEditingConfId(null);
          };
          const handleDeleteConf = (confId) => {
            if(!confirm("確定要刪除嗎？")) return;
            const updatedConfs = conferences.filter(c => c.id !== confId);
            setConferences(updatedConfs); syncToBackend('updateConfig', { key: 'conferencesList', value: JSON.stringify(updatedConfs) });
          };

          const handleAddLinkSubmit = () => {
              if(!newLinkData.title || !newLinkData.url) return alert("請輸入標題與網址");
              const newLink = { id: 'l'+Date.now(), ...newLinkData };
              const updated = [...usefulLinks, newLink];
              setUsefulLinks(updated); syncToBackend('updateConfig', { key: 'usefulLinksList', value: JSON.stringify(updated) });
              setNewLinkData({ title: '', url: '', description: '' });
          };
          const handleSaveEditLink = () => {
              if(!editLinkData.title || !editLinkData.url) return alert("請輸入標題與網址");
              const updated = usefulLinks.map(l => l.id === editingLinkId ? editLinkData : l);
              setUsefulLinks(updated); syncToBackend('updateConfig', { key: 'usefulLinksList', value: JSON.stringify(updated) });
              setEditingLinkId(null);
          };
          const handleDeleteLink = (linkId) => {
              if(!confirm("確定刪除此連結？")) return;
              const updated = usefulLinks.filter(item => item.id !== linkId);
              setUsefulLinks(updated); syncToBackend('updateConfig', { key: 'usefulLinksList', value: JSON.stringify(updated) });
          };

          const handleSaveSharedBoard = (studentId, content) => {
              const student = students.find(s => s.id === studentId);
              const updated = { ...student, sharedBoard: content, boardUnreadStudent: true };
              setStudents(students.map(s => s.id === studentId ? updated : s)); syncToBackend('updateStudent', updated);
              setOpenSharedBoardStudent(null);
          };

          let filteredProjectsToShow = [];
          if (activeFilter === 'all_projects') {
              filteredProjectsToShow = activeProjects;
          } else if (activeFilter && activeFilter !== 'students') {
              if (activeFilter === '研討會已被接受') {
                  filteredProjectsToShow = activeProjects.filter(p => (p.status && p.status.includes('研討會已被接受')) || p.hasConfAccepted === true || (p.notes && p.notes.includes('研討會已被接受')));
              } else if (activeFilter === '期刊已被接受') {
                  filteredProjectsToShow = activeProjects.filter(p => (p.status && p.status.includes('期刊已被接受')) || p.hasJournalAccepted === true || (p.notes && p.notes.includes('期刊已被接受')));
              } else {
                  filteredProjectsToShow = activeProjects.filter(p => p.status && p.status.includes(activeFilter));
              }
          }

          let displayedStudents = [...students];
          if (studentFilterDegree !== 'all') displayedStudents = displayedStudents.filter(s => s.degree === studentFilterDegree);
          displayedStudents.sort((a, b) => {
              if (studentSortBy === 'projectCount') {
                  return activeProjects.filter(p => p.studentId === b.id).length - activeProjects.filter(p => p.studentId === a.id).length;
              } else if (studentSortBy === 'lastUpdate') {
                  const timeA = Math.max(0, ...activeProjects.filter(p => p.studentId === a.id).map(p => new Date(p.lastUpdate || 0).getTime()));
                  const timeB = Math.max(0, ...activeProjects.filter(p => p.studentId === b.id).map(p => new Date(p.lastUpdate || 0).getTime()));
                  return timeB - timeA;
              } else if (studentSortBy === 'degree') {
                  return (a.degree || '').localeCompare(b.degree || '');
              }
              return 0; 
          });

          let finalAllProjectsList = [...activeProjects];
          if (allProjectsFilter !== "all") finalAllProjectsList = finalAllProjectsList.filter(p => p.status && p.status.includes(allProjectsFilter));
          if (allProjectsSearch) {
              const q = allProjectsSearch.toLowerCase();
              finalAllProjectsList = finalAllProjectsList.filter(p => (p.title && String(p.title).toLowerCase().includes(q)) || (p.studentName && String(p.studentName).toLowerCase().includes(q)));
          }
          finalAllProjectsList.sort((a, b) => {
              if (allProjectsSort === 'lastUpdate_desc') return (new Date(b.lastUpdate||0).getTime()) - (new Date(a.lastUpdate||0).getTime());
              if (allProjectsSort === 'lastUpdate_asc') return (new Date(a.lastUpdate||0).getTime()) - (new Date(b.lastUpdate||0).getTime());
              if (allProjectsSort === 'name_asc') return String(a.title || '').localeCompare(String(b.title || ''));
              return 0;
          });

          return (
            <div className="space-y-8 animate-fade-in pb-20 relative">
              <AchievementDashboard projects={activeProjects} allProjects={projects} students={students} activeFilter={activeFilter} onFilterClick={setActiveFilter} />

              {activeFilter && activeFilter !== 'students' && (
                  <div className="mb-8 animate-fade-in bg-indigo-50/50 p-6 rounded-3xl border-2 border-indigo-100">
                      <div className="flex justify-between items-center mb-6">
                          <h3 className="text-xl font-black text-indigo-900 flex items-center"><i className="fa-solid fa-filter text-indigo-500 mr-3"></i> 過濾結果 ({filteredProjectsToShow.length} 筆)</h3>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                          {filteredProjectsToShow.map(project => {
                              const student = students.find(s => s.id === project.studentId);
                              const isUnread = project.hasUnreadMemo === true || String(project.hasUnreadMemo).toLowerCase() === 'true';
                              return (
                                  <div key={project.id} className="bg-white border-2 border-indigo-100 rounded-2xl p-5 shadow-sm">
                                      <div className="flex justify-between mb-2"><div className="text-sm font-black text-white bg-indigo-500 px-3 py-1 rounded-lg">{student?.name || '未知乘客'}</div></div>
                                      <h4 className="font-black text-slate-800 text-lg mb-3">{project.title}</h4>
                                      <div className="mb-4 mt-auto"><StatusBadge status={project.status} /></div>
                                      <div className="flex justify-end gap-2 border-t-2 border-slate-50 pt-3">
                                          <button onClick={() => setEditingProjectNotes(project)} className={`px-4 py-2 font-black rounded-xl text-sm border-2 ${isUnread ? 'bg-rose-50 text-rose-600 border-rose-200 animate-pulse' : 'bg-indigo-50 text-indigo-700 border-indigo-200'}`}><i className="fa-solid fa-book-open mr-2"></i>備忘錄</button>
                                          <button onClick={() => setManageStudentProjectsId(project.studentId)} className="px-4 py-2 bg-slate-100 text-slate-600 font-black rounded-xl text-sm"><i className="fa-solid fa-bars-progress mr-2"></i>管理專案</button>
                                      </div>
                                  </div>
                              );
                          })}
                      </div>
                  </div>
              )}

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                 <AnnouncementsBoard announcements={announcements} />
                 <UsefulLinksBoard links={usefulLinks} />
              </div>

              <div className="flex flex-wrap justify-between items-center bg-white/90 backdrop-blur-md p-5 rounded-[2rem] shadow-sm border-2 border-white gap-4 relative overflow-hidden">
                <h2 className="text-2xl font-black text-indigo-900 flex items-center"><i className="fa-solid fa-gamepad text-indigo-500 mr-3 text-3xl"></i> 列車長控制台</h2>
                <div className="flex flex-wrap gap-3 z-10">
                  <button onClick={() => setIsAnnouncementsModalOpen(true)} className="px-4 py-2.5 bg-sky-100 text-sky-700 rounded-2xl font-bold"><i className="fa-solid fa-bullhorn mr-2"></i> 發布公告</button>
                  <button onClick={() => setIsLinksModalOpen(true)} className="px-4 py-2.5 bg-emerald-100 text-emerald-700 rounded-2xl font-bold"><i className="fa-solid fa-link mr-2"></i> 連結管理</button>
                  <button onClick={() => setIsConfModalOpen(true)} className="px-4 py-2.5 bg-teal-100 text-teal-700 rounded-2xl font-bold"><i className="fa-solid fa-calendar-check mr-2"></i> 研討會</button>
                  <button onClick={openMarqueeManager} className="px-4 py-2.5 bg-indigo-100 text-indigo-700 rounded-2xl font-bold"><i className="fa-solid fa-tower-broadcast mr-2"></i> 廣播</button>
                  <button onClick={() => setIsAIOpen(true)} className="px-5 py-2.5 bg-gradient-to-r from-orange-400 to-rose-500 text-white rounded-2xl font-black shadow-md"><i className="fa-solid fa-paw mr-2"></i> 召喚小毛丸</button>
                  <button onClick={() => setIsTerminatedModalOpen(true)} className="px-4 py-2.5 bg-slate-200 text-slate-700 rounded-2xl font-bold flex items-center"><i className="fa-solid fa-ghost mr-2"></i> 歷史下車</button>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <Card className="col-span-1 lg:col-span-2 border-t-[6px] border-t-orange-400">
                  <div className="p-5 border-b bg-gradient-to-r from-orange-50 to-white"><h3 className="font-black text-xl text-orange-900"><i className="fa-solid fa-bell text-orange-500 mr-3"></i> 待確認進度申請 <span className="ml-3 bg-orange-500 text-white text-sm px-3 py-1 rounded-full">{pendingApprovals.length}</span></h3></div>
                  <div className="p-5 space-y-5 max-h-[450px] overflow-y-auto bg-slate-50/50">
                    {pendingApprovals.length === 0 ? <div className="text-orange-300 font-bold text-center py-10">目前沒有待審核的申請！☕</div> :
                      pendingApprovals.map(project => (
                        <div key={project.id} className="flex flex-col xl:flex-row justify-between items-start xl:items-center bg-white border-2 border-orange-100 rounded-2xl p-5 shadow-sm gap-4">
                          <div className="w-full">
                            <div className="font-black text-indigo-900 text-xl mb-2"><span className="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-xl text-sm mr-2">{project.studentName}</span>{project.title}</div>
                            <div className="text-sm mt-3 flex items-center gap-3 bg-slate-50 p-2.5 rounded-xl border border-slate-200 font-bold text-slate-600 w-fit"><span className="line-through opacity-60">{project.status}</span><i className="fa-solid fa-circle-arrow-right text-orange-400"></i><span className="text-orange-600 bg-orange-50 px-2 py-1 rounded-lg">{project.pendingStatus}</span></div>
                            {project.pendingDescription && <div className="mt-3 bg-sky-50 p-3 rounded-xl text-sm text-sky-900"><span className="font-black text-sky-700">學生的話：</span><p className="whitespace-pre-wrap font-medium">{project.pendingDescription}</p></div>}
                          </div>
                          <div className="flex gap-2 w-full xl:w-auto shrink-0">
                            <button onClick={() => handleApprove(project)} className="px-5 py-3 bg-emerald-500 text-white font-black rounded-xl"><i className="fa-solid fa-check mr-1"></i> 核准</button>
                            <button onClick={() => handleReject(project)} className="px-5 py-3 bg-white text-rose-500 font-black rounded-xl border-2 border-rose-200"><i className="fa-solid fa-xmark mr-1"></i> 退回</button>
                          </div>
                        </div>
                      ))
                    }
                  </div>
                </Card>

                <Card className="border-t-[6px] border-t-red-400">
                  <div className="p-5 border-b bg-gradient-to-r from-red-50 to-white"><h3 className="font-black text-xl text-red-900"><i className="fa-solid fa-triangle-exclamation text-red-500 mr-3 animate-pulse"></i> 智能卡關警報區</h3></div>
                  <div className="p-5 flex-grow overflow-y-auto bg-slate-50/50" style={{maxHeight: '450px'}}>
                    <ul className="space-y-4">
                      {alertedProjects.length === 0 && <div className="text-center text-red-300 font-bold py-10">目前沒有卡關或落後的專案！</div>}
                      {alertedProjects.map(project => (
                        <li key={project.id} className="flex flex-col bg-white border-2 border-red-100 rounded-2xl p-4 shadow-sm">
                          <div className="flex items-center mb-2">
                            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-red-400 to-rose-500 text-white flex items-center justify-center font-black text-lg mr-3">{project.studentName.charAt(0)}</div>
                            <div className="flex-grow overflow-hidden"><div className="font-black text-slate-800 text-lg">{project.studentName}</div><div className="text-slate-500 text-xs truncate font-medium">{project.title}</div></div>
                          </div>
                          <div className="mb-3 flex flex-wrap gap-1">{project.alertReasons.map((r, i) => <span key={i} className="bg-red-50 text-red-600 border border-red-200 text-[10px] font-black px-2 py-1 rounded-md">{r}</span>)}</div>
                          <button onClick={() => setEditingProjectNotes(project)} className="w-full text-indigo-700 bg-indigo-50 border border-indigo-200 font-bold py-2 rounded-xl"><i className="fa-solid fa-book-open mr-1"></i>備忘錄</button>
                        </li>
                      ))}
                    </ul>
                  </div>
                </Card>
              </div>

              <SharedBoardModal isOpen={!!openSharedBoardStudent} onClose={() => setOpenSharedBoardStudent(null)} student={openSharedBoardStudent} role="teacher" onSave={handleSaveSharedBoard} />

              <div className="pt-8">
                  <div className="flex flex-col md:flex-row justify-between items-end mb-6 gap-4 border-b-2 border-indigo-100 pb-4">
                      <h3 className="text-2xl font-black text-indigo-900"><i className="fa-solid fa-users-viewfinder text-indigo-500 mr-3"></i> 乘客名單與指導紀錄</h3>
                      <div className="flex flex-wrap items-center gap-3">
                          <button onClick={() => setIsAddStudentOpen(true)} className="px-5 py-2 bg-indigo-100 text-indigo-700 font-black rounded-xl border-2 border-indigo-200"><i className="fa-solid fa-user-plus mr-2"></i> 新增乘客</button>
                      </div>
                  </div>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                  {displayedStudents.map(student => {
                      const studentProjects = activeProjects.filter(p => p.studentId === student.id);
                      const hasUnreadBoardTeacher = student.boardUnreadTeacher === true;
                      return (
                      <Card key={student.id} className="border-t-[6px] border-t-indigo-400 relative flex flex-col h-full overflow-visible">
                        <div className="p-5 flex-grow flex flex-col">
                          <div className="flex flex-col sm:flex-row justify-between items-start mb-4 gap-3 border-b-2 border-indigo-50 pb-3">
                              <span className="font-black text-xl text-slate-800">{student.name}</span>
                              <div className="flex flex-wrap gap-1">
                                  <button onClick={() => { setOpenSharedBoardStudent(student); if (hasUnreadBoardTeacher) { const updated = { ...student, boardUnreadTeacher: false }; setStudents(students.map(s => s.id === student.id ? updated : s)); syncToBackend('updateStudent', updated); } }} className={`w-8 h-8 rounded-lg flex items-center justify-center transition border ${hasUnreadBoardTeacher ? 'bg-pink-100 text-pink-600 border-pink-300 animate-pulse' : 'bg-slate-50 text-slate-600 border-slate-200'}`}><i className="fa-solid fa-envelope-open-text"></i></button>
                                  <button onClick={() => setEditingStudent(student)} className="w-8 h-8 bg-slate-50 hover:bg-purple-100 text-slate-600 hover:text-purple-600 rounded-lg flex items-center justify-center border border-slate-200"><i className="fa-solid fa-pen"></i></button>
                                  <button onClick={() => student.contactLink ? window.open(student.contactLink, '_blank') : alert('未設定聯絡網址，請點擊編輯設定')} className={`w-8 h-8 rounded-lg flex items-center justify-center border border-slate-200 ${student.contactLink ? 'bg-sky-50 text-sky-500' : 'bg-slate-50 text-slate-300'}`}><i className="fa-brands fa-facebook-messenger"></i></button>
                              </div>
                          </div>
                          <div className="mb-4 bg-indigo-50/50 p-3 rounded-2xl border border-indigo-100 flex flex-col relative group">
                              <div className="flex justify-between items-center mb-2"><span className="text-xs font-black text-indigo-800 flex items-center"><i className="fa-solid fa-layer-group mr-1.5"></i> 進行中專案 ({studentProjects.length})</span><button onClick={() => setManageStudentProjectsId(student.id)} className="text-[10px] bg-indigo-600 text-white px-2.5 py-1 rounded-lg font-bold">管理 <i className="fa-solid fa-arrow-right"></i></button></div>
                              <div className="flex overflow-x-auto gap-2 pb-1">{studentProjects.map(p => <span key={p.id} className="whitespace-nowrap bg-white text-indigo-700 text-xs px-3 py-1.5 rounded-lg border border-indigo-200">{p.title}</span>)}</div>
                          </div>
                          <div className="mt-auto pt-2 bg-yellow-50 p-3 rounded-2xl border-2 border-yellow-200">
                            <label className="text-xs font-black text-yellow-800 mb-2 block"><i className="fa-solid fa-thumbtack mr-1"></i>指導註記</label>
                            <div onClick={() => { setEditingNoteStudentId(student.id); setTempStudentNote(student.notes || ""); }} className="w-full text-sm p-2 border-2 border-transparent rounded-xl bg-white cursor-pointer hover:border-yellow-400 truncate">
                               {(student.notes || "").split('\n').filter(l => l.trim() !== '').pop() || <span className="text-slate-400">點擊新增註記...</span>}
                            </div>
                          </div>
                        </div>
                      </Card>
                    );
                  })}
                </div>
              </div>

              <div className="pt-12">
                  <div className="flex flex-col lg:flex-row justify-between items-end mb-6 gap-4 border-b-2 border-indigo-100 pb-4">
                      <h3 className="text-2xl font-black text-indigo-900"><i className="fa-solid fa-list-check text-indigo-500 mr-3"></i> 列車總覽：所有專案列表</h3>
                      <input type="text" className="p-2 border-2 border-slate-200 rounded-xl font-bold w-full md:w-64" placeholder="搜尋專案或乘客..." value={allProjectsSearch} onChange={(e) => setAllProjectsSearch(e.target.value)} />
                  </div>

                  <Card className="overflow-hidden border-t-[6px] border-t-indigo-500">
                      <div className="overflow-x-auto">
                          <table className="w-full text-left border-collapse min-w-[800px]">
                              <thead>
                                  <tr className="bg-indigo-50/50 border-b-2 border-indigo-100 text-indigo-900">
                                      <th className="p-4 font-black w-[35%]">專案名稱</th>
                                      <th className="p-4 font-black">乘客</th>
                                      <th className="p-4 font-black">狀態管理 (可直接修改)</th>
                                      <th className="p-4 font-black">操作</th>
                                  </tr>
                              </thead>
                              <tbody>
                                  {finalAllProjectsList.length === 0 ? <tr><td colSpan="4" className="p-8 text-center text-slate-400 font-bold">沒有符合條件的專案。</td></tr> :
                                      finalAllProjectsList.map(p => {
                                          const isUnread = p.hasUnreadMemo === true || String(p.hasUnreadMemo).toLowerCase() === 'true';
                                          return (
                                              <tr key={p.id} className="border-b border-slate-100 hover:bg-slate-50 transition group">
                                                  <td className="p-4"><div className="font-black text-slate-800 text-base">{p.title}</div></td>
                                                  <td className="p-4"><span className="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-sm font-black border border-indigo-200">{p.studentName}</span></td>
                                                  <td className="p-4">
                                                      <select className="w-full min-w-[160px] p-2 border-2 border-slate-200 rounded-xl bg-white text-xs font-bold" value={p.status} onChange={(e) => {
                                                          const newStatus = e.target.value;
                                                          const updated = { ...p, status: newStatus, pendingStatus: null, lastUpdate: new Date().toISOString().split('T')[0] };
                                                          setProjects(projects.map(proj => proj.id === p.id ? updated : proj)); syncToBackend('updateProject', updated);
                                                      }}>{STATUSES.map(s => <option key={s} value={s}>{s}</option>)}</select>
                                                  </td>
                                                  <td className="p-4">
                                                      <div className="flex gap-2">

          const [conferences, setConferences] = useState([]); const [announcements, setAnnouncements] = useState([]); const [usefulLinks, setUsefulLinks] = useState([]);
          const [marqueeText, setMarqueeText] = useState("歡迎搭乘 MEG 新自強3000 列車！");
          const [isLoading, setIsLoading] = useState(true);

          const [tempMarquee, setTempMarquee] = useState("");

          const openMarqueeManager = () => {
              setTempMarquee(marqueeText);
              setIsMarqueeModalOpen(true);
          };

          useEffect(() => {
            let isMounted = true;
            fetch(GAS_API_URL).then(res => res.json()).then(data => {
                if (!isMounted) return;
                if(data.students) setStudents(data.students); 
                if(data.projects) setProjects(data.projects.filter(p => p.isDeleted !== true && p.isDeleted !== 'true'));
                if(data.config && data.config.length > 0) {
                  const marqueeConf = data.config.find(c => c.key === 'marqueeText'); if (marqueeConf) setMarqueeText(marqueeConf.value);
                  const confConfig = data.config.find(c => c.key === 'conferencesList'); if (confConfig && confConfig.value) try { setConferences(JSON.parse(confConfig.value)); } catch(e) {}
                  const annConfig = data.config.find(c => c.key === 'announcementsList'); if (annConfig && annConfig.value) try { setAnnouncements(JSON.parse(annConfig.value)); } catch(e) {}
                  const linkConfig = data.config.find(c => c.key === 'usefulLinksList'); if (linkConfig && linkConfig.value) try { setUsefulLinks(JSON.parse(linkConfig.value)); } catch(e) {}
                  
                  const geminiConf = data.config.find(c => c.key === 'geminiApiKey'); if (geminiConf) setGeminiApiKey(geminiConf.value);
                  const geminiModelConf = data.config.find(c => c.key === 'geminiModel'); if (geminiModelConf) setGeminiModel(geminiModelConf.value);
                }
                setIsLoading(false);
              }).catch(err => {
                console.error("載入失敗：", err);
                if(isMounted) setIsLoading(false);
              });
              return () => { isMounted = false; };
          }, []);

          const handleLogin = (email, name, picture) => {
            const userEmail = email.toLowerCase().trim();
            if (userEmail === TEACHER_EMAIL.toLowerCase().trim()) return setCurrentUser({ email: userEmail, name, picture, role: 'teacher', studentData: null });
            const foundStudent = students.find(s => s.email && s.email.toLowerCase().trim() === userEmail);
            if (foundStudent) return setCurrentUser({ email: userEmail, name: foundStudent.name, picture, role: 'student', studentData: foundStudent });
            setCurrentUser({ email: userEmail, name, picture, role: 'unauthorized', studentData: null });
          };

          if (!currentUser) return <LoginScreen onLoginSuccess={handleLogin} />;

                      <div className="hidden sm:flex items-center bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100">

                              <img src={currentUser.picture} className="w-8 h-8 rounded-full mr-2 shadow-sm border-2 border-white" alt="avatar" />
                          ) : (
                              <div className="w-8 h-8 rounded-full bg-indigo-500 text-white flex items-center justify-center font-bold mr-2 border-2 border-white">{currentUser.name.charAt(0)}</div>
                          )}
                          <span className="font-bold text-indigo-900 text-sm">{currentUser.name}</span>
                      </div>
                      <button onClick={() => setCurrentUser(null)} className="px-4 py-2 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-rose-100 hover:text-rose-600 transition shadow-sm">
                          登出
                      </button>
                  </div>
              </header>

              {marqueeText && (
                  <div className="bg-indigo-600 text-white text-lg font-black py-3 overflow-hidden shadow-inner flex relative z-30">
                       <div className="px-5 bg-rose-500 z-10 flex items-center shadow-[5px_0_15px_rgba(0,0,0,0.2)] whitespace-nowrap tracking-wide">
                           <i className="fa-solid fa-tower-broadcast fa-fade mr-3 text-xl"></i> 列車廣播
                       </div>
                       <div className="whitespace-nowrap animate-marquee flex-1 flex items-center tracking-wide">{marqueeText}</div>
                  </div>
              )}

              <main className="max-w-7xl mx-auto px-4 py-8 flex-grow w-full z-10 relative">
                {currentUser.role === 'teacher' ? 
                  <TeacherDashboard projects={projects} setProjects={setProjects} students={students} setStudents={setStudents} conferences={conferences} setConferences={setConferences} announcements={announcements} setAnnouncements={setAnnouncements} usefulLinks={usefulLinks} setUsefulLinks={setUsefulLinks} openMarqueeManager={openMarqueeManager} geminiApiKey={geminiApiKey} setGeminiApiKey={setGeminiApiKey} geminiModel={geminiModel} setGeminiModel={setGeminiModel} /> 
                  : 
                  <StudentWorkspace student={currentUser.studentData} students={students} setStudents={setStudents} projects={projects} setProjects={setProjects} conferences={conferences} announcements={announcements} usefulLinks={usefulLinks} />
                }
              </main>
              
              <footer className="text-center py-6 text-sm font-black text-slate-500/70 z-10 relative mt-auto">
                 <p>(C)Copyright NTUSTMEG 2026，內部系統具機密性請勿外流</p>
              </footer>

              {isMarqueeModalOpen && (
                  <ModalPortal>
                      <div className="fixed inset-0 bg-indigo-900/40 backdrop-blur-sm flex items-center justify-center z-[80] p-4 animate-fade-in">
                          <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col border-4 border-white">
                              <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-5 text-white flex justify-between items-center"><h3 className="font-black text-xl"><i className="fa-solid fa-tower-broadcast mr-3"></i> 設定全站跑馬燈廣播</h3><button onClick={() => setIsMarqueeModalOpen(false)}><i className="fa-solid fa-xmark text-2xl"></i></button></div>
                              <div className="p-6 bg-slate-50">
                                  <textarea className="w-full p-4 border-2 border-slate-200 rounded-xl bg-white font-bold resize-none" rows="3" value={tempMarquee} onChange={(e) => setTempMarquee(e.target.value)}></textarea>
                                  <div className="flex justify-end gap-3 mt-4"><button onClick={() => setIsMarqueeModalOpen(false)} className="px-5 py-2.5 bg-slate-200 text-slate-700 font-bold rounded-xl">取消</button><button onClick={() => { setMarqueeText(tempMarquee); syncToBackend('updateConfig', { key: 'marqueeText', value: tempMarquee }); setIsMarqueeModalOpen(false); }} className="px-5 py-2.5 bg-indigo-600 text-white font-black rounded-xl">更新廣播</button></div>
                              </div>
                          </div>
                      </div>
                  </ModalPortal>
              )}
            </div>
          );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<App />);
    </script>
</body>
</html>
